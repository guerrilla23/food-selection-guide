<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 800" font-family="Noto Sans CJK JP, sans-serif">
  <defs>
    <!-- Watercolor body gradient -->
    <radialGradient id="wcBody" cx="35%" cy="25%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#F5F2EA" stop-opacity="0.85"/>
      <stop offset="80%" stop-color="#C8C0AC" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#A89E80" stop-opacity="0.5"/>
    </radialGradient>
    <radialGradient id="wcLeaf" cx="35%" cy="20%">
      <stop offset="0%" stop-color="#9BCB7A" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#5D8F3D" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#2C5F2D" stop-opacity="0.5"/>
    </radialGradient>
    
    <!-- Filters for watercolor -->
    <filter id="wcRough" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence baseFrequency="0.04" numOctaves="3" seed="5"/>
      <feDisplacementMap in="SourceGraphic" scale="4"/>
    </filter>
    <filter id="wcBlur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1500" height="800" fill="#FFF8E7"/>
  
  <!-- Title bar -->
  <rect x="0" y="0" width="1500" height="80" fill="#2C5F2D"/>
  <text x="750" y="40" font-size="28" font-weight="900" fill="#FFF8E7" text-anchor="middle">水彩風 — 線の表現3パターン</text>
  <text x="750" y="65" font-size="16" fill="#B8E0B0" text-anchor="middle">どの線の表現が好みですか?</text>
  
  <!-- ============== PATTERN A: Clear ink lines ============== -->
  <g transform="translate(0, 100)">
    <rect x="20" y="20" width="460" height="660" rx="20" fill="white" stroke="#DDD" stroke-width="2"/>
    <text x="250" y="55" font-size="22" font-weight="bold" fill="#2C5F2D" text-anchor="middle">A: インクの線をはっきり</text>
    <text x="250" y="80" font-size="13" fill="#666" text-anchor="middle">輪郭くっきり・絵本感</text>
    
    <!-- Paper texture background -->
    <rect x="60" y="120" width="380" height="500" fill="#FFFEF8" rx="4"/>
    
    <g transform="translate(250, 380)">
      <!-- Watercolor bleeds (background) -->
      <g filter="url(#wcBlur)" opacity="0.4">
        <ellipse cx="0" cy="-180" rx="80" ry="40" fill="#9BCB7A"/>
        <ellipse cx="-15" cy="-20" rx="80" ry="100" fill="#E8DCC0"/>
        <ellipse cx="20" cy="120" rx="65" ry="50" fill="#D5C8A8"/>
      </g>
      
      <!-- Watercolor leaves -->
      <g filter="url(#wcRough)" opacity="0.8">
        <path d="M -50 -135 Q -65 -190 -38 -210 Q -22 -185 -25 -148" fill="url(#wcLeaf)"/>
        <path d="M -18 -140 Q -12 -205 8 -218 Q 22 -200 16 -150" fill="url(#wcLeaf)"/>
        <path d="M 22 -140 Q 35 -200 50 -190 Q 55 -175 45 -145" fill="url(#wcLeaf)"/>
      </g>
      
      <!-- Watercolor body -->
      <g filter="url(#wcRough)">
        <path d="M -50 -130 L 50 -130 Q 55 -130 55 -120 L 50 100 Q 45 130 0 140 Q -45 130 -50 100 L -55 -120 Q -55 -130 -50 -130 Z" fill="url(#wcBody)"/>
        <path d="M -50 100 Q 0 150 50 100 Q 25 175 0 180 Q -25 175 -50 100 Z" fill="url(#wcBody)" opacity="0.95"/>
      </g>
      
      <!-- STRONG ink lines (Pattern A) -->
      <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
        <path d="M -52 -128 Q -54 -132 -50 -130 L 50 -132 Q 56 -125 55 -118 L 50 102 Q 47 130 0 140 Q -45 132 -50 100 L -55 -118 Q -56 -130 -50 -130"/>
        <path d="M -48 102 Q 0 150 50 100 Q 25 174 2 180 Q -22 174 -48 102"/>
        <path d="M -50 -135 Q -65 -188 -38 -210"/>
        <path d="M -38 -210 Q -22 -185 -25 -148"/>
        <path d="M -18 -140 Q -12 -204 7 -217"/>
        <path d="M 7 -217 Q 22 -200 16 -150"/>
        <path d="M 22 -140 Q 35 -200 50 -190"/>
        <path d="M 50 -190 Q 55 -175 45 -145"/>
        <path d="M -36 -195 L -30 -150" opacity="0.7"/>
        <path d="M 5 -205 L 2 -150" opacity="0.7"/>
        <path d="M 38 -190 L 38 -148" opacity="0.7"/>
      </g>
    </g>
  </g>
  
  <!-- ============== PATTERN B: Soft thin lines ============== -->
  <g transform="translate(500, 100)">
    <rect x="20" y="20" width="460" height="660" rx="20" fill="white" stroke="#DDD" stroke-width="2"/>
    <text x="250" y="55" font-size="22" font-weight="bold" fill="#2C5F2D" text-anchor="middle">B: 線を薄く・水彩を主役</text>
    <text x="250" y="80" font-size="13" fill="#666" text-anchor="middle">柔らかい・絵画的</text>
    
    <rect x="60" y="120" width="380" height="500" fill="#FFFEF8" rx="4"/>
    
    <g transform="translate(250, 380)">
      <!-- Watercolor bleeds (more vibrant) -->
      <g filter="url(#wcBlur)" opacity="0.5">
        <ellipse cx="0" cy="-180" rx="85" ry="45" fill="#9BCB7A"/>
        <ellipse cx="-15" cy="-20" rx="85" ry="110" fill="#E8DCC0"/>
        <ellipse cx="20" cy="120" rx="70" ry="55" fill="#D5C8A8"/>
        <!-- Extra bleed dots -->
        <circle cx="40" cy="-150" r="15" fill="#7BAB46" opacity="0.4"/>
        <circle cx="-50" cy="50" r="20" fill="#D5C0A0" opacity="0.4"/>
      </g>
      
      <!-- Watercolor leaves (more layered) -->
      <g filter="url(#wcRough)">
        <path d="M -50 -135 Q -65 -190 -38 -210 Q -22 -185 -25 -148" fill="url(#wcLeaf)" opacity="0.9"/>
        <path d="M -18 -140 Q -12 -205 8 -218 Q 22 -200 16 -150" fill="url(#wcLeaf)" opacity="0.9"/>
        <path d="M 22 -140 Q 35 -200 50 -190 Q 55 -175 45 -145" fill="url(#wcLeaf)" opacity="0.9"/>
        <!-- Inner leaf darker areas -->
        <ellipse cx="-32" cy="-180" rx="6" ry="20" fill="#3D6720" opacity="0.4"/>
        <ellipse cx="0" cy="-200" rx="6" ry="22" fill="#3D6720" opacity="0.4"/>
      </g>
      
      <!-- Watercolor body with more variation -->
      <g filter="url(#wcRough)">
        <path d="M -50 -130 L 50 -130 Q 55 -130 55 -120 L 50 100 Q 45 130 0 140 Q -45 130 -50 100 L -55 -120 Q -55 -130 -50 -130 Z" fill="url(#wcBody)"/>
        <path d="M -50 100 Q 0 150 50 100 Q 25 175 0 180 Q -25 175 -50 100 Z" fill="url(#wcBody)" opacity="0.95"/>
        <!-- Body shading -->
        <ellipse cx="25" cy="0" rx="20" ry="60" fill="#A89E80" opacity="0.2"/>
      </g>
      
      <!-- THIN soft lines (Pattern B) -->
      <g stroke="#5D4E37" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.5">
        <path d="M -52 -128 Q -54 -132 -50 -130 L 50 -132 Q 56 -125 55 -118 L 50 102 Q 47 130 0 140 Q -45 132 -50 100 L -55 -118 Q -56 -130 -50 -130"/>
        <path d="M -48 102 Q 0 150 50 100 Q 25 174 2 180 Q -22 174 -48 102"/>
        <path d="M -50 -135 Q -65 -188 -38 -210"/>
        <path d="M -38 -210 Q -22 -185 -25 -148"/>
        <path d="M -18 -140 Q -12 -204 7 -217"/>
        <path d="M 7 -217 Q 22 -200 16 -150"/>
        <path d="M 22 -140 Q 35 -200 50 -190"/>
        <path d="M 50 -190 Q 55 -175 45 -145"/>
      </g>
      <!-- Even more delicate inner lines -->
      <g stroke="#5D4E37" stroke-width="0.8" fill="none" stroke-linecap="round" opacity="0.3">
        <path d="M -36 -195 L -30 -150"/>
        <path d="M 5 -205 L 2 -150"/>
        <path d="M 38 -190 L 38 -148"/>
      </g>
    </g>
  </g>
  
  <!-- ============== PATTERN C: No lines, watercolor only ============== -->
  <g transform="translate(1000, 100)">
    <rect x="20" y="20" width="460" height="660" rx="20" fill="white" stroke="#DDD" stroke-width="2"/>
    <text x="250" y="55" font-size="22" font-weight="bold" fill="#2C5F2D" text-anchor="middle">C: 線なし・水彩のみ</text>
    <text x="250" y="80" font-size="13" fill="#666" text-anchor="middle">最も柔らかい・印象派</text>
    
    <rect x="60" y="120" width="380" height="500" fill="#FFFEF8" rx="4"/>
    
    <g transform="translate(250, 380)">
      <!-- Watercolor bleeds (extra rich for compensation) -->
      <g filter="url(#wcBlur)" opacity="0.55">
        <ellipse cx="0" cy="-180" rx="90" ry="50" fill="#9BCB7A"/>
        <ellipse cx="-15" cy="-20" rx="90" ry="120" fill="#E8DCC0"/>
        <ellipse cx="20" cy="120" rx="75" ry="60" fill="#D5C8A8"/>
        <!-- More bleed dots -->
        <circle cx="40" cy="-150" r="20" fill="#7BAB46" opacity="0.5"/>
        <circle cx="-50" cy="50" r="25" fill="#D5C0A0" opacity="0.5"/>
        <circle cx="35" cy="60" r="18" fill="#C8B898" opacity="0.4"/>
        <circle cx="-35" cy="-80" r="14" fill="#B8E0B0" opacity="0.3"/>
      </g>
      
      <!-- Watercolor leaves (rich) -->
      <g filter="url(#wcRough)">
        <!-- Multiple layers for depth -->
        <path d="M -55 -135 Q -70 -195 -40 -215 Q -22 -188 -25 -148" fill="url(#wcLeaf)" opacity="0.7"/>
        <path d="M -50 -135 Q -65 -190 -38 -210 Q -22 -185 -25 -148" fill="url(#wcLeaf)" opacity="0.95"/>
        
        <path d="M -20 -140 Q -14 -210 10 -222 Q 24 -202 16 -150" fill="url(#wcLeaf)" opacity="0.7"/>
        <path d="M -18 -140 Q -12 -205 8 -218 Q 22 -200 16 -150" fill="url(#wcLeaf)" opacity="0.95"/>
        
        <path d="M 20 -140 Q 35 -205 52 -195 Q 58 -175 45 -145" fill="url(#wcLeaf)" opacity="0.7"/>
        <path d="M 22 -140 Q 35 -200 50 -190 Q 55 -175 45 -145" fill="url(#wcLeaf)" opacity="0.95"/>
        
        <!-- Deeper green centers -->
        <ellipse cx="-32" cy="-180" rx="8" ry="25" fill="#2C5F2D" opacity="0.5"/>
        <ellipse cx="0" cy="-200" rx="8" ry="27" fill="#2C5F2D" opacity="0.5"/>
        <ellipse cx="38" cy="-180" rx="7" ry="22" fill="#2C5F2D" opacity="0.5"/>
      </g>
      
      <!-- Watercolor body (richer with more shading) -->
      <g filter="url(#wcRough)">
        <!-- Outer wash (lighter, larger) -->
        <path d="M -55 -130 L 55 -130 Q 60 -130 60 -120 L 55 105 Q 50 135 0 145 Q -50 135 -55 105 L -60 -120 Q -60 -130 -55 -130 Z" fill="url(#wcBody)" opacity="0.5"/>
        
        <!-- Main body -->
        <path d="M -50 -130 L 50 -130 Q 55 -130 55 -120 L 50 100 Q 45 130 0 140 Q -45 130 -50 100 L -55 -120 Q -55 -130 -50 -130 Z" fill="url(#wcBody)"/>
        <path d="M -50 100 Q 0 150 50 100 Q 25 175 0 180 Q -25 175 -50 100 Z" fill="url(#wcBody)" opacity="0.95"/>
        
        <!-- Right side shading -->
        <ellipse cx="30" cy="0" rx="25" ry="80" fill="#A89E80" opacity="0.25"/>
        <!-- Bottom shading -->
        <ellipse cx="0" cy="100" rx="40" ry="20" fill="#A89E80" opacity="0.2"/>
        <!-- Highlight on left -->
        <ellipse cx="-25" cy="-30" rx="10" ry="60" fill="#FFFFFF" opacity="0.4"/>
      </g>
    </g>
  </g>
</svg>
