<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="Noto Sans CJK JP, sans-serif">
  <rect width="1080" height="600" fill="#FFFFFF" rx="20"/>

  <!-- Header -->
  <text x="60" y="60" font-size="44" font-weight="900" fill="#3A5A6A">サバ</text>
  <line x1="60" y1="75" x2="180" y2="75" stroke="#3A5A6A" stroke-width="4"/>
  <text x="200" y="68" font-size="22" fill="#666">旬:秋〜冬</text>

  <line x1="540" y1="100" x2="540" y2="540" stroke="#DDD" stroke-width="2" stroke-dasharray="6,6"/>

  <!-- OK side -->
  <g transform="translate(280, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#2C5F2D"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">○</text>

    <defs>
      <linearGradient id="wcBodySaba" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#3A5A6A" stop-opacity="0.92"/>
        <stop offset="35%" stop-color="#5C7A8A" stop-opacity="0.9"/>
        <stop offset="55%" stop-color="#A8BCC4" stop-opacity="0.92"/>
        <stop offset="80%" stop-color="#E8E8E0" stop-opacity="0.9"/>
        <stop offset="100%" stop-color="#D0D0C8" stop-opacity="0.85"/>
      </linearGradient>
      <filter id="wcRoughSaba" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.04" numOctaves="3" seed="31"/>
        <feDisplacementMap in="SourceGraphic" scale="3"/>
      </filter>
      <filter id="wcBlurSaba">
        <feGaussianBlur stdDeviation="1.5"/>
      </filter>
    </defs>

    <!-- Watercolor bleeds -->
    <g filter="url(#wcBlurSaba)" opacity="0.4">
      <ellipse cx="0" cy="0" rx="195" ry="50" fill="#5C7A8A"/>
    </g>

    <!-- 本体: スリムな細長い形(サバの特徴) -->
    <g filter="url(#wcRoughSaba)">
      <path d="M -195 0
               Q -190 -35 -130 -42
               Q -50 -47 50 -42
               Q 120 -38 145 -22
               L 188 -45
               L 180 0
               L 188 45
               L 145 22
               Q 120 38 50 42
               Q -50 47 -130 42
               Q -190 35 -195 0 Z" fill="url(#wcBodySaba)"/>
    </g>

    <!-- Strong ink lines -->
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
      <!-- 本体輪郭 -->
      <path d="M -195 0 Q -190 -35 -130 -42 Q -50 -47 50 -42 Q 120 -38 145 -22 L 188 -45 L 180 0 L 188 45 L 145 22 Q 120 38 50 42 Q -50 47 -130 42 Q -190 35 -195 0 Z"/>
      <!-- 尾びれ内側の線 -->
      <path d="M 145 -22 L 188 -45" opacity="0.6"/>
      <path d="M 145 22 L 188 45" opacity="0.6"/>
      <path d="M 160 -25 L 180 -38" stroke-width="1.5" opacity="0.65"/>
      <path d="M 165 0 L 183 0" stroke-width="1.5" opacity="0.65"/>
      <path d="M 160 25 L 180 38" stroke-width="1.5" opacity="0.65"/>

      <!-- ★背中の波模様(さば模様、サバの最大の特徴) -->
      <path d="M -100 -25 Q -85 -32 -70 -25 Q -55 -32 -40 -25" stroke="#1F3845" stroke-width="3.5" opacity="0.85"/>
      <path d="M -25 -28 Q -10 -35 5 -28 Q 20 -35 35 -28" stroke="#1F3845" stroke-width="3.5" opacity="0.85"/>
      <path d="M 50 -27 Q 65 -33 80 -27 Q 95 -33 110 -27" stroke="#1F3845" stroke-width="3.5" opacity="0.85"/>
      <!-- 上段の波 -->
      <path d="M -90 -33 Q -75 -37 -60 -33" stroke="#1F3845" stroke-width="2.5" opacity="0.7"/>
      <path d="M -15 -35 Q 0 -39 15 -35" stroke="#1F3845" stroke-width="2.5" opacity="0.7"/>
      <path d="M 60 -33 Q 75 -37 90 -33" stroke="#1F3845" stroke-width="2.5" opacity="0.7"/>

      <!-- 目(澄んでいる) -->
      <circle cx="-160" cy="-12" r="10" fill="#FFFFFF"/>
      <circle cx="-159" cy="-11" r="6" fill="#3D2817"/>
      <circle cx="-157" cy="-14" r="2.2" fill="#FFFFFF"/>

      <!-- エラ -->
      <path d="M -115 -32 Q -115 0 -110 32" stroke-width="2.5"/>
      <!-- エラの内側(赤、新鮮さ) -->
      <path d="M -118 -20 Q -118 0 -113 20" stroke="#C62828" stroke-width="1.5" opacity="0.6"/>

      <!-- 背びれ(2つ、サバの特徴) -->
      <path d="M -55 -42 L -45 -62 L -28 -55 L -22 -45" stroke-width="2.5"/>
      <!-- 第二背びれ -->
      <path d="M 50 -45 Q 70 -55 95 -45" stroke-width="2"/>
      <path d="M 60 -45 L 75 -55 L 90 -45" stroke-width="1.5"/>
      <!-- 小離鰭(サバの特徴、尾の手前に小さなヒレが並ぶ) -->
      <path d="M 110 -30 L 113 -35 L 117 -30" stroke-width="1.8"/>
      <path d="M 122 -28 L 125 -33 L 129 -28" stroke-width="1.8"/>
      <path d="M 110 30 L 113 35 L 117 30" stroke-width="1.8"/>
      <path d="M 122 28 L 125 33 L 129 28" stroke-width="1.8"/>

      <!-- 腹びれ -->
      <path d="M -75 42 Q -65 56 -55 42" stroke-width="2.5"/>
    </g>

    <!-- 銀色の腹のハイライト -->
    <ellipse cx="-30" cy="22" rx="85" ry="8" fill="#FFFFFF" opacity="0.55"/>
    <ellipse cx="-50" cy="20" rx="40" ry="3" fill="#FFFFFF" opacity="0.7"/>

    <!-- 影 -->
    <ellipse cx="-30" cy="75" rx="170" ry="5" fill="#3D2817" opacity="0.12"/>
  </g>

  <!-- NG side -->
  <g transform="translate(800, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#C62828"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">×</text>

    <!-- 本体(くすんだ色) -->
    <path d="M -195 0 Q -190 -35 -130 -42 Q -50 -47 50 -42 Q 120 -38 145 -22 L 188 -45 L 180 0 L 188 45 L 145 22 Q 120 38 50 42 Q -50 47 -130 42 Q -190 35 -195 0 Z" fill="#888888"/>

    <!-- 波模様(ぼやけて目立たない) -->
    <g stroke="#3D3F45" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5">
      <path d="M -100 -25 Q -75 -28 -50 -25"/>
      <path d="M -25 -28 Q 0 -32 25 -28"/>
      <path d="M 50 -27 Q 80 -30 110 -27"/>
    </g>

    <!-- ドリップ(血液が出ている) -->
    <ellipse cx="-50" cy="20" rx="22" ry="6" fill="#7A2820" opacity="0.5"/>
    <ellipse cx="0" cy="25" rx="18" ry="5" fill="#7A2820" opacity="0.45"/>
    <ellipse cx="50" cy="22" rx="15" ry="5" fill="#7A2820" opacity="0.45"/>
    <!-- 茶色シミ -->
    <ellipse cx="-65" cy="0" rx="11" ry="6" fill="#7A4A1F" opacity="0.5"/>
    <ellipse cx="40" cy="-5" rx="9" ry="5" fill="#7A4A1F" opacity="0.45"/>

    <!-- 目(濁る) -->
    <circle cx="-160" cy="-12" r="10" fill="#C8C0B0" stroke="#3D2817" stroke-width="2.5"/>
    <circle cx="-159" cy="-11" r="6" fill="#7A7060" opacity="0.7"/>

    <!-- 輪郭 -->
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M -195 0 Q -190 -35 -130 -42 Q -50 -47 50 -42 Q 120 -38 145 -22 L 188 -45 L 180 0 L 188 45 L 145 22 Q 120 38 50 42 Q -50 47 -130 42 Q -190 35 -195 0 Z"/>
      <path d="M 145 -22 L 188 -45" opacity="0.6"/>
      <path d="M 145 22 L 188 45" opacity="0.6"/>

      <!-- エラ(黒ずむ) -->
      <path d="M -115 -32 Q -115 0 -110 32" stroke-width="2.5"/>
      <path d="M -118 -20 Q -118 0 -113 20" stroke="#5A3215" stroke-width="1.5" opacity="0.6"/>

      <!-- 背びれ -->
      <path d="M -55 -42 L -45 -62 L -28 -55 L -22 -45" stroke-width="2.5"/>
      <path d="M 50 -45 Q 70 -55 95 -45" stroke-width="2"/>
      <!-- 小離鰭 -->
      <path d="M 110 -30 L 113 -35 L 117 -30" stroke-width="1.8"/>
      <path d="M 122 -28 L 125 -33 L 129 -28" stroke-width="1.8"/>
      <!-- 腹びれ -->
      <path d="M -75 42 Q -65 56 -55 42" stroke-width="2.5"/>
    </g>

    <ellipse cx="-30" cy="75" rx="170" ry="5" fill="#3D2817" opacity="0.1"/>
  </g>

  <!-- Comparison labels -->
  <g font-size="20" fill="#333">
    <rect x="60" y="495" width="460" height="80" rx="8" fill="#E8F5E9"/>
    <text x="80" y="520" font-weight="bold" fill="#2C5F2D">● 背の青緑色が鮮やか、波模様クッキリ</text>
    <text x="80" y="545" font-weight="bold" fill="#2C5F2D">● 目が澄んで黒目クッキリ、エラ鮮赤</text>
    <text x="80" y="568" fill="#666" font-size="17">小離鰭(尾の手前のヒレ)がしっかり並ぶ</text>

    <rect x="560" y="495" width="460" height="80" rx="8" fill="#FFEBEE"/>
    <text x="580" y="520" font-weight="bold" fill="#C62828">× 波模様がぼやけて、体表がくすむ</text>
    <text x="580" y="545" font-weight="bold" fill="#C62828">× 目が白濁、ドリップが多く出る</text>
    <text x="580" y="568" fill="#666" font-size="17">サバは鮮度落ちが早い=その日のうちに調理</text>
  </g>
</svg>
