<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="Noto Sans CJK JP, sans-serif">
  <rect width="1080" height="600" fill="#FFFFFF" rx="20"/>

  <!-- Header -->
  <text x="60" y="60" font-size="44" font-weight="900" fill="#F8AAA0">桃</text>
  <line x1="60" y1="75" x2="90" y2="75" stroke="#F8AAA0" stroke-width="4"/>
  <text x="110" y="68" font-size="22" fill="#666">旬:6〜9月</text>

  <line x1="540" y1="100" x2="540" y2="540" stroke="#DDD" stroke-width="2" stroke-dasharray="6,6"/>

  <!-- OK side (watercolor Pattern A) -->
  <g transform="translate(280, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#2C5F2D"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">○</text>
    <defs>
      <radialGradient id="wcBodyPeach" cx="35%" cy="25%"><stop offset="0%" stop-color="#FFEDE5" stop-opacity="0.95"/><stop offset="40%" stop-color="#FCC8B8" stop-opacity="0.9"/><stop offset="80%" stop-color="#F8AAA0" stop-opacity="0.85"/><stop offset="100%" stop-color="#D08070" stop-opacity="0.65"/></radialGradient>
      <radialGradient id="wcLeafPeach" cx="50%" cy="20%"><stop offset="0%" stop-color="#9BCB7A" stop-opacity="0.9"/><stop offset="60%" stop-color="#5D8F3D" stop-opacity="0.7"/><stop offset="100%" stop-color="#2C5F2D" stop-opacity="0.5"/></radialGradient>
      <filter id="wcRoughPeach" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.04" numOctaves="3" seed="139"/>
        <feDisplacementMap in="SourceGraphic" scale="4"/>
      </filter>
      <filter id="wcBlurPeach"><feGaussianBlur stdDeviation="1.5"/></filter>
    </defs>
    <g filter="url(#wcBlurPeach)" opacity="0.4"><ellipse cx="0" cy="0" rx="95" ry="95" fill="#FCC8B8"/></g>
    <g filter="url(#wcRoughPeach)" opacity="0.8"><path d="M 5 -90 Q 18 -100 25 -85 Q 18 -78 8 -83 Z" fill="url(#wcLeafPeach)"/></g>
    <g filter="url(#wcRoughPeach)"><path d="M 0 -95 Q -85 -85 -90 -10 Q -90 75 0 95 Q 90 75 90 -10 Q 85 -85 0 -95 Z" fill="url(#wcBodyPeach)"/></g>
    
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"><path d="M 0 -95 Q -85 -85 -90 -10 Q -90 75 0 95 Q 90 75 90 -10 Q 85 -85 0 -95 Z"/><path d="M 0 -95 Q 5 0 0 95" opacity="0.65" stroke-width="1.6"/><path d="M 0 -95 L -3 -110" opacity="0.85" stroke-width="2.5"/><path d="M 5 -90 Q 18 -100 25 -85 Q 18 -78 8 -83" opacity="0.85" stroke-width="2"/><path d="M -50 -40 L -47 -38" opacity="0.5" stroke-width="1.3"/><path d="M -30 30 L -27 32" opacity="0.5" stroke-width="1.3"/><path d="M 40 -20 L 43 -18" opacity="0.5" stroke-width="1.3"/><path d="M 30 50 L 33 52" opacity="0.5" stroke-width="1.3"/></g>
  </g>

  <!-- NG side (flat) -->
  <g transform="translate(800, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#C62828"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">×</text>
    <path d="M 0 -95 Q -85 -85 -90 -10 Q -90 75 0 95 Q 90 75 90 -10 Q 85 -85 0 -95 Z" fill="#A06860"/><ellipse cx="-30" cy="30" rx="25" ry="22" fill="#5D2A20" opacity="0.55"/><ellipse cx="25" cy="-20" rx="18" ry="14" fill="#5D2A20" opacity="0.5"/><path d="M -60 0 Q 0 8 60 0" stroke="#5D4E37" stroke-width="1.5" fill="none" opacity="0.55"/>
  </g>

  <!-- Comparison labels -->
  <g font-size="20" fill="#333">
    <rect x="60" y="495" width="460" height="80" rx="8" fill="#E8F5E9"/>
    <text x="80" y="520" font-weight="bold" fill="#2C5F2D">● 色が均一、ハリあり</text>
    <text x="80" y="545" font-weight="bold" fill="#2C5F2D">● 甘い香りが漂う</text>
    <text x="80" y="568" fill="#666" font-size="17">触ると指紋が残るくらい軟が完熟</text>

    <rect x="560" y="495" width="460" height="80" rx="8" fill="#FFEBEE"/>
    <text x="580" y="520" font-weight="bold" fill="#C62828">× 色がくすむ・打痕あり</text>
    <text x="580" y="545" font-weight="bold" fill="#C62828">× 硬すぎ or ブヨブヨ</text>
    <text x="580" y="568" fill="#666" font-size="17">硬いなら常温で2〜3日追熟</text>
  </g>
</svg>
