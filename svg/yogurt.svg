<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="Noto Sans CJK JP, sans-serif">
  <rect width="1080" height="600" fill="#FFFFFF" rx="20"/>

  <!-- Header -->
  <text x="60" y="60" font-size="44" font-weight="900" fill="#C8A878">ヨーグルト</text>
  <line x1="60" y1="75" x2="210" y2="75" stroke="#C8A878" stroke-width="4"/>
  <text x="230" y="68" font-size="22" fill="#666">旬:通年</text>

  <line x1="540" y1="100" x2="540" y2="540" stroke="#DDD" stroke-width="2" stroke-dasharray="6,6"/>

  <!-- OK side: cup with peeled-flat foil lid + clean white surface + small whey droplets -->
  <g transform="translate(280, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#2C5F2D"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">○</text>
    <defs>
      <radialGradient id="wcYogurtBody" cx="50%" cy="20%">
        <stop offset="0%" stop-color="#FAF0DA" stop-opacity="0.95"/>
        <stop offset="60%" stop-color="#EDE0C0" stop-opacity="0.92"/>
        <stop offset="100%" stop-color="#C8B088" stop-opacity="0.88"/>
      </radialGradient>
      <radialGradient id="wcYogurtSurface" cx="50%" cy="50%">
        <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
        <stop offset="80%" stop-color="#FAF7EE" stop-opacity="0.97"/>
        <stop offset="100%" stop-color="#E8DCC0" stop-opacity="0.5"/>
      </radialGradient>
      <linearGradient id="wcFoilOK" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#F5F2E8" stop-opacity="0.95"/>
        <stop offset="50%" stop-color="#E0DDC8" stop-opacity="0.95"/>
        <stop offset="100%" stop-color="#B8B098" stop-opacity="0.92"/>
      </linearGradient>
      <filter id="wcRoughYogurt" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.05" numOctaves="3" seed="211"/>
        <feDisplacementMap in="SourceGraphic" scale="2"/>
      </filter>
      <filter id="wcBlurYogurt"><feGaussianBlur stdDeviation="1.5"/></filter>
    </defs>

    <!-- Soft drop shadow -->
    <ellipse cx="0" cy="118" rx="62" ry="8" fill="#3D2817" opacity="0.18"/>

    <g filter="url(#wcRoughYogurt)">
      <!-- Cup side wall -->
      <path d="M -85 -90 Q -80 80 -52 115 L 52 115 Q 80 80 85 -90 Z" fill="url(#wcYogurtBody)"/>
    </g>

    <!-- Top rim outer (broad oval — clearly a circular cup mouth) -->
    <ellipse cx="0" cy="-90" rx="85" ry="22" fill="#E8DCC0" stroke="#3D2817" stroke-width="3"/>
    <!-- White yogurt surface (visible) -->
    <ellipse cx="0" cy="-92" rx="76" ry="17" fill="url(#wcYogurtSurface)" stroke="#D0C0A0" stroke-width="1.3"/>

    <!-- Small whey droplets on surface (translucent pale yellow, fresh sign) -->
    <g fill="#F0E090" opacity="0.42">
      <ellipse cx="-25" cy="-92" rx="9" ry="2.5"/>
      <ellipse cx="12" cy="-90" rx="6" ry="2"/>
      <ellipse cx="35" cy="-95" rx="5" ry="1.8"/>
    </g>
    <!-- Tiny highlights on whey droplets -->
    <g fill="#FFFFFF" opacity="0.7">
      <ellipse cx="-27" cy="-93" rx="2" ry="0.8"/>
      <ellipse cx="11" cy="-91" rx="1.5" ry="0.6"/>
    </g>

    <!-- Subtle surface ripples -->
    <g fill="none" stroke="#EDE3D0" stroke-width="1.4" opacity="0.7">
      <ellipse cx="0" cy="-92" rx="40" ry="9"/>
      <ellipse cx="0" cy="-92" rx="60" ry="13"/>
    </g>

    <!-- ========================================================== -->
    <!-- PEELED FOIL LID — taut, half-peeled, hinged along right rim -->
    <!-- Large leaf-shaped flap so the silhouette clearly says
         "this is opened yogurt", not pudding / tofu / chawan-mushi. -->
    <g>
      <!-- Foil sheet: extends from rim hinge up-and-right -->
      <path d="M 30 -100
               C 30 -125, 50 -148, 78 -148
               C 96 -145, 100 -125, 96 -108
               Q 92 -94 82 -90
               Q 60 -88 45 -92
               Q 32 -94 30 -100 Z"
            fill="url(#wcFoilOK)" stroke="#3D2817" stroke-width="3" stroke-linejoin="round" opacity="0.95"/>
      <!-- Hinge fold crease (where foil meets rim) -->
      <path d="M 30 -100 Q 55 -92 82 -90" stroke="#3D2817" stroke-width="1.6" fill="none" opacity="0.7"/>
      <!-- Foil shine highlight (taut, flat surface) -->
      <path d="M 45 -135 Q 65 -140 88 -130" stroke="#FFFFFF" stroke-width="2.8" fill="none" opacity="0.85" stroke-linecap="round"/>
      <!-- Subtle metallic texture line -->
      <path d="M 40 -118 Q 60 -116 85 -120" stroke="#A89878" stroke-width="0.8" fill="none" opacity="0.5"/>
    </g>

    <!-- Highlight on cup rim front-left -->
    <path d="M -55 -107 Q 0 -113 55 -107" stroke="#FFFFFF" stroke-width="4" fill="none" opacity="0.85" stroke-linecap="round"/>
    <!-- Subtle shadow band under rim on body -->
    <path d="M -82 -85 Q 0 -73 82 -85" stroke="#C8B088" stroke-width="2.5" fill="none" opacity="0.5"/>

    <!-- Cup outline (last) -->
    <path d="M -85 -90 Q -80 80 -52 115 L 52 115 Q 80 80 85 -90" fill="none" stroke="#3D2817" stroke-width="3" stroke-linejoin="round"/>
  </g>

  <!-- NG side: bulging dome lid + discolored surface + slightly bulging cup walls -->
  <g transform="translate(800, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#C62828"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">×</text>
    <defs>
      <linearGradient id="wcFoilNG" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#EDE5D0" stop-opacity="0.95"/>
        <stop offset="50%" stop-color="#D5CDB0" stop-opacity="0.95"/>
        <stop offset="100%" stop-color="#A89878" stop-opacity="0.92"/>
      </linearGradient>
    </defs>
    <ellipse cx="0" cy="118" rx="62" ry="8" fill="#3D2817" opacity="0.18"/>
    <!-- Cup body with slight outward bulge in middle (internal pressure) -->
    <path d="M -85 -90 Q -95 0 -85 80 Q -80 105 -52 115 L 52 115 Q 80 105 85 80 Q 95 0 85 -90 Z" fill="#D8C8A0"/>
    <!-- Top rim -->
    <ellipse cx="0" cy="-90" rx="88" ry="23" fill="#C8B088" stroke="#3D2817" stroke-width="3"/>
    <!-- Yogurt surface (yellowed/discolored) -->
    <ellipse cx="0" cy="-92" rx="78" ry="18" fill="#F0E8C0" stroke="#A88830" stroke-width="1.3"/>
    <!-- Yellow whey separation pool (large, NG sign) -->
    <ellipse cx="-15" cy="-92" rx="42" ry="9" fill="#D8B040" opacity="0.7"/>
    <!-- Greenish-yellow discoloration patches -->
    <ellipse cx="-30" cy="-94" rx="9" ry="3.5" fill="#B8B048" opacity="0.6"/>
    <ellipse cx="20" cy="-95" rx="8" ry="3" fill="#A8B848" opacity="0.55"/>
    <ellipse cx="40" cy="-90" rx="6" ry="2.5" fill="#9AA840" opacity="0.5"/>
    <!-- Mold spots -->
    <ellipse cx="-50" cy="-93" rx="4" ry="2" fill="#5A6A30" opacity="0.7"/>
    <ellipse cx="48" cy="-94" rx="3" ry="1.5" fill="#5A6A30" opacity="0.7"/>

    <!-- DOMED/BULGING FOIL LID (gas pressure pushed it up, edge buckled) -->
    <g>
      <!-- Same overall silhouette as OK but with a clear central bulge
           and a wavy/distorted top edge — reads as "internal pressure". -->
      <path d="M 30 -100
               C 28 -128, 45 -148, 65 -148
               Q 75 -150 80 -147
               C 100 -148, 100 -120, 96 -108
               Q 92 -94 82 -90
               Q 60 -88 45 -92
               Q 32 -94 30 -100 Z"
            fill="url(#wcFoilNG)" stroke="#3D2817" stroke-width="3" stroke-linejoin="round" opacity="0.95"/>
      <!-- Wavy edge — buckled from pressure -->
      <path d="M 32 -118 Q 42 -130 52 -125 Q 60 -135 70 -130 Q 80 -135 90 -125"
            stroke="#3D2817" stroke-width="1.8" fill="none" opacity="0.75" stroke-linecap="round"/>
      <!-- Hinge crease -->
      <path d="M 30 -100 Q 55 -92 82 -90" stroke="#3D2817" stroke-width="1.6" fill="none" opacity="0.7"/>
      <!-- Stress wrinkles radiating from center bulge -->
      <path d="M 50 -110 Q 65 -120 85 -112" stroke="#A89878" stroke-width="0.9" fill="none" opacity="0.6"/>
      <path d="M 55 -125 Q 70 -132 85 -128" stroke="#A89878" stroke-width="0.9" fill="none" opacity="0.5"/>
      <!-- Dome highlight (round, suggests upward bulge) -->
      <ellipse cx="62" cy="-128" rx="12" ry="6" fill="#FFFFFF" opacity="0.5"/>
    </g>

    <!-- Cup outline (with bulge) -->
    <path d="M -85 -90 Q -95 0 -85 80 Q -80 105 -52 115 L 52 115 Q 80 105 85 80 Q 95 0 85 -90"
          fill="none" stroke="#3D2817" stroke-width="3" stroke-linejoin="round" opacity="0.85"/>
  </g>

  <!-- Comparison labels -->
  <g font-size="20" fill="#333">
    <rect x="60" y="495" width="460" height="80" rx="8" fill="#E8F5E9"/>
    <text x="80" y="520" font-weight="bold" fill="#2C5F2D">● 蓋ピンと水平/表面が真っ白</text>
    <text x="80" y="545" font-weight="bold" fill="#2C5F2D">● 透明な乳清がうっすら浮く</text>
    <text x="80" y="568" fill="#666" font-size="17">蓋を開けて爽やかな酸味の香り</text>

    <rect x="560" y="495" width="460" height="80" rx="8" fill="#FFEBEE"/>
    <text x="580" y="520" font-weight="bold" fill="#C62828">× 蓋がドーム状に膨らむ・縁が波打つ</text>
    <text x="580" y="545" font-weight="bold" fill="#C62828">× 表面がくすんだ黄/緑がかる</text>
    <text x="580" y="568" fill="#666" font-size="17">容器側面が膨らむ=発酵過剰=即廃棄</text>
  </g>
</svg>
