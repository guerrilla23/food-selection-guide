<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="Noto Sans CJK JP, sans-serif">
  <rect width="1080" height="600" fill="#FFFFFF" rx="20"/>

  <!-- Header -->
  <text x="60" y="60" font-size="44" font-weight="900" fill="#5D8F3D">ピーマン</text>
  <line x1="60" y1="75" x2="180" y2="75" stroke="#5D8F3D" stroke-width="4"/>
  <text x="200" y="68" font-size="22" fill="#666">旬:6〜9月</text>

  <line x1="540" y1="100" x2="540" y2="540" stroke="#DDD" stroke-width="2" stroke-dasharray="6,6"/>

  <!-- OK side (watercolor Pattern A) -->
  <g transform="translate(280, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#2C5F2D"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">○</text>
    <defs>
      <radialGradient id="wcBodyPiman" cx="35%" cy="25%"><stop offset="0%" stop-color="#D4E8B5" stop-opacity="0.95"/><stop offset="40%" stop-color="#9BCB7A" stop-opacity="0.9"/><stop offset="80%" stop-color="#5D8F3D" stop-opacity="0.85"/><stop offset="100%" stop-color="#2C5F2D" stop-opacity="0.65"/></radialGradient>
      <radialGradient id="wcLeafPiman" cx="50%" cy="20%"><stop offset="0%" stop-color="#9BCB7A" stop-opacity="0.9"/><stop offset="60%" stop-color="#5D8F3D" stop-opacity="0.7"/><stop offset="100%" stop-color="#2C5F2D" stop-opacity="0.5"/></radialGradient>
      <filter id="wcRoughPiman" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.04" numOctaves="3" seed="67"/>
        <feDisplacementMap in="SourceGraphic" scale="4"/>
      </filter>
      <filter id="wcBlurPiman"><feGaussianBlur stdDeviation="1.5"/></filter>
    </defs>
    <g filter="url(#wcBlurPiman)" opacity="0.4"><ellipse cx="0" cy="10" rx="80" ry="80" fill="#9BCB7A"/><ellipse cx="0" cy="-90" rx="25" ry="18" fill="#5D8F3D"/></g>
    <g filter="url(#wcRoughPiman)" opacity="0.8"><path d="M -10 -90 L -15 -110 L 0 -100 L 15 -110 L 10 -90 Z" fill="url(#wcLeafPiman)"/></g>
    <g filter="url(#wcRoughPiman)"><path d="M -75 -50 Q -85 60 -45 85 Q -25 75 0 80 Q 25 75 45 85 Q 85 60 75 -50 Q 65 -85 30 -85 Q 10 -78 0 -85 Q -10 -78 -30 -85 Q -65 -85 -75 -50 Z" fill="url(#wcBodyPiman)"/></g>
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"><path d="M -75 -50 Q -85 60 -45 85 Q -25 75 0 80 Q 25 75 45 85 Q 85 60 75 -50 Q 65 -85 30 -85 Q 10 -78 0 -85 Q -10 -78 -30 -85 Q -65 -85 -75 -50 Z"/><path d="M 0 -85 L 0 -105" opacity="0.85" stroke-width="2.5"/><path d="M -10 -90 L -15 -110" opacity="0.85" stroke-width="2"/><path d="M 0 -100 L 0 -85" opacity="0.85" stroke-width="2"/><path d="M 15 -110 L 10 -90" opacity="0.85" stroke-width="2"/><path d="M -50 -75 Q -55 0 -45 75" opacity="0.5" stroke-width="1.3"/><path d="M 0 -85 Q 0 0 0 80" opacity="0.5" stroke-width="1.3"/><path d="M 50 -75 Q 55 0 45 75" opacity="0.5" stroke-width="1.3"/></g>
  </g>

  <!-- NG side (flat) -->
  <g transform="translate(800, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#C62828"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">×</text>
    <path d="M -75 -50 Q -85 60 -45 85 Q -25 75 0 80 Q 25 75 45 85 Q 85 60 75 -50 Q 65 -85 30 -85 Q 10 -78 0 -85 Q -10 -78 -30 -85 Q -65 -85 -75 -50 Z" fill="#88A858"/><path d="M -10 -90 L -15 -108 L 0 -98 L 15 -108 L 10 -90 Z" fill="#A0A040"/><ellipse cx="-20" cy="30" rx="18" ry="14" fill="#7A5520" opacity="0.45"/><path d="M -50 0 Q 0 8 50 0" stroke="#5D4E37" stroke-width="1.5" fill="none" opacity="0.55"/><path d="M -45 30 Q 0 35 45 30" stroke="#5D4E37" stroke-width="1.5" fill="none" opacity="0.55"/>
  </g>

  <!-- Comparison labels -->
  <g font-size="20" fill="#333">
    <rect x="60" y="495" width="460" height="80" rx="8" fill="#E8F5E9"/>
    <text x="80" y="520" font-weight="bold" fill="#2C5F2D">● 色が濃緑、ハリ・ツヤあり</text>
    <text x="80" y="545" font-weight="bold" fill="#2C5F2D">● ヘタが鮮やかな緑</text>
    <text x="80" y="568" fill="#666" font-size="17">肉厚・指で押して凹まない</text>

    <rect x="560" y="495" width="460" height="80" rx="8" fill="#FFEBEE"/>
    <text x="580" y="520" font-weight="bold" fill="#C62828">× 色がぼやける、シワ</text>
    <text x="580" y="545" font-weight="bold" fill="#C62828">× ヘタが乾く・茶色</text>
    <text x="580" y="568" fill="#666" font-size="17">柔らかい=水分抜け、苦み強</text>
  </g>
</svg>
