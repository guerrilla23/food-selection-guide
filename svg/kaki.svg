<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="Noto Sans CJK JP, sans-serif">
  <rect width="1080" height="600" fill="#FFFFFF" rx="20"/>

  <!-- Header -->
  <text x="60" y="60" font-size="44" font-weight="900" fill="#FF8C42">柿</text>
  <line x1="60" y1="75" x2="90" y2="75" stroke="#FF8C42" stroke-width="4"/>
  <text x="110" y="68" font-size="22" fill="#666">旬:9〜11月</text>

  <line x1="540" y1="100" x2="540" y2="540" stroke="#DDD" stroke-width="2" stroke-dasharray="6,6"/>

  <!-- OK side (watercolor Pattern A) -->
  <g transform="translate(280, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#2C5F2D"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">○</text>
    <defs>
      <radialGradient id="wcBodyKaki" cx="35%" cy="25%"><stop offset="0%" stop-color="#FFD9B0" stop-opacity="0.95"/><stop offset="40%" stop-color="#FFB07A" stop-opacity="0.9"/><stop offset="80%" stop-color="#FF8C42" stop-opacity="0.85"/><stop offset="100%" stop-color="#D45F1A" stop-opacity="0.7"/></radialGradient>
      <radialGradient id="wcLeafKaki" cx="50%" cy="20%"><stop offset="0%" stop-color="#9BCB7A" stop-opacity="0.9"/><stop offset="60%" stop-color="#5D8F3D" stop-opacity="0.7"/><stop offset="100%" stop-color="#2C5F2D" stop-opacity="0.5"/></radialGradient>
      <filter id="wcRoughKaki" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.04" numOctaves="3" seed="149"/>
        <feDisplacementMap in="SourceGraphic" scale="4"/>
      </filter>
      <filter id="wcBlurKaki"><feGaussianBlur stdDeviation="1.5"/></filter>
    </defs>
    <g filter="url(#wcBlurKaki)" opacity="0.4"><ellipse cx="0" cy="5" rx="100" ry="80" fill="#FFB07A"/></g>
    <g filter="url(#wcRoughKaki)" opacity="0.8"><path d="M -45 -75 L -55 -100 L -25 -85 L -10 -105 L 0 -85 L 10 -105 L 25 -85 L 55 -100 L 45 -75 Q 0 -65 -45 -75 Z" fill="url(#wcLeafKaki)"/></g>
    <g filter="url(#wcRoughKaki)"><path d="M -90 -10 Q -95 60 0 85 Q 95 60 90 -10 Q 85 -75 0 -80 Q -85 -75 -90 -10 Z" fill="url(#wcBodyKaki)"/></g>
    
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"><path d="M -90 -10 Q -95 60 0 85 Q 95 60 90 -10 Q 85 -75 0 -80 Q -85 -75 -90 -10 Z"/><path d="M -45 -75 L -55 -100 L -25 -85 L -10 -105 L 0 -85 L 10 -105 L 25 -85 L 55 -100 L 45 -75" opacity="0.85" stroke-width="2.5"/><path d="M 0 -105 L 0 -118" opacity="0.85" stroke-width="2.5"/><path d="M -25 80 Q 0 85 25 80" opacity="0.5" stroke-width="1.4"/></g>
  </g>

  <!-- NG side (flat) -->
  <g transform="translate(800, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#C62828"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">×</text>
    <path d="M -90 -10 Q -95 60 0 85 Q 95 60 90 -10 Q 85 -75 0 -80 Q -85 -75 -90 -10 Z" fill="#C87830"/><path d="M -45 -75 L -55 -95 L -25 -85 L -10 -100 L 0 -85 L 10 -100 L 25 -85 L 55 -95 L 45 -75 Q 0 -68 -45 -75 Z" fill="#7A6720"/><ellipse cx="-30" cy="30" rx="25" ry="18" fill="#5D2A20" opacity="0.5"/><path d="M -65 0 Q 0 8 65 0" stroke="#5D4E37" stroke-width="1.5" fill="none" opacity="0.55"/>
  </g>

  <!-- Comparison labels -->
  <g font-size="20" fill="#333">
    <rect x="60" y="495" width="460" height="80" rx="8" fill="#E8F5E9"/>
    <text x="80" y="520" font-weight="bold" fill="#2C5F2D">● 色が濃い橙、ハリ・ツヤ</text>
    <text x="80" y="545" font-weight="bold" fill="#2C5F2D">● ヘタが緑、葉先がピン</text>
    <text x="80" y="568" fill="#666" font-size="17">甘柿=ヘタが密着、渋柿=隙間</text>

    <rect x="560" y="495" width="460" height="80" rx="8" fill="#FFEBEE"/>
    <text x="580" y="520" font-weight="bold" fill="#C62828">× 黒い斑点・打痕</text>
    <text x="580" y="545" font-weight="bold" fill="#C62828">× ヘタ茶色、葉先ヨレ</text>
    <text x="580" y="568" fill="#666" font-size="17">柔らかい=完熟の合図</text>
  </g>
</svg>
