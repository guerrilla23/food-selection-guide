<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="Noto Sans CJK JP, sans-serif">
  <rect width="1080" height="600" fill="#FFFFFF" rx="20"/>

  <!-- Header -->
  <text x="60" y="60" font-size="44" font-weight="900" fill="#9A3020">猪肉</text>
  <line x1="60" y1="75" x2="120" y2="75" stroke="#9A3020" stroke-width="4"/>
  <text x="140" y="68" font-size="22" fill="#666">旬:11〜2月(狩猟期)</text>

  <line x1="540" y1="100" x2="540" y2="540" stroke="#DDD" stroke-width="2" stroke-dasharray="6,6"/>

  <!-- OK side (watercolor Pattern A) -->
  <g transform="translate(280, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#2C5F2D"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">○</text>
    <defs>
      <radialGradient id="wcBodyBoar" cx="35%" cy="25%"><stop offset="0%" stop-color="#F8C8B8" stop-opacity="0.95"/><stop offset="40%" stop-color="#D87060" stop-opacity="0.9"/><stop offset="80%" stop-color="#9A3020" stop-opacity="0.85"/><stop offset="100%" stop-color="#581008" stop-opacity="0.65"/></radialGradient>
      <radialGradient id="wcLeafBoar" cx="50%" cy="20%"><stop offset="0%" stop-color="#9BCB7A" stop-opacity="0.9"/><stop offset="60%" stop-color="#5D8F3D" stop-opacity="0.7"/><stop offset="100%" stop-color="#2C5F2D" stop-opacity="0.5"/></radialGradient>
      <filter id="wcRoughBoar" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.04" numOctaves="3" seed="227"/>
        <feDisplacementMap in="SourceGraphic" scale="4"/>
      </filter>
      <filter id="wcBlurBoar"><feGaussianBlur stdDeviation="1.5"/></filter>
    </defs>
    <g filter="url(#wcBlurBoar)" opacity="0.4"><ellipse cx="0" cy="0" rx="110" ry="70" fill="#D87060"/></g>
    
    <g filter="url(#wcRoughBoar)"><path d="M -90 -45 Q -100 0 -90 50 Q 0 75 90 50 Q 100 0 90 -45 Q 0 -65 -90 -45 Z" fill="url(#wcBodyBoar)"/></g>
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"><path d="M -90 -45 Q -100 0 -90 50 Q 0 75 90 50 Q 100 0 90 -45 Q 0 -65 -90 -45 Z"/><path d="M -85 -28 Q 0 -25 85 -28" opacity="0.55" stroke-width="1.6"/><path d="M -82 -8 Q 0 -3 82 -8" opacity="0.65" stroke-width="1.5"/><path d="M -78 12 Q 0 17 78 12" opacity="0.65" stroke-width="1.5"/><path d="M -72 32 Q 0 37 72 32" opacity="0.65" stroke-width="1.5"/><path d="M -65 52 Q 0 57 65 52" opacity="0.65" stroke-width="1.5"/><path d="M -45 0 Q -25 5 -5 -5" opacity="0.7" stroke-width="2.2"/><path d="M 15 22 Q 35 27 55 18" opacity="0.7" stroke-width="2.2"/><path d="M -55 40 Q -30 45 -10 38" opacity="0.65" stroke-width="2"/></g>
  </g>

  <!-- NG side (flat) -->
  <g transform="translate(800, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#C62828"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">×</text>
    <path d="M -90 -45 Q -100 0 -90 50 Q 0 75 90 50 Q 100 0 90 -45 Q 0 -65 -90 -45 Z" fill="#783030"/><path d="M -85 -35 Q 0 -30 85 -35" stroke="#A88830" stroke-width="4" fill="none" opacity="0.7"/><ellipse cx="-25" cy="10" rx="25" ry="18" fill="#3D1818" opacity="0.5"/><ellipse cx="30" cy="30" rx="18" ry="12" fill="#3D1818" opacity="0.5"/><ellipse cx="0" cy="70" rx="60" ry="8" fill="#702018" opacity="0.6"/>
  </g>

  <!-- Comparison labels -->
  <g font-size="20" fill="#333">
    <rect x="60" y="495" width="460" height="80" rx="8" fill="#E8F5E9"/>
    <text x="80" y="520" font-weight="bold" fill="#2C5F2D">● 色が鮮ピンク赤、脂が白い</text>
    <text x="80" y="545" font-weight="bold" fill="#2C5F2D">● 脂と肉の境がくっきり</text>
    <text x="80" y="568" fill="#666" font-size="17">冬場の脂のった個体=甘い・旨味強</text>

    <rect x="560" y="495" width="460" height="80" rx="8" fill="#FFEBEE"/>
    <text x="580" y="520" font-weight="bold" fill="#C62828">× 色が暗赤、脂が黄ばむ</text>
    <text x="580" y="545" font-weight="bold" fill="#C62828">× 強い獣臭・ベタつき</text>
    <text x="580" y="568" fill="#666" font-size="17">夏場の個体=脂少なく硬め・臭い強</text>
  </g>
</svg>
