<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="Noto Sans CJK JP, sans-serif">
  <rect width="1080" height="600" fill="#FFFFFF" rx="20"/>

  <!-- Header -->
  <text x="60" y="60" font-size="44" font-weight="900" fill="#7BA05B">ニンニク</text>
  <line x1="60" y1="75" x2="240" y2="75" stroke="#7BA05B" stroke-width="4"/>
  <text x="260" y="68" font-size="22" fill="#666">旬:春・夏</text>

  <line x1="540" y1="100" x2="540" y2="540" stroke="#DDD" stroke-width="2" stroke-dasharray="6,6"/>

  <!-- OK side -->
  <g transform="translate(280, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#2C5F2D"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">○</text>

    <defs>
      <radialGradient id="wcBodyGarlic" cx="35%" cy="65%">
        <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
        <stop offset="60%" stop-color="#F5F0DC" stop-opacity="0.9"/>
        <stop offset="100%" stop-color="#D8C8A0" stop-opacity="0.85"/>
      </radialGradient>
      <filter id="wcRoughGarlic" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.04" numOctaves="3" seed="21"/>
        <feDisplacementMap in="SourceGraphic" scale="3"/>
      </filter>
      <filter id="wcBlurGarlic">
        <feGaussianBlur stdDeviation="1.5"/>
      </filter>
    </defs>

    <!-- Watercolor bleeds (下にお尻のような膨らみを強調するため、下部に集中) -->
    <g filter="url(#wcBlurGarlic)" opacity="0.4">
      <ellipse cx="0" cy="50" rx="115" ry="105" fill="#F0E5C8"/>
    </g>

    <!-- 上部の茎(短く尖る) -->
    <g filter="url(#wcRoughGarlic)">
      <path d="M -5 -150 Q 0 -165 5 -150 L 4 -135 Q 0 -133 -4 -135 Z" fill="#A89060"/>
    </g>

    <!-- 本体: 逆涙型(上が細く尖り、下がお尻のようにふっくら丸く膨らむ)
         参考画像をベースに、お尻形状を強調 -->
    <g filter="url(#wcRoughGarlic)">
      <path d="M 0 -135
               Q -15 -132 -25 -120
               Q -45 -95 -65 -55
               Q -90 -5 -100 50
               Q -100 95 -85 115
               Q -75 120 -65 110
               Q -50 122 -35 115
               Q -20 125 -8 117
               Q 0 130 8 117
               Q 20 125 35 115
               Q 50 122 65 110
               Q 75 120 85 115
               Q 100 95 100 50
               Q 90 -5 65 -55
               Q 45 -95 25 -120
               Q 15 -132 0 -135 Z" fill="url(#wcBodyGarlic)"/>
    </g>

    <!-- Strong ink lines -->
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
      <!-- 茎 -->
      <path d="M -5 -150 Q 0 -165 5 -150 L 4 -135 Q 0 -133 -4 -135 Z"/>
      <!-- 本体輪郭(逆涙型+下のお尻フリル) -->
      <path d="M 0 -135
               Q -15 -132 -25 -120
               Q -45 -95 -65 -55
               Q -90 -5 -100 50
               Q -100 95 -85 115
               Q -75 120 -65 110
               Q -50 122 -35 115
               Q -20 125 -8 117
               Q 0 130 8 117
               Q 20 125 35 115
               Q 50 122 65 110
               Q 75 120 85 115
               Q 100 95 100 50
               Q 90 -5 65 -55
               Q 45 -95 25 -120
               Q 15 -132 0 -135 Z"/>
      <!-- 鱗片の縦線(上の細い頂点から下のフリル各位置へ広がる) -->
      <path d="M -65 110 Q -45 30 -18 -125" opacity="0.7"/>
      <path d="M -35 115 Q -20 30 -3 -132" opacity="0.7"/>
      <path d="M 35 115 Q 20 30 3 -132" opacity="0.7"/>
      <path d="M 65 110 Q 45 30 18 -125" opacity="0.7"/>
    </g>

    <!-- ハイライト(光沢、上部の方に) -->
    <ellipse cx="-35" cy="-50" rx="20" ry="38" fill="#FFFFFF" opacity="0.45" transform="rotate(-15 -35 -50)"/>
  </g>

  <!-- NG side -->
  <g transform="translate(800, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#C62828"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">×</text>

    <!-- 上から伸びた緑の芽 -->
    <g stroke="#7AAB45" stroke-width="3" fill="none" stroke-linecap="round">
      <path d="M -5 -150 Q -10 -180 -16 -205"/>
      <path d="M 0 -152 Q 0 -185 -2 -215"/>
      <path d="M 5 -150 Q 12 -180 18 -205"/>
    </g>
    <path d="M -5 -150 Q 0 -160 5 -150 L 4 -135 Q 0 -133 -4 -135 Z" fill="#8A6028" stroke="#3D2817" stroke-width="2"/>

    <!-- 本体(くすんだ色) -->
    <path d="M 0 -135 Q -15 -132 -25 -120 Q -45 -95 -65 -55 Q -90 -5 -100 50 Q -100 95 -85 115 Q -75 120 -65 110 Q -50 122 -35 115 Q -20 125 -8 117 Q 0 130 8 117 Q 20 125 35 115 Q 50 122 65 110 Q 75 120 85 115 Q 100 95 100 50 Q 90 -5 65 -55 Q 45 -95 25 -120 Q 15 -132 0 -135 Z" fill="#D8C898"/>

    <!-- 鱗片の縦線 -->
    <g stroke="#5A3A15" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7">
      <path d="M -65 110 Q -45 30 -18 -125"/>
      <path d="M -35 115 Q -20 30 -3 -132"/>
      <path d="M 35 115 Q 20 30 3 -132"/>
      <path d="M 65 110 Q 45 30 18 -125"/>
    </g>

    <!-- 茶色のシミ(下のお尻部分に多め) -->
    <ellipse cx="-50" cy="30" rx="13" ry="16" fill="#7A4A1F" opacity="0.65"/>
    <ellipse cx="-48" cy="25" rx="6" ry="8" fill="#5A3215" opacity="0.75"/>
    <ellipse cx="42" cy="60" rx="11" ry="14" fill="#7A4A1F" opacity="0.6"/>
    <ellipse cx="-15" cy="80" rx="13" ry="9" fill="#7A4A1F" opacity="0.55"/>
    <circle cx="50" cy="-10" r="3" fill="#2A1F15" opacity="0.7"/>
    <circle cx="-25" cy="100" r="2.5" fill="#2A1F15" opacity="0.65"/>

    <!-- 輪郭 -->
    <path d="M 0 -135 Q -15 -132 -25 -120 Q -45 -95 -65 -55 Q -90 -5 -100 50 Q -100 95 -85 115 Q -75 120 -65 110 Q -50 122 -35 115 Q -20 125 -8 117 Q 0 130 8 117 Q 20 125 35 115 Q 50 122 65 110 Q 75 120 85 115 Q 100 95 100 50 Q 90 -5 65 -55 Q 45 -95 25 -120 Q 15 -132 0 -135 Z" stroke="#3D2817" stroke-width="3" fill="none"/>
  </g>

  <!-- Comparison labels -->
  <g font-size="20" fill="#333">
    <rect x="60" y="495" width="460" height="80" rx="8" fill="#E8F5E9"/>
    <text x="80" y="520" font-weight="bold" fill="#2C5F2D">● 表面が白くツヤがあり、薄皮がパリッと</text>
    <text x="80" y="545" font-weight="bold" fill="#2C5F2D">● 持つと硬く、ぎっしり詰まっている</text>
    <text x="80" y="568" fill="#666" font-size="17">紫の筋が入っている品種=香り強く料理向き</text>

    <rect x="560" y="495" width="460" height="80" rx="8" fill="#FFEBEE"/>
    <text x="580" y="520" font-weight="bold" fill="#C62828">× 上部から緑の芽が伸びている</text>
    <text x="580" y="545" font-weight="bold" fill="#C62828">× 黒ずみや茶色いシミ、柔らかい部分</text>
    <text x="580" y="568" fill="#666" font-size="17">芽は取れば食べられるが香りと辛味が落ちる</text>
  </g>
</svg>
