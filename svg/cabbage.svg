<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="Noto Sans CJK JP, sans-serif">
  <rect width="1080" height="600" fill="#FFFFFF" rx="20"/>

  <!-- Header -->
  <text x="60" y="60" font-size="44" font-weight="900" fill="#5D9F3D">キャベツ</text>
  <line x1="60" y1="75" x2="180" y2="75" stroke="#5D9F3D" stroke-width="4"/>
  <text x="200" y="68" font-size="22" fill="#666">旬:春・冬</text>

  <line x1="540" y1="100" x2="540" y2="540" stroke="#DDD" stroke-width="2" stroke-dasharray="6,6"/>

  <!-- OK side (watercolor Pattern A) -->
  <g transform="translate(280, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#2C5F2D"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">○</text>
    <defs>
      <radialGradient id="wcBodyCabbage" cx="35%" cy="25%"><stop offset="0%" stop-color="#D4E8B5" stop-opacity="0.95"/><stop offset="40%" stop-color="#9BCB7A" stop-opacity="0.9"/><stop offset="80%" stop-color="#5D8F3D" stop-opacity="0.85"/><stop offset="100%" stop-color="#2C5F2D" stop-opacity="0.65"/></radialGradient>
      <radialGradient id="wcLeafCabbage" cx="50%" cy="20%"><stop offset="0%" stop-color="#9BCB7A" stop-opacity="0.9"/><stop offset="60%" stop-color="#5D8F3D" stop-opacity="0.7"/><stop offset="100%" stop-color="#2C5F2D" stop-opacity="0.5"/></radialGradient>
      <filter id="wcRoughCabbage" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.04" numOctaves="3" seed="29"/>
        <feDisplacementMap in="SourceGraphic" scale="4"/>
      </filter>
      <filter id="wcBlurCabbage"><feGaussianBlur stdDeviation="1.5"/></filter>
    </defs>
    <g filter="url(#wcBlurCabbage)" opacity="0.4"><ellipse cx="0" cy="0" rx="110" ry="100" fill="#9BCB7A"/></g>
    
    <g filter="url(#wcRoughCabbage)"><path d="M 0 -100 Q -100 -90 -100 -10 Q -100 80 0 100 Q 100 80 100 -10 Q 100 -90 0 -100 Z" fill="url(#wcBodyCabbage)"/></g>
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"><path d="M 0 -100 Q -100 -90 -100 -10 Q -100 80 0 100 Q 100 80 100 -10 Q 100 -90 0 -100 Z"/><path d="M -85 -30 Q 0 -20 85 -30" opacity="0.7" stroke-width="1.8"/><path d="M -90 0 Q 0 10 90 0" opacity="0.7" stroke-width="1.8"/><path d="M -85 30 Q 0 40 85 30" opacity="0.7" stroke-width="1.8"/><path d="M 0 -95 L 0 50" opacity="0.6" stroke-width="1.5"/><path d="M -50 -90 Q -55 -10 -45 75" opacity="0.5" stroke-width="1.3"/><path d="M 50 -90 Q 55 -10 45 75" opacity="0.5" stroke-width="1.3"/></g>
  </g>

  <!-- NG side (flat) -->
  <g transform="translate(800, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#C62828"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">×</text>
    <path d="M 0 -100 Q -100 -90 -100 -10 Q -100 80 0 100 Q 100 80 100 -10 Q 100 -90 0 -100 Z" fill="#B8B860"/><path d="M -100 -10 Q -110 -5 -115 10 Q -90 -5 -100 0" stroke="#A0A040" stroke-width="2" fill="none" opacity="0.7"/><ellipse cx="-20" cy="30" rx="15" ry="10" fill="#7A5520" opacity="0.45"/><ellipse cx="40" cy="-10" rx="10" ry="8" fill="#7A5520" opacity="0.4"/><path d="M -85 -30 Q 0 -25 85 -30" stroke="#5D4E37" stroke-width="1.5" fill="none" opacity="0.5"/><path d="M -90 0 Q 0 5 90 0" stroke="#5D4E37" stroke-width="1.5" fill="none" opacity="0.5"/>
  </g>

  <!-- Comparison labels -->
  <g font-size="20" fill="#333">
    <rect x="60" y="495" width="460" height="80" rx="8" fill="#E8F5E9"/>
    <text x="80" y="520" font-weight="bold" fill="#2C5F2D">● ずっしり重い(同サイズで)</text>
    <text x="80" y="545" font-weight="bold" fill="#2C5F2D">● 外葉の緑が鮮やか、ハリあり</text>
    <text x="80" y="568" fill="#666" font-size="17">春キャベツ=軽くフワッ、冬=重く詰まる</text>

    <rect x="560" y="495" width="460" height="80" rx="8" fill="#FFEBEE"/>
    <text x="580" y="520" font-weight="bold" fill="#C62828">× 軽い、外葉が黄色く萎れ</text>
    <text x="580" y="545" font-weight="bold" fill="#C62828">× 切り口が茶色、ベタつく</text>
    <text x="580" y="568" fill="#666" font-size="17">カット品は切り口が白いものを選ぶ</text>
  </g>
</svg>
