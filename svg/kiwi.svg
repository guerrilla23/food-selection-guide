<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="Noto Sans CJK JP, sans-serif">
  <rect width="1080" height="600" fill="#FFFFFF" rx="20"/>

  <!-- Header -->
  <text x="60" y="60" font-size="44" font-weight="900" fill="#7E5A2A">キウイ</text>
  <line x1="60" y1="75" x2="150" y2="75" stroke="#7E5A2A" stroke-width="4"/>
  <text x="170" y="68" font-size="22" fill="#666">旬:10〜4月</text>

  <line x1="540" y1="100" x2="540" y2="540" stroke="#DDD" stroke-width="2" stroke-dasharray="6,6"/>

  <!-- OK side (watercolor Pattern A) -->
  <g transform="translate(280, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#2C5F2D"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">○</text>
    <defs>
      <radialGradient id="wcBodyKiwi" cx="35%" cy="25%"><stop offset="0%" stop-color="#D8B89A" stop-opacity="0.95"/><stop offset="40%" stop-color="#A07848" stop-opacity="0.9"/><stop offset="80%" stop-color="#7E5A2A" stop-opacity="0.85"/><stop offset="100%" stop-color="#4F3A1F" stop-opacity="0.65"/></radialGradient>
      <radialGradient id="wcLeafKiwi" cx="50%" cy="20%"><stop offset="0%" stop-color="#9BCB7A" stop-opacity="0.9"/><stop offset="60%" stop-color="#5D8F3D" stop-opacity="0.7"/><stop offset="100%" stop-color="#2C5F2D" stop-opacity="0.5"/></radialGradient>
      <filter id="wcRoughKiwi" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.04" numOctaves="3" seed="131"/>
        <feDisplacementMap in="SourceGraphic" scale="4"/>
      </filter>
      <filter id="wcBlurKiwi"><feGaussianBlur stdDeviation="1.5"/></filter>
    </defs>
    <g filter="url(#wcBlurKiwi)" opacity="0.4"><ellipse cx="0" cy="0" rx="95" ry="65" fill="#A07848"/></g>
    
    <g filter="url(#wcRoughKiwi)"><path d="M -85 0 Q -95 -55 0 -70 Q 95 -55 85 0 Q 95 55 0 70 Q -95 55 -85 0 Z" fill="url(#wcBodyKiwi)"/></g>
    
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"><path d="M -85 0 Q -95 -55 0 -70 Q 95 -55 85 0 Q 95 55 0 70 Q -95 55 -85 0 Z"/><path d="M -50 -40 L -45 -35" opacity="0.55" stroke-width="1.4"/><path d="M -20 -50 L -15 -45" opacity="0.55" stroke-width="1.4"/><path d="M 20 -50 L 25 -45" opacity="0.55" stroke-width="1.4"/><path d="M 50 -40 L 55 -35" opacity="0.55" stroke-width="1.4"/><path d="M -55 30 L -50 35" opacity="0.55" stroke-width="1.4"/><path d="M -15 45 L -10 50" opacity="0.55" stroke-width="1.4"/><path d="M 25 40 L 30 45" opacity="0.55" stroke-width="1.4"/><path d="M 55 25 L 60 30" opacity="0.55" stroke-width="1.4"/></g>
  </g>

  <!-- NG side (flat) -->
  <g transform="translate(800, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#C62828"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">×</text>
    <path d="M -85 0 Q -95 -55 0 -70 Q 95 -55 85 0 Q 95 55 0 70 Q -95 55 -85 0 Z" fill="#5D4E37"/><ellipse cx="-30" cy="10" rx="22" ry="18" fill="#3D2817" opacity="0.55"/><ellipse cx="25" cy="-10" rx="18" ry="14" fill="#3D2817" opacity="0.5"/><path d="M -60 0 Q 0 5 60 0" stroke="#5D4E37" stroke-width="1.5" fill="none" opacity="0.5"/>
  </g>

  <!-- Comparison labels -->
  <g font-size="20" fill="#333">
    <rect x="60" y="495" width="460" height="80" rx="8" fill="#E8F5E9"/>
    <text x="80" y="520" font-weight="bold" fill="#2C5F2D">● 皮の毛(うぶ毛)が均一</text>
    <text x="80" y="545" font-weight="bold" fill="#2C5F2D">● 指で押して軽く弾力</text>
    <text x="80" y="568" fill="#666" font-size="17">ヘタが乾燥=食べ頃</text>

    <rect x="560" y="495" width="460" height="80" rx="8" fill="#FFEBEE"/>
    <text x="580" y="520" font-weight="bold" fill="#C62828">× カビ・黒い斑点</text>
    <text x="580" y="545" font-weight="bold" fill="#C62828">× 硬すぎ or ブヨブヨ</text>
    <text x="580" y="568" fill="#666" font-size="17">硬いなら室温で追熟可能</text>
  </g>
</svg>
