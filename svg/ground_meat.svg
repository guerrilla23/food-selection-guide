<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="Noto Sans CJK JP, sans-serif">
  <rect width="1080" height="600" fill="#FFFFFF" rx="20"/>

  <!-- Header -->
  <text x="60" y="60" font-size="44" font-weight="900" fill="#D87878">ひき肉</text>
  <line x1="60" y1="75" x2="150" y2="75" stroke="#D87878" stroke-width="4"/>
  <text x="170" y="68" font-size="22" fill="#666">旬:通年</text>

  <line x1="540" y1="100" x2="540" y2="540" stroke="#DDD" stroke-width="2" stroke-dasharray="6,6"/>

  <!-- OK side (watercolor Pattern A) -->
  <g transform="translate(280, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#2C5F2D"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">○</text>
    <defs>
      <radialGradient id="wcBodyGround_meat" cx="35%" cy="25%"><stop offset="0%" stop-color="#FFD0C0" stop-opacity="0.95"/><stop offset="40%" stop-color="#F8907A" stop-opacity="0.9"/><stop offset="80%" stop-color="#C85040" stop-opacity="0.85"/><stop offset="100%" stop-color="#803020" stop-opacity="0.65"/></radialGradient>
      <radialGradient id="wcLeafGround_meat" cx="50%" cy="20%"><stop offset="0%" stop-color="#9BCB7A" stop-opacity="0.9"/><stop offset="60%" stop-color="#5D8F3D" stop-opacity="0.7"/><stop offset="100%" stop-color="#2C5F2D" stop-opacity="0.5"/></radialGradient>
      <filter id="wcRoughGround_meat" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.04" numOctaves="3" seed="179"/>
        <feDisplacementMap in="SourceGraphic" scale="4"/>
      </filter>
      <filter id="wcBlurGround_meat"><feGaussianBlur stdDeviation="1.5"/></filter>
    </defs>
    <g filter="url(#wcBlurGround_meat)" opacity="0.4"><ellipse cx="0" cy="5" rx="115" ry="75" fill="#F8907A"/></g>
    
    <g filter="url(#wcRoughGround_meat)"><path d="M -100 30 Q -110 -10 -85 -35 Q -55 -55 -25 -45 Q 0 -60 30 -45 Q 60 -60 85 -35 Q 110 -10 100 30 Q 80 55 0 60 Q -80 55 -100 30 Z" fill="url(#wcBodyGround_meat)"/></g>
    
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"><path d="M -100 30 Q -110 -10 -85 -35 Q -55 -55 -25 -45 Q 0 -60 30 -45 Q 60 -60 85 -35 Q 110 -10 100 30 Q 80 55 0 60 Q -80 55 -100 30 Z"/><path d="M -75 -10 L -68 -5" opacity="0.6" stroke-width="1.5"/><path d="M -45 -25 L -38 -20" opacity="0.6" stroke-width="1.5"/><path d="M -20 -10 L -13 -5" opacity="0.6" stroke-width="1.5"/><path d="M 10 -25 L 17 -20" opacity="0.6" stroke-width="1.5"/><path d="M 40 -10 L 47 -5" opacity="0.6" stroke-width="1.5"/><path d="M 65 -20 L 72 -15" opacity="0.6" stroke-width="1.5"/><path d="M -60 15 L -53 20" opacity="0.6" stroke-width="1.5"/><path d="M -25 25 L -18 30" opacity="0.6" stroke-width="1.5"/><path d="M 15 20 L 22 25" opacity="0.6" stroke-width="1.5"/><path d="M 50 25 L 57 30" opacity="0.6" stroke-width="1.5"/><path d="M -40 45 L -33 50" opacity="0.6" stroke-width="1.5"/><path d="M 30 45 L 37 50" opacity="0.6" stroke-width="1.5"/></g>
  </g>

  <!-- NG side (flat) -->
  <g transform="translate(800, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#C62828"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">×</text>
    <path d="M -100 30 Q -110 -10 -85 -35 Q -55 -55 -25 -45 Q 0 -60 30 -45 Q 60 -60 85 -35 Q 110 -10 100 30 Q 80 55 0 60 Q -80 55 -100 30 Z" fill="#9D6868"/><ellipse cx="-40" cy="-10" rx="22" ry="18" fill="#3D2817" opacity="0.55"/><ellipse cx="30" cy="10" rx="18" ry="14" fill="#3D2817" opacity="0.5"/><ellipse cx="0" cy="65" rx="75" ry="8" fill="#A03828" opacity="0.55"/>
  </g>

  <!-- Comparison labels -->
  <g font-size="20" fill="#333">
    <rect x="60" y="495" width="460" height="80" rx="8" fill="#E8F5E9"/>
    <text x="80" y="520" font-weight="bold" fill="#2C5F2D">● 色が均一なピンク</text>
    <text x="80" y="545" font-weight="bold" fill="#2C5F2D">● べた付かず、ふんわり</text>
    <text x="80" y="568" fill="#666" font-size="17">当日加工品=最も新鮮</text>

    <rect x="560" y="495" width="460" height="80" rx="8" fill="#FFEBEE"/>
    <text x="580" y="520" font-weight="bold" fill="#C62828">× 部分的に色が濃い、グレー</text>
    <text x="580" y="545" font-weight="bold" fill="#C62828">× ドリップ多、ベタベタ</text>
    <text x="580" y="568" fill="#666" font-size="17">混ざり物が出る=酸化進行</text>
  </g>
</svg>
