<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="Noto Sans CJK JP, sans-serif">
  <rect width="1080" height="600" fill="#FFFFFF" rx="20"/>

  <!-- Header -->
  <text x="60" y="60" font-size="44" font-weight="900" fill="#A07848">生姜</text>
  <line x1="60" y1="75" x2="120" y2="75" stroke="#A07848" stroke-width="4"/>
  <text x="140" y="68" font-size="22" fill="#666">旬:6〜8月(新生姜)</text>

  <line x1="540" y1="100" x2="540" y2="540" stroke="#DDD" stroke-width="2" stroke-dasharray="6,6"/>

  <!-- OK side (watercolor Pattern A) -->
  <g transform="translate(280, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#2C5F2D"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">○</text>
    <defs>
      <radialGradient id="wcBodyGinger" cx="35%" cy="25%"><stop offset="0%" stop-color="#FFF5DC" stop-opacity="0.95"/><stop offset="40%" stop-color="#F0DEB0" stop-opacity="0.9"/><stop offset="80%" stop-color="#D4B880" stop-opacity="0.85"/><stop offset="100%" stop-color="#9A7848" stop-opacity="0.65"/></radialGradient>
      <radialGradient id="wcLeafGinger" cx="50%" cy="20%"><stop offset="0%" stop-color="#9BCB7A" stop-opacity="0.9"/><stop offset="60%" stop-color="#5D8F3D" stop-opacity="0.7"/><stop offset="100%" stop-color="#2C5F2D" stop-opacity="0.5"/></radialGradient>
      <filter id="wcRoughGinger" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.04" numOctaves="3" seed="73"/>
        <feDisplacementMap in="SourceGraphic" scale="4"/>
      </filter>
      <filter id="wcBlurGinger"><feGaussianBlur stdDeviation="1.5"/></filter>
    </defs>
    <g filter="url(#wcBlurGinger)" opacity="0.4"><ellipse cx="0" cy="0" rx="130" ry="60" fill="#D4B880"/></g>
    
    <g filter="url(#wcRoughGinger)"><path d="M -120 -20 Q -130 30 -90 50 Q -50 60 -30 30 Q -10 60 30 50 Q 80 70 100 30 Q 130 0 110 -30 Q 80 -55 50 -40 Q 20 -55 -10 -35 Q -50 -55 -90 -40 Q -130 -50 -120 -20 Z" fill="url(#wcBodyGinger)"/></g>
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"><path d="M -120 -20 Q -130 30 -90 50 Q -50 60 -30 30 Q -10 60 30 50 Q 80 70 100 30 Q 130 0 110 -30 Q 80 -55 50 -40 Q 20 -55 -10 -35 Q -50 -55 -90 -40 Q -130 -50 -120 -20 Z"/><path d="M -60 -30 Q -55 0 -45 25" opacity="0.6" stroke-width="1.5"/><path d="M 0 -35 Q 5 0 -5 30" opacity="0.6" stroke-width="1.5"/><path d="M 50 -35 Q 60 0 65 30" opacity="0.6" stroke-width="1.5"/><path d="M -100 -10 Q -90 -5 -80 -15" opacity="0.5" stroke-width="1.3"/><path d="M 70 0 Q 90 5 105 -10" opacity="0.5" stroke-width="1.3"/></g>
  </g>

  <!-- NG side (flat) -->
  <g transform="translate(800, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#C62828"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">×</text>
    <path d="M -120 -20 Q -130 30 -90 50 Q -50 60 -30 30 Q -10 60 30 50 Q 80 70 100 30 Q 130 0 110 -30 Q 80 -55 50 -40 Q 20 -55 -10 -35 Q -50 -55 -90 -40 Q -130 -50 -120 -20 Z" fill="#988050"/><ellipse cx="-50" cy="10" rx="18" ry="12" fill="#5D4E37" opacity="0.55"/><ellipse cx="60" cy="-5" rx="15" ry="10" fill="#5D4E37" opacity="0.5"/><path d="M -100 0 Q 0 5 100 0" stroke="#5D4E37" stroke-width="1.5" fill="none" opacity="0.55"/>
  </g>

  <!-- Comparison labels -->
  <g font-size="20" fill="#333">
    <rect x="60" y="495" width="460" height="80" rx="8" fill="#E8F5E9"/>
    <text x="80" y="520" font-weight="bold" fill="#2C5F2D">● 皮が薄くツヤあり</text>
    <text x="80" y="545" font-weight="bold" fill="#2C5F2D">● ハリ・ふくよか、香り強い</text>
    <text x="80" y="568" fill="#666" font-size="17">新生姜=赤い茎の根、軟らか</text>

    <rect x="560" y="495" width="460" height="80" rx="8" fill="#FFEBEE"/>
    <text x="580" y="520" font-weight="bold" fill="#C62828">× 皮がシワ・乾燥</text>
    <text x="580" y="545" font-weight="bold" fill="#C62828">× 黒い斑点・カビ</text>
    <text x="580" y="568" fill="#666" font-size="17">柔らかすぎ=傷み始め</text>
  </g>
</svg>
