<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="Noto Sans CJK JP, sans-serif">
  <rect width="1080" height="600" fill="#FFFFFF" rx="20"/>

  <!-- Header -->
  <text x="60" y="60" font-size="44" font-weight="900" fill="#5D2A6F">なす</text>
  <line x1="60" y1="75" x2="120" y2="75" stroke="#5D2A6F" stroke-width="4"/>
  <text x="140" y="68" font-size="22" fill="#666">旬:6〜9月</text>

  <line x1="540" y1="100" x2="540" y2="540" stroke="#DDD" stroke-width="2" stroke-dasharray="6,6"/>

  <!-- OK side (watercolor Pattern A) -->
  <g transform="translate(280, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#2C5F2D"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">○</text>
    <defs>
      <radialGradient id="wcBodyNasu" cx="35%" cy="25%"><stop offset="0%" stop-color="#C8AED8" stop-opacity="0.95"/><stop offset="40%" stop-color="#8050C8" stop-opacity="0.9"/><stop offset="80%" stop-color="#5D2A6F" stop-opacity="0.85"/><stop offset="100%" stop-color="#3A1A50" stop-opacity="0.65"/></radialGradient>
      <radialGradient id="wcLeafNasu" cx="50%" cy="20%"><stop offset="0%" stop-color="#9BCB7A" stop-opacity="0.9"/><stop offset="60%" stop-color="#5D8F3D" stop-opacity="0.7"/><stop offset="100%" stop-color="#2C5F2D" stop-opacity="0.5"/></radialGradient>
      <filter id="wcRoughNasu" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.04" numOctaves="3" seed="61"/>
        <feDisplacementMap in="SourceGraphic" scale="4"/>
      </filter>
      <filter id="wcBlurNasu"><feGaussianBlur stdDeviation="1.5"/></filter>
    </defs>
    <g filter="url(#wcBlurNasu)" opacity="0.4"><ellipse cx="0" cy="10" rx="70" ry="110" fill="#7040A0"/><ellipse cx="0" cy="-110" rx="35" ry="22" fill="#5D8F3D"/></g>
    <g filter="url(#wcRoughNasu)" opacity="0.8"><path d="M -25 -100 L -30 -130 L -10 -120 L 0 -135 L 10 -120 L 30 -130 L 25 -100 Q 0 -90 -25 -100 Z" fill="url(#wcLeafNasu)"/></g>
    <g filter="url(#wcRoughNasu)"><path d="M -55 -50 Q -65 80 0 110 Q 65 80 55 -50 Q 50 -100 0 -100 Q -50 -100 -55 -50 Z" fill="url(#wcBodyNasu)"/></g>
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"><path d="M -55 -50 Q -65 80 0 110 Q 65 80 55 -50 Q 50 -100 0 -100 Q -50 -100 -55 -50 Z"/><path d="M -25 -100 L -30 -130 L -10 -120 L 0 -135 L 10 -120 L 30 -130 L 25 -100" opacity="0.85" stroke-width="2.5"/><path d="M 0 -135 L -3 -150" opacity="0.85" stroke-width="2.5"/><path d="M -25 -30 Q -28 30 -20 80" opacity="0.5" stroke-width="1.4"/></g>
  </g>

  <!-- NG side (flat) -->
  <g transform="translate(800, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#C62828"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">×</text>
    <path d="M -55 -50 Q -65 80 0 110 Q 65 80 55 -50 Q 50 -100 0 -100 Q -50 -100 -55 -50 Z" fill="#705078"/><path d="M -25 -100 L -30 -125 L -10 -120 L 0 -130 L 10 -120 L 30 -125 L 25 -100 Q 0 -90 -25 -100 Z" fill="#7A6720"/><ellipse cx="-20" cy="30" rx="18" ry="25" fill="#3D2050" opacity="0.6"/><ellipse cx="25" cy="-10" rx="12" ry="18" fill="#3D2050" opacity="0.55"/><path d="M -45 0 Q 0 5 45 -10" stroke="#5D4E37" stroke-width="1.5" fill="none" opacity="0.55"/>
  </g>

  <!-- Comparison labels -->
  <g font-size="20" fill="#333">
    <rect x="60" y="495" width="460" height="80" rx="8" fill="#E8F5E9"/>
    <text x="80" y="520" font-weight="bold" fill="#2C5F2D">● 色が濃い紫、ツヤあり</text>
    <text x="80" y="545" font-weight="bold" fill="#2C5F2D">● ヘタ(緑)のトゲがチクチク</text>
    <text x="80" y="568" fill="#666" font-size="17">ハリがあり指で押すと跳ね返る</text>

    <rect x="560" y="495" width="460" height="80" rx="8" fill="#FFEBEE"/>
    <text x="580" y="520" font-weight="bold" fill="#C62828">× 色がぼやける、変色</text>
    <text x="580" y="545" font-weight="bold" fill="#C62828">× ヘタが乾く・トゲ取れる</text>
    <text x="580" y="568" fill="#666" font-size="17">柔らかい=水分抜け、苦み出る</text>
  </g>
</svg>
