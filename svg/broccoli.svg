<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="Noto Sans CJK JP, sans-serif">
  <rect width="1080" height="600" fill="#FFFFFF" rx="20"/>

  <!-- Header -->
  <text x="60" y="60" font-size="44" font-weight="900" fill="#2C5F2D">ブロッコリー</text>
  <line x1="60" y1="75" x2="240" y2="75" stroke="#2C5F2D" stroke-width="4"/>
  <text x="260" y="68" font-size="22" fill="#666">旬:11〜3月</text>

  <line x1="540" y1="100" x2="540" y2="540" stroke="#DDD" stroke-width="2" stroke-dasharray="6,6"/>

  <!-- OK side (watercolor Pattern A) -->
  <g transform="translate(280, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#2C5F2D"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">○</text>
    <defs>
      <radialGradient id="wcBodyBroccoli" cx="35%" cy="25%"><stop offset="0%" stop-color="#9BCB7A" stop-opacity="0.95"/><stop offset="40%" stop-color="#5D8F3D" stop-opacity="0.9"/><stop offset="80%" stop-color="#2C5F2D" stop-opacity="0.85"/><stop offset="100%" stop-color="#1A3F1A" stop-opacity="0.65"/></radialGradient>
      <radialGradient id="wcLeafBroccoli" cx="50%" cy="20%"><stop offset="0%" stop-color="#9BCB7A" stop-opacity="0.9"/><stop offset="60%" stop-color="#5D8F3D" stop-opacity="0.7"/><stop offset="100%" stop-color="#2C5F2D" stop-opacity="0.5"/></radialGradient>
      <filter id="wcRoughBroccoli" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.04" numOctaves="3" seed="71"/>
        <feDisplacementMap in="SourceGraphic" scale="4"/>
      </filter>
      <filter id="wcBlurBroccoli"><feGaussianBlur stdDeviation="1.5"/></filter>
    </defs>
    <g filter="url(#wcBlurBroccoli)" opacity="0.4"><ellipse cx="0" cy="-50" rx="110" ry="80" fill="#5D8F3D"/></g>
    
    <g filter="url(#wcRoughBroccoli)"><path d="M -90 -30 Q -100 -100 -50 -130 Q 0 -140 50 -130 Q 100 -100 90 -30 Q 80 0 50 -10 Q 0 0 -50 -10 Q -80 0 -90 -30 Z" fill="url(#wcBodyBroccoli)"/><path d="M -25 -10 L -25 80 Q -25 100 0 105 Q 25 100 25 80 L 25 -10 Z" fill="url(#wcBodyBroccoli)"/></g>
    
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"><path d="M -90 -30 Q -100 -100 -50 -130 Q 0 -140 50 -130 Q 100 -100 90 -30 Q 80 0 50 -10 Q 0 0 -50 -10 Q -80 0 -90 -30 Z"/><path d="M -25 -10 L -25 80 Q -25 100 0 105 Q 25 100 25 80 L 25 -10 Z"/><path d="M -65 -90 Q -55 -100 -50 -85" opacity="0.7" stroke-width="1.6"/><path d="M -35 -110 Q -25 -120 -15 -105" opacity="0.7" stroke-width="1.6"/><path d="M 0 -120 Q 10 -130 20 -115" opacity="0.7" stroke-width="1.6"/><path d="M 30 -110 Q 40 -120 50 -100" opacity="0.7" stroke-width="1.6"/><path d="M 60 -90 Q 70 -100 75 -75" opacity="0.7" stroke-width="1.6"/><path d="M -60 -50 Q -50 -60 -40 -45" opacity="0.6" stroke-width="1.4"/><path d="M -10 -55 Q 0 -65 15 -50" opacity="0.6" stroke-width="1.4"/><path d="M 35 -55 Q 50 -65 60 -45" opacity="0.6" stroke-width="1.4"/><path d="M -25 30 L 25 30" opacity="0.5" stroke-width="1.3"/><path d="M -25 60 L 25 60" opacity="0.5" stroke-width="1.3"/></g>
  </g>

  <!-- NG side (flat) -->
  <g transform="translate(800, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#C62828"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">×</text>
    <path d="M -90 -30 Q -100 -100 -50 -130 Q 0 -140 50 -130 Q 100 -100 90 -30 Q 80 0 50 -10 Q 0 0 -50 -10 Q -80 0 -90 -30 Z" fill="#88A858"/><path d="M -25 -10 L -25 80 Q -25 100 0 105 Q 25 100 25 80 L 25 -10 Z" fill="#88A858"/><ellipse cx="0" cy="-80" rx="28" ry="22" fill="#C8B040" opacity="0.6"/><ellipse cx="-45" cy="-55" rx="18" ry="14" fill="#C8B040" opacity="0.55"/><ellipse cx="0" cy="60" rx="18" ry="8" fill="#7A5520" opacity="0.55"/>
  </g>

  <!-- Comparison labels -->
  <g font-size="20" fill="#333">
    <rect x="60" y="495" width="460" height="80" rx="8" fill="#E8F5E9"/>
    <text x="80" y="520" font-weight="bold" fill="#2C5F2D">● つぼみが濃緑・密集</text>
    <text x="80" y="545" font-weight="bold" fill="#2C5F2D">● 茎の切り口が瑞々しい</text>
    <text x="80" y="568" fill="#666" font-size="17">紫がかる=甘み・栄養豊富</text>

    <rect x="560" y="495" width="460" height="80" rx="8" fill="#FFEBEE"/>
    <text x="580" y="520" font-weight="bold" fill="#C62828">× つぼみが黄色く開く</text>
    <text x="580" y="545" font-weight="bold" fill="#C62828">× 茎が空洞、ス入り</text>
    <text x="580" y="568" fill="#666" font-size="17">茎が筋ばる=古い・繊維質</text>
  </g>
</svg>
