<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="Noto Sans CJK JP, sans-serif">
  <rect width="1080" height="600" fill="#FFFFFF" rx="20"/>

  <!-- Header -->
  <text x="60" y="60" font-size="44" font-weight="900" fill="#5A8838">きゅうり</text>
  <line x1="60" y1="75" x2="220" y2="75" stroke="#5A8838" stroke-width="4"/>
  <text x="240" y="68" font-size="22" fill="#666">旬:夏</text>

  <line x1="540" y1="100" x2="540" y2="540" stroke="#DDD" stroke-width="2" stroke-dasharray="6,6"/>

  <!-- OK side -->
  <g transform="translate(280, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#2C5F2D"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">○</text>

    <defs>
      <linearGradient id="wcBodyCucumber" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#9BCB7A" stop-opacity="0.9"/>
        <stop offset="40%" stop-color="#7AB048" stop-opacity="0.85"/>
        <stop offset="100%" stop-color="#3D6020" stop-opacity="0.75"/>
      </linearGradient>
      <filter id="wcRoughCucumber" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.05" numOctaves="3" seed="17"/>
        <feDisplacementMap in="SourceGraphic" scale="3"/>
      </filter>
      <filter id="wcBlurCucumber">
        <feGaussianBlur stdDeviation="1.5"/>
      </filter>
    </defs>

    <!-- Watercolor bleeds -->
    <g filter="url(#wcBlurCucumber)" opacity="0.4">
      <ellipse cx="0" cy="0" rx="180" ry="55" fill="#7AB048"/>
      <ellipse cx="0" cy="-15" rx="160" ry="35" fill="#9BCB7A"/>
    </g>

    <!-- 本体: 横長、両端細め、軽く湾曲 -->
    <g filter="url(#wcRoughCucumber)">
      <path d="M -210 0
               Q -205 -32 -150 -42
               Q -50 -50 50 -48
               Q 130 -45 175 -38
               Q 200 -25 205 0
               Q 200 25 175 38
               Q 130 45 50 48
               Q -50 50 -150 42
               Q -205 32 -210 0 Z" fill="url(#wcBodyCucumber)"/>
    </g>

    <!-- Strong ink lines -->
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
      <!-- 本体輪郭 -->
      <path d="M -210 0 Q -205 -32 -150 -42 Q -50 -50 50 -48 Q 130 -45 175 -38 Q 200 -25 205 0 Q 200 25 175 38 Q 130 45 50 48 Q -50 50 -150 42 Q -205 32 -210 0 Z"/>
      <!-- ヘタ(花落ち、左) -->
      <path d="M -210 -5 L -228 -5 L -225 -12 L -228 0 L -225 7 L -228 5 L -210 5"/>
      <!-- ヘタ(蔕、右、緑の濃い) -->
      <path d="M 205 -5 Q 220 -8 220 0 Q 220 8 205 5" fill="#3D6020" stroke="#3D2817" stroke-width="2"/>
      <!-- 縦の白い線(きゅうりの特徴) -->
      <path d="M -150 -28 Q 0 -30 150 -28" opacity="0.6"/>
      <path d="M -160 0 Q 0 -2 160 0" opacity="0.55"/>
      <path d="M -150 28 Q 0 30 150 28" opacity="0.6"/>
    </g>

    <!-- イボ(きゅうり最大の特徴、凸の小点) -->
    <g fill="#3D6020" stroke="#3D2817" stroke-width="1.8">
      <ellipse cx="-130" cy="-30" rx="3.5" ry="2.5"/>
      <ellipse cx="-95" cy="-35" rx="3.5" ry="2.5"/>
      <ellipse cx="-55" cy="-38" rx="3.5" ry="2.5"/>
      <ellipse cx="-15" cy="-40" rx="3.5" ry="2.5"/>
      <ellipse cx="25" cy="-40" rx="3.5" ry="2.5"/>
      <ellipse cx="65" cy="-38" rx="3.5" ry="2.5"/>
      <ellipse cx="105" cy="-35" rx="3.5" ry="2.5"/>
      <ellipse cx="140" cy="-30" rx="3.5" ry="2.5"/>
      <!-- 上段(ずらして配置) -->
      <ellipse cx="-115" cy="-20" rx="3" ry="2"/>
      <ellipse cx="-75" cy="-22" rx="3" ry="2"/>
      <ellipse cx="-35" cy="-25" rx="3" ry="2"/>
      <ellipse cx="5" cy="-26" rx="3" ry="2"/>
      <ellipse cx="45" cy="-26" rx="3" ry="2"/>
      <ellipse cx="85" cy="-24" rx="3" ry="2"/>
      <ellipse cx="125" cy="-22" rx="3" ry="2"/>
    </g>

    <!-- ブルーム(白い粉、新鮮さの証) -->
    <g fill="#FFFFFF">
      <ellipse cx="-90" cy="-5" rx="22" ry="10" opacity="0.3"/>
      <ellipse cx="0" cy="-10" rx="35" ry="14" opacity="0.35"/>
      <ellipse cx="90" cy="-5" rx="22" ry="10" opacity="0.3"/>
    </g>
  </g>

  <!-- NG side -->
  <g transform="translate(800, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#C62828"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">×</text>

    <!-- 本体(しなびて細る、黄ばむ) -->
    <path d="M -210 0
             Q -205 -28 -150 -38
             Q -50 -42 50 -40
             Q 130 -38 175 -32
             Q 200 -22 205 0
             Q 200 22 175 32
             Q 130 38 50 40
             Q -50 42 -150 38
             Q -205 28 -210 0 Z" fill="#A8B068"/>

    <!-- ヘタ(乾燥) -->
    <path d="M -210 -5 L -228 -5 L -225 -12 L -228 0 L -225 7 L -228 5 L -210 5" stroke="#3D2817" stroke-width="2" fill="#A88A50"/>
    <path d="M 205 -5 Q 220 -8 220 0 Q 220 8 205 5" fill="#5A5828" stroke="#3D2817" stroke-width="2"/>

    <!-- 縦のシワ(しなび) -->
    <g stroke="#3D2817" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.55">
      <path d="M -150 -32 Q -148 0 -152 32"/>
      <path d="M -110 -36 Q -108 0 -112 36"/>
      <path d="M -65 -40 Q -65 0 -67 40"/>
      <path d="M -20 -42 Q -20 0 -22 42"/>
      <path d="M 25 -42 Q 27 0 25 42"/>
      <path d="M 70 -40 Q 72 0 70 40"/>
      <path d="M 115 -36 Q 117 0 115 36"/>
      <path d="M 150 -32 Q 152 0 150 32"/>
    </g>

    <!-- 黄ばみのシミ -->
    <ellipse cx="-80" cy="0" rx="22" ry="14" fill="#D4C060" opacity="0.5"/>
    <ellipse cx="0" cy="-5" rx="28" ry="16" fill="#D4C060" opacity="0.45"/>
    <ellipse cx="85" cy="5" rx="20" ry="12" fill="#D4C060" opacity="0.5"/>

    <!-- 茶色の傷み斑点 -->
    <ellipse cx="-45" cy="10" rx="8" ry="6" fill="#7A4A1F" opacity="0.6"/>
    <ellipse cx="40" cy="15" rx="9" ry="6" fill="#7A4A1F" opacity="0.55"/>
    <ellipse cx="105" cy="-5" rx="6" ry="5" fill="#7A4A1F" opacity="0.5"/>

    <!-- イボ(しぼんでいる) -->
    <g fill="#5A5828" stroke="#3D2817" stroke-width="1.5" opacity="0.7">
      <ellipse cx="-95" cy="-25" rx="2.5" ry="1.8"/>
      <ellipse cx="-35" cy="-30" rx="2.5" ry="1.8"/>
      <ellipse cx="25" cy="-32" rx="2.5" ry="1.8"/>
      <ellipse cx="85" cy="-28" rx="2.5" ry="1.8"/>
    </g>

    <!-- 輪郭 -->
    <path d="M -210 0 Q -205 -28 -150 -38 Q -50 -42 50 -40 Q 130 -38 175 -32 Q 200 -22 205 0 Q 200 22 175 32 Q 130 38 50 40 Q -50 42 -150 38 Q -205 28 -210 0 Z" stroke="#3D2817" stroke-width="3" fill="none"/>
  </g>

  <!-- Comparison labels -->
  <g font-size="20" fill="#333">
    <rect x="60" y="495" width="460" height="80" rx="8" fill="#E8F5E9"/>
    <text x="80" y="520" font-weight="bold" fill="#2C5F2D">● 鮮やかな緑、イボがチクチクして痛い</text>
    <text x="80" y="545" font-weight="bold" fill="#2C5F2D">● 持つと硬く、両端までハリがある</text>
    <text x="80" y="568" fill="#666" font-size="17">白い粉(ブルーム)は鮮度の証=洗えば落ちる</text>

    <rect x="560" y="495" width="460" height="80" rx="8" fill="#FFEBEE"/>
    <text x="580" y="520" font-weight="bold" fill="#C62828">× 黄ばみ、表面のシワや柔らかさ</text>
    <text x="580" y="545" font-weight="bold" fill="#C62828">× 両端(特にヘタ)が萎びて茶色い</text>
    <text x="580" y="568" fill="#666" font-size="17">中央だけ太い=水分抜けで空洞化のサイン</text>
  </g>
</svg>
