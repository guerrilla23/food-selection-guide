<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="Noto Sans CJK JP, sans-serif">
  <rect width="1080" height="600" fill="#FFFFFF" rx="20"/>

  <!-- Header -->
  <text x="60" y="60" font-size="44" font-weight="900" fill="#B58642">玉ねぎ</text>
  <line x1="60" y1="75" x2="220" y2="75" stroke="#B58642" stroke-width="4"/>
  <text x="240" y="68" font-size="22" fill="#666">旬:春・秋</text>

  <line x1="540" y1="100" x2="540" y2="540" stroke="#DDD" stroke-width="2" stroke-dasharray="6,6"/>

  <!-- OK side: 断面表現 -->
  <g transform="translate(280, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#2C5F2D"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">○</text>

    <defs>
      <radialGradient id="wcSkinOnion" cx="50%" cy="50%">
        <stop offset="0%" stop-color="#E8C588" stop-opacity="0.85"/>
        <stop offset="60%" stop-color="#C8A060" stop-opacity="0.9"/>
        <stop offset="100%" stop-color="#9A7038" stop-opacity="0.85"/>
      </radialGradient>
      <radialGradient id="wcLayer1Onion" cx="50%" cy="50%">
        <stop offset="0%" stop-color="#FAFAF0" stop-opacity="0.95"/>
        <stop offset="100%" stop-color="#E8E0C8" stop-opacity="0.9"/>
      </radialGradient>
      <radialGradient id="wcLayer2Onion" cx="50%" cy="50%">
        <stop offset="0%" stop-color="#FCFCEC" stop-opacity="0.95"/>
        <stop offset="100%" stop-color="#E0D8B8" stop-opacity="0.9"/>
      </radialGradient>
      <filter id="wcRoughOnion" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.04" numOctaves="3" seed="15"/>
        <feDisplacementMap in="SourceGraphic" scale="3"/>
      </filter>
      <filter id="wcBlurOnion">
        <feGaussianBlur stdDeviation="1.5"/>
      </filter>
    </defs>

    <!-- Watercolor bleeds (背景) -->
    <g filter="url(#wcBlurOnion)" opacity="0.4">
      <ellipse cx="0" cy="0" rx="135" ry="135" fill="#E8C588"/>
      <ellipse cx="0" cy="0" rx="100" ry="105" fill="#FAFAF0"/>
    </g>

    <!-- 上部の茎の切り口(乾いた茶色) -->
    <g filter="url(#wcRoughOnion)">
      <path d="M -10 -148 Q 0 -152 10 -148 L 8 -135 Q 0 -132 -8 -135 Z" fill="#9A7038" opacity="0.9"/>
    </g>

    <!-- 一番外側の薄皮(乾いた茶色、断面なので楕円形) -->
    <g filter="url(#wcRoughOnion)">
      <ellipse cx="0" cy="0" rx="125" ry="135" fill="url(#wcSkinOnion)"/>
    </g>

    <!-- 第2層(乾いた皮の内側) -->
    <g filter="url(#wcRoughOnion)">
      <ellipse cx="0" cy="2" rx="113" ry="123" fill="#D8B888" opacity="0.85"/>
    </g>

    <!-- 第3層(白っぽい層、ここから内側) -->
    <g filter="url(#wcRoughOnion)">
      <ellipse cx="0" cy="3" rx="100" ry="110" fill="url(#wcLayer1Onion)"/>
    </g>

    <!-- 第4層 -->
    <g filter="url(#wcRoughOnion)">
      <ellipse cx="0" cy="4" rx="82" ry="92" fill="url(#wcLayer2Onion)"/>
    </g>

    <!-- 第5層 -->
    <g filter="url(#wcRoughOnion)">
      <ellipse cx="0" cy="5" rx="62" ry="72" fill="url(#wcLayer1Onion)"/>
    </g>

    <!-- 第6層(中心に近い) -->
    <g filter="url(#wcRoughOnion)">
      <ellipse cx="0" cy="6" rx="40" ry="48" fill="url(#wcLayer2Onion)"/>
    </g>

    <!-- 中心の芯 -->
    <g filter="url(#wcRoughOnion)">
      <ellipse cx="0" cy="7" rx="18" ry="22" fill="#F0E8C0" opacity="0.95"/>
    </g>

    <!-- Strong ink lines (層の境界) -->
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
      <!-- 一番外側 -->
      <ellipse cx="0" cy="0" rx="125" ry="135"/>
      <!-- 茎の切り口 -->
      <path d="M -10 -148 Q 0 -152 10 -148 L 8 -135 Q 0 -132 -8 -135 Z"/>
    </g>
    <!-- 内側の層は細めの線 -->
    <g stroke="#8A5A28" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.75">
      <ellipse cx="0" cy="2" rx="113" ry="123"/>
      <ellipse cx="0" cy="3" rx="100" ry="110"/>
      <ellipse cx="0" cy="4" rx="82" ry="92"/>
      <ellipse cx="0" cy="5" rx="62" ry="72"/>
      <ellipse cx="0" cy="6" rx="40" ry="48"/>
      <ellipse cx="0" cy="7" rx="18" ry="22"/>
    </g>

    <!-- 下のひげ根の切り口 -->
    <g stroke="#3D2817" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.85">
      <line x1="-15" y1="135" x2="-15" y2="148"/>
      <line x1="-5" y1="135" x2="-5" y2="150"/>
      <line x1="5" y1="135" x2="5" y2="150"/>
      <line x1="15" y1="135" x2="15" y2="148"/>
    </g>
  </g>

  <!-- NG side: 断面、傷み -->
  <g transform="translate(800, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#C62828"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">×</text>

    <!-- 上から伸びた緑の芽 -->
    <g stroke="#7AAB45" stroke-width="3" fill="none" stroke-linecap="round">
      <path d="M -8 -148 Q -12 -170 -18 -190"/>
      <path d="M 0 -150 Q 0 -180 -2 -200"/>
      <path d="M 8 -148 Q 14 -170 20 -190"/>
    </g>
    <path d="M -10 -148 Q 0 -152 10 -148 L 8 -135 Q 0 -132 -8 -135 Z" fill="#8A6028" stroke="#3D2817" stroke-width="2"/>

    <!-- 一番外側(変色した茶色) -->
    <ellipse cx="0" cy="0" rx="125" ry="135" fill="#A88058"/>
    <ellipse cx="0" cy="2" rx="113" ry="123" fill="#B89868"/>

    <!-- 内側の層(変色) -->
    <ellipse cx="0" cy="3" rx="100" ry="110" fill="#D8C898"/>
    <ellipse cx="0" cy="4" rx="82" ry="92" fill="#C8B888"/>
    <ellipse cx="0" cy="5" rx="62" ry="72" fill="#B8A878"/>
    <ellipse cx="0" cy="6" rx="40" ry="48" fill="#A89868"/>

    <!-- 中心の芯から伸びる芽の通り道(青緑の腐敗線) -->
    <path d="M 0 -130 Q 0 0 0 100" stroke="#5A6A35" stroke-width="3" fill="none" opacity="0.65"/>

    <!-- 茶色のシミ・腐敗 -->
    <ellipse cx="-30" cy="-30" rx="14" ry="18" fill="#5A3215" opacity="0.7"/>
    <ellipse cx="35" cy="40" rx="12" ry="16" fill="#5A3215" opacity="0.65"/>
    <ellipse cx="-15" cy="80" rx="11" ry="9" fill="#5A3215" opacity="0.6"/>
    <!-- 黒い斑点(カビ) -->
    <circle cx="-50" cy="20" r="4" fill="#1F1812" opacity="0.75"/>
    <circle cx="40" cy="-40" r="3.5" fill="#1F1812" opacity="0.7"/>
    <circle cx="20" cy="100" r="3" fill="#1F1812" opacity="0.65"/>

    <!-- 層の境界線 -->
    <g stroke="#5A3A15" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7">
      <ellipse cx="0" cy="2" rx="113" ry="123"/>
      <ellipse cx="0" cy="3" rx="100" ry="110"/>
      <ellipse cx="0" cy="4" rx="82" ry="92"/>
      <ellipse cx="0" cy="5" rx="62" ry="72"/>
      <ellipse cx="0" cy="6" rx="40" ry="48"/>
    </g>

    <!-- 外側の輪郭 -->
    <ellipse cx="0" cy="0" rx="125" ry="135" stroke="#3D2817" stroke-width="3" fill="none"/>

    <!-- ひげ根の切り口(伸びる) -->
    <g stroke="#5A3A15" stroke-width="2" fill="none" stroke-linecap="round">
      <line x1="-15" y1="135" x2="-18" y2="158"/>
      <line x1="-5" y1="135" x2="-7" y2="160"/>
      <line x1="5" y1="135" x2="7" y2="160"/>
      <line x1="15" y1="135" x2="18" y2="158"/>
    </g>
  </g>

  <!-- Comparison labels -->
  <g font-size="20" fill="#333">
    <rect x="60" y="495" width="460" height="80" rx="8" fill="#E8F5E9"/>
    <text x="80" y="520" font-weight="bold" fill="#2C5F2D">● 外の薄皮が乾いてパリッとしている</text>
    <text x="80" y="545" font-weight="bold" fill="#2C5F2D">● 切ると白く均一な層がきれいに見える</text>
    <text x="80" y="568" fill="#666" font-size="17">中心が引き締まっている=新鮮で甘い</text>

    <rect x="560" y="495" width="460" height="80" rx="8" fill="#FFEBEE"/>
    <text x="580" y="520" font-weight="bold" fill="#C62828">× 上から緑の芽が伸びている</text>
    <text x="580" y="545" font-weight="bold" fill="#C62828">× 中心が変色、層に茶色のシミがある</text>
    <text x="580" y="568" fill="#666" font-size="17">芯が緑色=芽が出始めて栄養が抜けている</text>
  </g>
</svg>
