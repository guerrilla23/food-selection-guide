<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="Noto Sans CJK JP, sans-serif">
  <rect width="1080" height="600" fill="#FFFFFF" rx="20"/>

  <!-- Header -->
  <text x="60" y="60" font-size="44" font-weight="900" fill="#C82828">りんご</text>
  <line x1="60" y1="75" x2="150" y2="75" stroke="#C82828" stroke-width="4"/>
  <text x="170" y="68" font-size="22" fill="#666">旬:9〜12月</text>

  <line x1="540" y1="100" x2="540" y2="540" stroke="#DDD" stroke-width="2" stroke-dasharray="6,6"/>

  <!-- OK side (watercolor Pattern A) -->
  <g transform="translate(280, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#2C5F2D"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">○</text>
    <defs>
      <radialGradient id="wcBodyApple" cx="35%" cy="25%"><stop offset="0%" stop-color="#FFB0A8" stop-opacity="0.95"/><stop offset="40%" stop-color="#FF6655" stop-opacity="0.9"/><stop offset="80%" stop-color="#E33825" stop-opacity="0.85"/><stop offset="100%" stop-color="#A02818" stop-opacity="0.7"/></radialGradient>
      <radialGradient id="wcLeafApple" cx="50%" cy="20%"><stop offset="0%" stop-color="#9BCB7A" stop-opacity="0.9"/><stop offset="60%" stop-color="#5D8F3D" stop-opacity="0.7"/><stop offset="100%" stop-color="#2C5F2D" stop-opacity="0.5"/></radialGradient>
      <filter id="wcRoughApple" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.04" numOctaves="3" seed="41"/>
        <feDisplacementMap in="SourceGraphic" scale="4"/>
      </filter>
      <filter id="wcBlurApple"><feGaussianBlur stdDeviation="1.5"/></filter>
    </defs>
    <g filter="url(#wcBlurApple)" opacity="0.4"><ellipse cx="0" cy="0" rx="100" ry="100" fill="#FF8077"/></g>
    <g filter="url(#wcRoughApple)" opacity="0.8"><path d="M 5 -100 Q 18 -110 25 -98 Q 18 -92 8 -98 Z" fill="url(#wcLeafApple)"/></g>
    <g filter="url(#wcRoughApple)"><path d="M -90 -5 Q -100 50 -50 90 Q 0 100 50 90 Q 100 50 90 -5 Q 95 -75 50 -90 Q 25 -82 5 -90 Q -25 -100 -50 -85 Q -95 -75 -90 -5 Z" fill="url(#wcBodyApple)"/></g>
    
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"><path d="M -90 -5 Q -100 50 -50 90 Q 0 100 50 90 Q 100 50 90 -5 Q 95 -75 50 -90 Q 25 -82 5 -90 Q -25 -100 -50 -85 Q -95 -75 -90 -5 Z"/><path d="M 0 -90 L -5 -115 L 5 -120" opacity="0.85" stroke-width="2.5"/><path d="M -20 -85 Q 0 -78 20 -85" opacity="0.6" stroke-width="1.5"/><path d="M 5 -100 Q 18 -110 25 -98 Q 18 -92 8 -98" opacity="0.85" stroke-width="2"/></g>
  </g>

  <!-- NG side (flat) -->
  <g transform="translate(800, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#C62828"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">×</text>
    <path d="M -90 -5 Q -100 50 -50 90 Q 0 100 50 90 Q 100 50 90 -5 Q 95 -75 50 -90 Q 25 -82 5 -90 Q -25 -100 -50 -85 Q -95 -75 -90 -5 Z" fill="#A05858"/><ellipse cx="-35" cy="25" rx="22" ry="18" fill="#5D2A20" opacity="0.5"/><ellipse cx="30" cy="-10" rx="15" ry="12" fill="#5D2A20" opacity="0.45"/><path d="M -70 -30 Q -30 -25 0 -35" stroke="#5D4E37" stroke-width="1.5" fill="none" opacity="0.6"/><path d="M 5 35 Q 35 30 60 40" stroke="#5D4E37" stroke-width="1.5" fill="none" opacity="0.55"/><path d="M 0 -90 L -5 -115" stroke="#5D4E37" stroke-width="2" fill="none" opacity="0.7"/>
  </g>

  <!-- Comparison labels -->
  <g font-size="20" fill="#333">
    <rect x="60" y="495" width="460" height="80" rx="8" fill="#E8F5E9"/>
    <text x="80" y="520" font-weight="bold" fill="#2C5F2D">● 色が濃い、ツヤあり</text>
    <text x="80" y="545" font-weight="bold" fill="#2C5F2D">● お尻が黄色みかかる(完熟)</text>
    <text x="80" y="568" fill="#666" font-size="17">ずっしり重い=蜜入りの可能性</text>

    <rect x="560" y="495" width="460" height="80" rx="8" fill="#FFEBEE"/>
    <text x="580" y="520" font-weight="bold" fill="#C62828">× 色がくすむ、傷・打痕あり</text>
    <text x="580" y="545" font-weight="bold" fill="#C62828">× シワ、ヘタが乾いて黒い</text>
    <text x="580" y="568" fill="#666" font-size="17">フワッと軽い=水分抜け、ぼけ</text>
  </g>
</svg>
