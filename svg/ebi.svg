<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="Noto Sans CJK JP, sans-serif">
  <rect width="1080" height="600" fill="#FFFFFF" rx="20"/>

  <!-- Header -->
  <text x="60" y="60" font-size="44" font-weight="900" fill="#A07060">エビ</text>
  <line x1="60" y1="75" x2="120" y2="75" stroke="#A07060" stroke-width="4"/>
  <text x="140" y="68" font-size="22" fill="#666">旬:通年</text>

  <line x1="540" y1="100" x2="540" y2="540" stroke="#DDD" stroke-width="2" stroke-dasharray="6,6"/>

  <!-- OK side (watercolor Pattern A) -->
  <g transform="translate(280, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#2C5F2D"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">○</text>
    <defs>
      <radialGradient id="wcBodyEbi" cx="35%" cy="25%"><stop offset="0%" stop-color="#F0DCD0" stop-opacity="0.95"/><stop offset="40%" stop-color="#D0A898" stop-opacity="0.9"/><stop offset="80%" stop-color="#A07060" stop-opacity="0.85"/><stop offset="100%" stop-color="#604040" stop-opacity="0.65"/></radialGradient>
      <radialGradient id="wcLeafEbi" cx="50%" cy="20%"><stop offset="0%" stop-color="#9BCB7A" stop-opacity="0.9"/><stop offset="60%" stop-color="#5D8F3D" stop-opacity="0.7"/><stop offset="100%" stop-color="#2C5F2D" stop-opacity="0.5"/></radialGradient>
      <filter id="wcRoughEbi" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.04" numOctaves="3" seed="197"/>
        <feDisplacementMap in="SourceGraphic" scale="4"/>
      </filter>
      <filter id="wcBlurEbi"><feGaussianBlur stdDeviation="1.5"/></filter>
    </defs>
    <g filter="url(#wcBlurEbi)" opacity="0.4"><ellipse cx="0" cy="10" rx="110" ry="80" fill="#D0A898"/></g>
    
    <g filter="url(#wcRoughEbi)"><path d="M -85 -55 Q -115 -10 -100 50 Q -70 95 -10 95 Q 60 90 95 55 L 75 25 Q 55 0 15 5 Q -25 15 -55 -10 Q -75 -30 -85 -55 Z" fill="url(#wcBodyEbi)"/><path d="M 95 55 L 115 75 L 105 50 L 120 35 L 95 30 Z" fill="url(#wcBodyEbi)"/></g>
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"><path d="M -85 -55 Q -115 -10 -100 50 Q -70 95 -10 95 Q 60 90 95 55 L 75 25 Q 55 0 15 5 Q -25 15 -55 -10 Q -75 -30 -85 -55 Z"/><path d="M 95 55 L 115 75 L 105 50 L 120 35 L 95 30"/><path d="M -88 -25 Q -75 -10 -60 -20" opacity="0.65" stroke-width="1.5"/><path d="M -100 5 Q -82 18 -65 5" opacity="0.65" stroke-width="1.5"/><path d="M -98 35 Q -75 48 -55 38" opacity="0.65" stroke-width="1.5"/><path d="M -75 70 Q -50 80 -25 70" opacity="0.65" stroke-width="1.5"/><path d="M -25 85 Q 5 90 30 80" opacity="0.65" stroke-width="1.5"/><path d="M 30 75 Q 55 78 80 65" opacity="0.65" stroke-width="1.5"/><path d="M -88 -55 Q -110 -75 -125 -100" opacity="0.85" stroke-width="2"/><path d="M -75 -55 Q -90 -80 -100 -110" opacity="0.7" stroke-width="1.8"/><path d="M -75 -45 m -3 0 a 3 3 0 1 0 6 0 a 3 3 0 1 0 -6 0 Z" opacity="0.95" stroke-width="2"/><path d="M -90 50 L -95 75" opacity="0.65" stroke-width="1.5"/><path d="M -55 80 L -55 100" opacity="0.65" stroke-width="1.5"/><path d="M -15 90 L -10 110" opacity="0.65" stroke-width="1.5"/><path d="M 30 88 L 35 108" opacity="0.65" stroke-width="1.5"/></g>
  </g>

  <!-- NG side (flat) -->
  <g transform="translate(800, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#C62828"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">×</text>
    <path d="M -85 -55 Q -115 -10 -100 50 Q -70 95 -10 95 Q 60 90 95 55 L 75 25 Q 55 0 15 5 Q -25 15 -55 -10 Q -75 -30 -85 -55 Z" fill="#705048"/><path d="M 95 55 L 115 75 L 105 50 L 120 35 L 95 30 Z" fill="#705048"/><ellipse cx="-85" cy="-45" rx="18" ry="14" fill="#1A1008" opacity="0.75"/><ellipse cx="-20" cy="50" rx="35" ry="25" fill="#3D2817" opacity="0.5"/>
  </g>

  <!-- Comparison labels -->
  <g font-size="20" fill="#333">
    <rect x="60" y="495" width="460" height="80" rx="8" fill="#E8F5E9"/>
    <text x="80" y="520" font-weight="bold" fill="#2C5F2D">● 殻が透き通る、節くっきり</text>
    <text x="80" y="545" font-weight="bold" fill="#2C5F2D">● 頭・尾が黒くない</text>
    <text x="80" y="568" fill="#666" font-size="17">触ってハリ、ヒゲ折れず</text>

    <rect x="560" y="495" width="460" height="80" rx="8" fill="#FFEBEE"/>
    <text x="580" y="520" font-weight="bold" fill="#C62828">× 頭が黒い・赤い斑点</text>
    <text x="580" y="545" font-weight="bold" fill="#C62828">× 殻と身が離れる、軟らか</text>
    <text x="580" y="568" fill="#666" font-size="17">色変=長期冷凍→冷凍焼け</text>
  </g>
</svg>
