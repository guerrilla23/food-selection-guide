<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="Noto Sans CJK JP, sans-serif">
  <rect width="1080" height="600" fill="#FFFFFF" rx="20"/>

  <!-- Header -->
  <text x="60" y="60" font-size="44" font-weight="900" fill="#F06A28">エビ</text>
  <line x1="60" y1="75" x2="180" y2="75" stroke="#F06A28" stroke-width="4"/>
  <text x="200" y="68" font-size="22" fill="#666">旬:通年</text>

  <line x1="540" y1="100" x2="540" y2="540" stroke="#DDD" stroke-width="2" stroke-dasharray="6,6"/>

  <!-- OK side -->
  <g transform="translate(280, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#2C5F2D"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">○</text>

    <defs>
      <linearGradient id="wcBodyEbi" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#FF9050" stop-opacity="0.95"/>
        <stop offset="50%" stop-color="#F06A28" stop-opacity="0.92"/>
        <stop offset="100%" stop-color="#A84012" stop-opacity="0.85"/>
      </linearGradient>
      <filter id="wcRoughEbi" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.04" numOctaves="3" seed="33"/>
        <feDisplacementMap in="SourceGraphic" scale="3"/>
      </filter>
      <filter id="wcBlurEbi">
        <feGaussianBlur stdDeviation="1.5"/>
      </filter>
    </defs>

    <!-- Watercolor bleeds -->
    <g filter="url(#wcBlurEbi)" opacity="0.4">
      <ellipse cx="0" cy="20" rx="170" ry="80" fill="#FBBA80"/>
    </g>

    <!-- ====================
         エビの形: 滑らかなC字カーブ全体
         頭(左の丸い大きい部分)→胴体(C字に湾曲)→尾(右の扇)
         体節は線で示し、輪郭は1本の滑らかなカーブ
         ==================== -->

    <!-- エビ全体の本体(頭+胴体が滑らかにつながったC字) -->
    <g filter="url(#wcRoughEbi)">
      <path d="M -160 -30
               Q -180 -10 -175 15
               Q -170 40 -150 50
               Q -130 60 -110 55
               Q -100 50 -95 35
               Q -85 30 -75 35
               Q -50 50 -10 55
               Q 30 58 70 50
               Q 105 38 125 18
               Q 140 0 142 -15
               L 168 -35
               L 175 -10
               L 168 15
               L 142 -8
               Q 138 -30 120 -45
               Q 95 -60 60 -65
               Q 20 -68 -25 -60
               Q -65 -52 -100 -42
               Q -125 -38 -140 -38
               Q -155 -38 -160 -30 Z" fill="url(#wcBodyEbi)"/>
    </g>

    <!-- Strong ink lines -->
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
      <!-- 本体輪郭 -->
      <path d="M -160 -30
               Q -180 -10 -175 15
               Q -170 40 -150 50
               Q -130 60 -110 55
               Q -100 50 -95 35
               Q -85 30 -75 35
               Q -50 50 -10 55
               Q 30 58 70 50
               Q 105 38 125 18
               Q 140 0 142 -15
               L 168 -35
               L 175 -10
               L 168 15
               L 142 -8
               Q 138 -30 120 -45
               Q 95 -60 60 -65
               Q 20 -68 -25 -60
               Q -65 -52 -100 -42
               Q -125 -38 -140 -38
               Q -155 -38 -160 -30 Z"/>

      <!-- 触覚(頭から伸びる、長い) -->
      <path d="M -155 -32 Q -180 -55 -195 -85 Q -200 -100 -195 -115" stroke-width="1.8"/>
      <path d="M -148 -38 Q -170 -65 -180 -90 Q -180 -105 -175 -118" stroke-width="1.5"/>
      <path d="M -140 -38 Q -150 -55 -155 -75" stroke-width="1.3"/>

      <!-- 目(頭の下) -->
      <circle cx="-150" cy="-5" r="5" fill="#3D2817"/>
      <circle cx="-148" cy="-7" r="1.5" fill="#FFFFFF"/>

      <!-- 体節の境界線(胴体に5本の弧で「節」を示す) -->
      <path d="M -85 -55 Q -88 -10 -90 30" stroke-width="2.2" opacity="0.8"/>
      <path d="M -55 -62 Q -55 -10 -55 35" stroke-width="2.2" opacity="0.8"/>
      <path d="M -20 -65 Q -20 -10 -15 38" stroke-width="2.2" opacity="0.8"/>
      <path d="M 20 -65 Q 22 -10 28 38" stroke-width="2.2" opacity="0.8"/>
      <path d="M 60 -60 Q 65 -10 75 30" stroke-width="2.2" opacity="0.8"/>
      <path d="M 100 -50 Q 105 -10 113 22" stroke-width="2.2" opacity="0.8"/>

      <!-- 尾びれの放射線 -->
      <path d="M 145 -25 L 165 -30" stroke-width="1.5"/>
      <path d="M 148 0 L 170 0" stroke-width="1.5"/>
      <path d="M 145 25 L 165 30" stroke-width="1.5"/>

      <!-- 脚(下方向に伸びる、4〜5本) -->
      <path d="M -100 50 Q -105 65 -108 78" stroke-width="1.5"/>
      <path d="M -75 55 Q -78 70 -78 82" stroke-width="1.5"/>
      <path d="M -45 58 Q -45 73 -42 85" stroke-width="1.5"/>
      <path d="M -10 60 Q -8 75 -5 87" stroke-width="1.5"/>
      <path d="M 30 58 Q 32 72 35 84" stroke-width="1.5"/>
      <path d="M 65 52 Q 68 65 70 78" stroke-width="1.5"/>
    </g>

    <!-- 体節間の白いライン(プリッと感を演出) -->
    <g stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.55">
      <path d="M -83 -50 Q -86 -10 -88 25"/>
      <path d="M -53 -57 Q -53 -10 -53 30"/>
      <path d="M -18 -60 Q -18 -10 -13 33"/>
      <path d="M 22 -60 Q 24 -10 30 33"/>
      <path d="M 62 -55 Q 67 -10 77 25"/>
    </g>

    <!-- ハイライト(プリッとした光沢) -->
    <ellipse cx="-50" cy="-30" rx="80" ry="6" fill="#FFFFFF" opacity="0.45"/>
    <ellipse cx="-30" cy="-35" rx="40" ry="3" fill="#FFFFFF" opacity="0.65"/>

    <!-- 影 -->
    <ellipse cx="0" cy="105" rx="160" ry="7" fill="#3D2817" opacity="0.12"/>
  </g>

  <!-- NG side -->
  <g transform="translate(800, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#C62828"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">×</text>

    <!-- 本体(くすんだ色) -->
    <path d="M -160 -30
             Q -180 -10 -175 15
             Q -170 40 -150 50
             Q -130 60 -110 55
             Q -100 50 -95 35
             Q -85 30 -75 35
             Q -50 50 -10 55
             Q 30 58 70 50
             Q 105 38 125 18
             Q 140 0 142 -15
             L 168 -35
             L 175 -10
             L 168 15
             L 142 -8
             Q 138 -30 120 -45
             Q 95 -60 60 -65
             Q 20 -68 -25 -60
             Q -65 -52 -100 -42
             Q -125 -38 -140 -38
             Q -155 -38 -160 -30 Z" fill="#783820"/>

    <!-- 頭の部分が黒ずむ(エビNGの最大ポイント) -->
    <g fill="#1F1408" opacity="0.7">
      <path d="M -160 -30
               Q -180 -10 -175 15
               Q -170 40 -150 50
               Q -130 60 -110 55
               Q -100 50 -95 35
               L -100 -42
               Q -125 -38 -140 -38
               Q -155 -38 -160 -30 Z"/>
    </g>

    <!-- 触覚(折れて短い) -->
    <g stroke="#3D2817" stroke-width="1.8" fill="none" stroke-linecap="round">
      <path d="M -155 -32 Q -170 -50 -175 -65"/>
      <path d="M -148 -38 Q -160 -55 -165 -70"/>
    </g>

    <!-- 目(濁る) -->
    <circle cx="-150" cy="-5" r="5" fill="#5A4A30"/>

    <!-- 体節の境界線 -->
    <g stroke="#3D2817" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.65">
      <path d="M -55 -62 Q -55 -10 -55 35"/>
      <path d="M -20 -65 Q -20 -10 -15 38"/>
      <path d="M 20 -65 Q 22 -10 28 38"/>
      <path d="M 60 -60 Q 65 -10 75 30"/>
    </g>

    <!-- 殻の黒い斑点(NG) -->
    <ellipse cx="-30" cy="-10" rx="6" ry="5" fill="#1F1408" opacity="0.7"/>
    <ellipse cx="20" cy="0" rx="7" ry="5" fill="#1F1408" opacity="0.7"/>
    <ellipse cx="65" cy="-15" rx="5" ry="4" fill="#1F1408" opacity="0.65"/>

    <!-- 輪郭 -->
    <path d="M -160 -30 Q -180 -10 -175 15 Q -170 40 -150 50 Q -130 60 -110 55 Q -100 50 -95 35 Q -85 30 -75 35 Q -50 50 -10 55 Q 30 58 70 50 Q 105 38 125 18 Q 140 0 142 -15 L 168 -35 L 175 -10 L 168 15 L 142 -8 Q 138 -30 120 -45 Q 95 -60 60 -65 Q 20 -68 -25 -60 Q -65 -52 -100 -42 Q -125 -38 -140 -38 Q -155 -38 -160 -30 Z" stroke="#3D2817" stroke-width="3" fill="none"/>

    <!-- 脚 -->
    <g stroke="#3D2817" stroke-width="1.5" fill="none" stroke-linecap="round">
      <path d="M -100 50 Q -105 65 -108 78"/>
      <path d="M -75 55 Q -78 70 -78 82"/>
      <path d="M -45 58 Q -45 73 -42 85"/>
      <path d="M -10 60 Q -8 75 -5 87"/>
      <path d="M 30 58 Q 32 72 35 84"/>
      <path d="M 65 52 Q 68 65 70 78"/>
    </g>

    <ellipse cx="0" cy="105" rx="160" ry="6" fill="#3D2817" opacity="0.1"/>
  </g>

  <!-- Comparison labels -->
  <g font-size="20" fill="#333">
    <rect x="60" y="495" width="460" height="80" rx="8" fill="#E8F5E9"/>
    <text x="80" y="520" font-weight="bold" fill="#2C5F2D">● 殻が透明感のあるオレンジ、ツヤあり</text>
    <text x="80" y="545" font-weight="bold" fill="#2C5F2D">● 頭と胴体がしっかり、プリッと弾力</text>
    <text x="80" y="568" fill="#666" font-size="17">触覚が長く折れていない=新鮮なエビ</text>

    <rect x="560" y="495" width="460" height="80" rx="8" fill="#FFEBEE"/>
    <text x="580" y="520" font-weight="bold" fill="#C62828">× 頭が黒ずみ(チロシン酸化のサイン)</text>
    <text x="580" y="545" font-weight="bold" fill="#C62828">× 殻に黒い斑点、触覚が折れている</text>
    <text x="580" y="568" fill="#666" font-size="17">頭の黒変は鮮度落ちの代表的サイン</text>
  </g>
</svg>
