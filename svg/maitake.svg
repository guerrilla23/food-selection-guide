<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="Noto Sans CJK JP, sans-serif">
  <rect width="1080" height="600" fill="#FFFFFF" rx="20"/>

  <!-- Header -->
  <text x="60" y="60" font-size="44" font-weight="900" fill="#785220">舞茸</text>
  <line x1="60" y1="75" x2="200" y2="75" stroke="#785220" stroke-width="4"/>
  <text x="220" y="68" font-size="22" fill="#666">旬:秋(通年流通)</text>

  <line x1="540" y1="100" x2="540" y2="540" stroke="#DDD" stroke-width="2" stroke-dasharray="6,6"/>

  <!-- OK side -->
  <g transform="translate(280, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#2C5F2D"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">○</text>

    <defs>
      <radialGradient id="wcCapMaitake" cx="50%" cy="40%">
        <stop offset="0%" stop-color="#A88858" stop-opacity="0.92"/>
        <stop offset="60%" stop-color="#7A6235" stop-opacity="0.88"/>
        <stop offset="100%" stop-color="#5A4520" stop-opacity="0.8"/>
      </radialGradient>
      <linearGradient id="wcStemMaitake" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#E8DCB8" stop-opacity="0.92"/>
        <stop offset="50%" stop-color="#FAF2D8" stop-opacity="0.95"/>
        <stop offset="100%" stop-color="#C8B888" stop-opacity="0.88"/>
      </linearGradient>
      <filter id="wcRoughMaitake" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.04" numOctaves="3" seed="25"/>
        <feDisplacementMap in="SourceGraphic" scale="3"/>
      </filter>
      <filter id="wcBlurMaitake">
        <feGaussianBlur stdDeviation="1.5"/>
      </filter>
    </defs>

    <!-- Watercolor bleeds -->
    <g filter="url(#wcBlurMaitake)" opacity="0.4">
      <ellipse cx="0" cy="0" rx="135" ry="105" fill="#A88858"/>
    </g>

    <!-- ====================
         エリンギ風の小さなキノコ4本が束になる構造
         株元で軸が集まり、傘が個別に見える
         ==================== -->

    <!-- 株元(軸が集まる白い部分) -->
    <g filter="url(#wcRoughMaitake)">
      <ellipse cx="0" cy="105" rx="55" ry="18" fill="url(#wcStemMaitake)"/>
    </g>

    <!-- ===== キノコ1: 左奥(後ろ、少し小さく) ===== -->
    <!-- 軸 -->
    <g filter="url(#wcRoughMaitake)">
      <path d="M -65 -10
               Q -68 35 -65 90
               Q -60 105 -45 105
               Q -32 100 -32 90
               Q -33 35 -33 -10 Z" fill="url(#wcStemMaitake)"/>
    </g>
    <!-- 傘 -->
    <g filter="url(#wcRoughMaitake)">
      <path d="M -85 -10
               Q -88 -45 -65 -60
               Q -45 -65 -28 -60
               Q -10 -45 -12 -10
               Q -20 -2 -32 -2
               Q -50 0 -65 -2
               Q -78 -2 -85 -10 Z" fill="url(#wcCapMaitake)"/>
    </g>

    <!-- ===== キノコ2: 中央左(前、最も大きい) ===== -->
    <!-- 軸 -->
    <g filter="url(#wcRoughMaitake)">
      <path d="M -25 -5
               Q -28 35 -25 95
               Q -20 110 -5 110
               Q 8 105 8 95
               Q 7 35 7 -5 Z" fill="url(#wcStemMaitake)"/>
    </g>
    <!-- 傘 -->
    <g filter="url(#wcRoughMaitake)">
      <path d="M -45 -5
               Q -48 -55 -25 -72
               Q 0 -78 18 -72
               Q 35 -55 32 -5
               Q 25 5 8 5
               Q -10 7 -25 5
               Q -38 5 -45 -5 Z" fill="url(#wcCapMaitake)"/>
    </g>

    <!-- ===== キノコ3: 中央右(前) ===== -->
    <!-- 軸 -->
    <g filter="url(#wcRoughMaitake)">
      <path d="M 18 0
               Q 15 40 18 100
               Q 23 115 38 110
               Q 52 105 50 95
               Q 50 40 50 0 Z" fill="url(#wcStemMaitake)"/>
    </g>
    <!-- 傘 -->
    <g filter="url(#wcRoughMaitake)">
      <path d="M 0 0
               Q -3 -50 18 -68
               Q 38 -73 60 -68
               Q 78 -50 75 0
               Q 65 8 50 8
               Q 30 10 18 8
               Q 5 8 0 0 Z" fill="url(#wcCapMaitake)"/>
    </g>

    <!-- ===== キノコ4: 右奥(後ろ、少し小さく) ===== -->
    <!-- 軸 -->
    <g filter="url(#wcRoughMaitake)">
      <path d="M 60 -5
               Q 58 35 60 90
               Q 65 100 78 100
               Q 90 95 90 88
               Q 90 35 90 -5 Z" fill="url(#wcStemMaitake)"/>
    </g>
    <!-- 傘 -->
    <g filter="url(#wcRoughMaitake)">
      <path d="M 45 -5
               Q 42 -45 62 -60
               Q 80 -65 95 -60
               Q 110 -45 108 -5
               Q 100 2 90 2
               Q 75 4 62 2
               Q 50 2 45 -5 Z" fill="url(#wcCapMaitake)"/>
    </g>

    <!-- Strong ink lines -->
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
      <!-- 株元 -->
      <ellipse cx="0" cy="105" rx="55" ry="18"/>

      <!-- キノコ1 -->
      <path d="M -65 -10 Q -68 35 -65 90 Q -60 105 -45 105 Q -32 100 -32 90 Q -33 35 -33 -10"/>
      <path d="M -85 -10 Q -88 -45 -65 -60 Q -45 -65 -28 -60 Q -10 -45 -12 -10 Q -20 -2 -32 -2 Q -50 0 -65 -2 Q -78 -2 -85 -10 Z"/>
      <path d="M -85 -10 Q -50 -5 -12 -10" opacity="0.6"/>

      <!-- キノコ2(中央左) -->
      <path d="M -25 -5 Q -28 35 -25 95 Q -20 110 -5 110 Q 8 105 8 95 Q 7 35 7 -5"/>
      <path d="M -45 -5 Q -48 -55 -25 -72 Q 0 -78 18 -72 Q 35 -55 32 -5 Q 25 5 8 5 Q -10 7 -25 5 Q -38 5 -45 -5 Z"/>
      <path d="M -45 -5 Q -10 0 32 -5" opacity="0.6"/>

      <!-- キノコ3(中央右) -->
      <path d="M 18 0 Q 15 40 18 100 Q 23 115 38 110 Q 52 105 50 95 Q 50 40 50 0"/>
      <path d="M 0 0 Q -3 -50 18 -68 Q 38 -73 60 -68 Q 78 -50 75 0 Q 65 8 50 8 Q 30 10 18 8 Q 5 8 0 0 Z"/>
      <path d="M 0 0 Q 35 5 75 0" opacity="0.6"/>

      <!-- キノコ4 -->
      <path d="M 60 -5 Q 58 35 60 90 Q 65 100 78 100 Q 90 95 90 88 Q 90 35 90 -5"/>
      <path d="M 45 -5 Q 42 -45 62 -60 Q 80 -65 95 -60 Q 110 -45 108 -5 Q 100 2 90 2 Q 75 4 62 2 Q 50 2 45 -5 Z"/>
      <path d="M 45 -5 Q 75 0 108 -5" opacity="0.6"/>

      <!-- 傘の表面のうねり線(各キノコ) -->
      <path d="M -75 -35 Q -50 -42 -22 -35" opacity="0.5" stroke-width="1.5"/>
      <path d="M -35 -50 Q 0 -58 25 -50" opacity="0.5" stroke-width="1.5"/>
      <path d="M 10 -45 Q 38 -55 65 -45" opacity="0.5" stroke-width="1.5"/>
      <path d="M 55 -35 Q 78 -42 100 -35" opacity="0.5" stroke-width="1.5"/>
    </g>

    <!-- 軸のハイライト(各キノコ) -->
    <ellipse cx="-50" cy="40" rx="3" ry="40" fill="#FFFFFF" opacity="0.5"/>
    <ellipse cx="-12" cy="50" rx="4" ry="45" fill="#FFFFFF" opacity="0.55"/>
    <ellipse cx="30" cy="50" rx="4" ry="45" fill="#FFFFFF" opacity="0.55"/>
    <ellipse cx="73" cy="40" rx="3" ry="40" fill="#FFFFFF" opacity="0.5"/>

    <!-- 影 -->
    <ellipse cx="0" cy="128" rx="55" ry="6" fill="#3D2817" opacity="0.12"/>
  </g>

  <!-- NG side -->
  <g transform="translate(800, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#C62828"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">×</text>

    <!-- 株元(変色) -->
    <ellipse cx="0" cy="105" rx="55" ry="18" fill="#A89060"/>
    <ellipse cx="-15" cy="105" rx="10" ry="4" fill="#5A3215" opacity="0.7"/>
    <ellipse cx="20" cy="107" rx="9" ry="3" fill="#5A3215" opacity="0.65"/>

    <!-- キノコ1 軸+傘(くすむ) -->
    <path d="M -65 -10 Q -68 35 -65 90 Q -60 105 -45 105 Q -32 100 -32 90 Q -33 35 -33 -10 Z" fill="#C8B888"/>
    <path d="M -85 -10 Q -88 -45 -65 -60 Q -45 -65 -28 -60 Q -10 -45 -12 -10 Q -20 -2 -32 -2 Q -50 0 -65 -2 Q -78 -2 -85 -10 Z" fill="#5A4218"/>

    <!-- キノコ2 -->
    <path d="M -25 -5 Q -28 35 -25 95 Q -20 110 -5 110 Q 8 105 8 95 Q 7 35 7 -5 Z" fill="#C8B888"/>
    <path d="M -45 -5 Q -48 -55 -25 -72 Q 0 -78 18 -72 Q 35 -55 32 -5 Q 25 5 8 5 Q -10 7 -25 5 Q -38 5 -45 -5 Z" fill="#5A4218"/>

    <!-- キノコ3 -->
    <path d="M 18 0 Q 15 40 18 100 Q 23 115 38 110 Q 52 105 50 95 Q 50 40 50 0 Z" fill="#C8B888"/>
    <path d="M 0 0 Q -3 -50 18 -68 Q 38 -73 60 -68 Q 78 -50 75 0 Q 65 8 50 8 Q 30 10 18 8 Q 5 8 0 0 Z" fill="#5A4218"/>

    <!-- キノコ4 -->
    <path d="M 60 -5 Q 58 35 60 90 Q 65 100 78 100 Q 90 95 90 88 Q 90 35 90 -5 Z" fill="#C8B888"/>
    <path d="M 45 -5 Q 42 -45 62 -60 Q 80 -65 95 -60 Q 110 -45 108 -5 Q 100 2 90 2 Q 75 4 62 2 Q 50 2 45 -5 Z" fill="#5A4218"/>

    <!-- 黒い斑点 -->
    <ellipse cx="-55" cy="-35" rx="9" ry="6" fill="#1F1408" opacity="0.7"/>
    <ellipse cx="0" cy="-50" rx="10" ry="7" fill="#1F1408" opacity="0.7"/>
    <ellipse cx="40" cy="-45" rx="9" ry="6" fill="#1F1408" opacity="0.7"/>
    <ellipse cx="80" cy="-30" rx="9" ry="6" fill="#1F1408" opacity="0.65"/>

    <!-- 軸の茶色シミ -->
    <ellipse cx="-48" cy="40" rx="6" ry="9" fill="#7A4A1F" opacity="0.55"/>
    <ellipse cx="-5" cy="50" rx="6" ry="10" fill="#7A4A1F" opacity="0.55"/>
    <ellipse cx="35" cy="60" rx="6" ry="9" fill="#7A4A1F" opacity="0.55"/>
    <ellipse cx="78" cy="40" rx="5" ry="8" fill="#7A4A1F" opacity="0.5"/>

    <!-- 輪郭(再描画) -->
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <ellipse cx="0" cy="105" rx="55" ry="18"/>
      <path d="M -65 -10 Q -68 35 -65 90 Q -60 105 -45 105 Q -32 100 -32 90 Q -33 35 -33 -10"/>
      <path d="M -85 -10 Q -88 -45 -65 -60 Q -45 -65 -28 -60 Q -10 -45 -12 -10 Q -20 -2 -32 -2 Q -50 0 -65 -2 Q -78 -2 -85 -10 Z"/>
      <path d="M -25 -5 Q -28 35 -25 95 Q -20 110 -5 110 Q 8 105 8 95 Q 7 35 7 -5"/>
      <path d="M -45 -5 Q -48 -55 -25 -72 Q 0 -78 18 -72 Q 35 -55 32 -5 Q 25 5 8 5 Q -10 7 -25 5 Q -38 5 -45 -5 Z"/>
      <path d="M 18 0 Q 15 40 18 100 Q 23 115 38 110 Q 52 105 50 95 Q 50 40 50 0"/>
      <path d="M 0 0 Q -3 -50 18 -68 Q 38 -73 60 -68 Q 78 -50 75 0 Q 65 8 50 8 Q 30 10 18 8 Q 5 8 0 0 Z"/>
      <path d="M 60 -5 Q 58 35 60 90 Q 65 100 78 100 Q 90 95 90 88 Q 90 35 90 -5"/>
      <path d="M 45 -5 Q 42 -45 62 -60 Q 80 -65 95 -60 Q 110 -45 108 -5 Q 100 2 90 2 Q 75 4 62 2 Q 50 2 45 -5 Z"/>
    </g>
  </g>

  <!-- Comparison labels -->
  <g font-size="20" fill="#333">
    <rect x="60" y="495" width="460" height="80" rx="8" fill="#E8F5E9"/>
    <text x="80" y="520" font-weight="bold" fill="#2C5F2D">● 傘がしっかり立体的、濃い茶色</text>
    <text x="80" y="545" font-weight="bold" fill="#2C5F2D">● 株元が乾いてしっかりしている</text>
    <text x="80" y="568" fill="#666" font-size="17">小房に分かれていても傘がしっかりが目印</text>

    <rect x="560" y="495" width="460" height="80" rx="8" fill="#FFEBEE"/>
    <text x="580" y="520" font-weight="bold" fill="#C62828">× 傘が黒ずみ、湿っぽくしんなり</text>
    <text x="580" y="545" font-weight="bold" fill="#C62828">× 株元が水っぽく、茶色く変色</text>
    <text x="580" y="568" fill="#666" font-size="17">パック内で水滴が多い=傷みのサイン</text>
  </g>
</svg>
