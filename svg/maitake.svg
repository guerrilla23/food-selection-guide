<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="Noto Sans CJK JP, sans-serif">
  <rect width="1080" height="600" fill="#FFFFFF" rx="20"/>

  <!-- Header -->
  <text x="60" y="60" font-size="44" font-weight="900" fill="#5D4E37">舞茸</text>
  <line x1="60" y1="75" x2="120" y2="75" stroke="#5D4E37" stroke-width="4"/>
  <text x="140" y="68" font-size="22" fill="#666">旬:9〜10月</text>

  <line x1="540" y1="100" x2="540" y2="540" stroke="#DDD" stroke-width="2" stroke-dasharray="6,6"/>

  <!-- OK side (watercolor Pattern A) -->
  <g transform="translate(280, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#2C5F2D"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">○</text>
    <defs>
      <radialGradient id="wcBodyMaitake" cx="35%" cy="25%"><stop offset="0%" stop-color="#D8B89A" stop-opacity="0.95"/><stop offset="40%" stop-color="#A07848" stop-opacity="0.9"/><stop offset="80%" stop-color="#7E5A2A" stop-opacity="0.85"/><stop offset="100%" stop-color="#4F3A1F" stop-opacity="0.65"/></radialGradient>
      <radialGradient id="wcLeafMaitake" cx="50%" cy="20%"><stop offset="0%" stop-color="#9BCB7A" stop-opacity="0.9"/><stop offset="60%" stop-color="#5D8F3D" stop-opacity="0.7"/><stop offset="100%" stop-color="#2C5F2D" stop-opacity="0.5"/></radialGradient>
      <filter id="wcRoughMaitake" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.04" numOctaves="3" seed="103"/>
        <feDisplacementMap in="SourceGraphic" scale="4"/>
      </filter>
      <filter id="wcBlurMaitake"><feGaussianBlur stdDeviation="1.5"/></filter>
    </defs>
    <g filter="url(#wcBlurMaitake)" opacity="0.4"><ellipse cx="0" cy="0" rx="125" ry="100" fill="#8B6840"/></g>
    
    <g filter="url(#wcRoughMaitake)"><path d="M -125 25 Q -135 -65 -85 -100 Q -55 -100 -55 -65 Q -75 -25 -78 30 Q -100 45 -125 25 Z" fill="url(#wcBodyMaitake)" opacity="0.7"/><path d="M -78 50 Q -90 -45 -45 -100 Q -15 -100 -10 -65 Q -35 -25 -32 60 Q -55 70 -78 50 Z" fill="url(#wcBodyMaitake)" opacity="0.85"/><path d="M -28 65 Q -38 -25 10 -105 Q 40 -105 38 -60 Q 18 -10 22 75 Q -5 85 -28 65 Z" fill="url(#wcBodyMaitake)"/><path d="M 28 60 Q 22 -30 70 -100 Q 95 -100 88 -55 Q 65 -10 70 65 Q 48 75 28 60 Z" fill="url(#wcBodyMaitake)" opacity="0.92"/><path d="M 75 35 Q 75 -50 120 -85 Q 135 -82 122 -35 Q 105 0 105 50 Q 85 60 75 35 Z" fill="url(#wcBodyMaitake)"/></g>
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"><path d="M -125 25 Q -135 -65 -85 -100 Q -55 -100 -55 -65 Q -75 -25 -78 30 Q -100 45 -125 25 Z"/><path d="M -78 50 Q -90 -45 -45 -100 Q -15 -100 -10 -65 Q -35 -25 -32 60 Q -55 70 -78 50 Z"/><path d="M -28 65 Q -38 -25 10 -105 Q 40 -105 38 -60 Q 18 -10 22 75 Q -5 85 -28 65 Z"/><path d="M 28 60 Q 22 -30 70 -100 Q 95 -100 88 -55 Q 65 -10 70 65 Q 48 75 28 60 Z"/><path d="M 75 35 Q 75 -50 120 -85 Q 135 -82 122 -35 Q 105 0 105 50 Q 85 60 75 35 Z"/><path d="M -100 35 Q -105 -25 -85 -85" opacity="0.65" stroke-width="1.4"/><path d="M -55 60 Q -65 -10 -45 -85" opacity="0.65" stroke-width="1.4"/><path d="M -42 60 Q -50 0 -30 -75" opacity="0.55" stroke-width="1.3"/><path d="M -8 75 Q -15 0 5 -90" opacity="0.65" stroke-width="1.4"/><path d="M 8 75 Q 5 0 22 -90" opacity="0.55" stroke-width="1.3"/><path d="M 48 65 Q 45 -10 65 -85" opacity="0.65" stroke-width="1.4"/><path d="M 60 60 Q 60 0 80 -75" opacity="0.55" stroke-width="1.3"/><path d="M 92 40 Q 92 -25 110 -75" opacity="0.65" stroke-width="1.4"/><path d="M -115 30 Q -55 60 0 70 Q 60 65 105 45" opacity="0.45" stroke-width="1.2"/></g>
  </g>

  <!-- NG side (flat) -->
  <g transform="translate(800, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#C62828"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">×</text>
    <path d="M -120 30 Q -130 -55 -75 -90 Q -50 -88 -45 -55 Q -65 -10 -65 35 Q -90 50 -120 30 Z" fill="#A09078"/><path d="M -55 50 Q -68 -35 -10 -100 Q 18 -98 22 -65 Q 0 -10 0 60 Q -28 70 -55 50 Z" fill="#A09078"/><path d="M 5 60 Q 0 -25 55 -90 Q 80 -85 78 -50 Q 58 0 58 65 Q 30 75 5 60 Z" fill="#A09078"/><path d="M 60 40 Q 60 -40 110 -75 Q 125 -70 115 -30 Q 100 5 100 45 Q 80 60 60 40 Z" fill="#A09078"/><ellipse cx="-30" cy="40" rx="22" ry="18" fill="#3D2817" opacity="0.5"/><ellipse cx="40" cy="-30" rx="18" ry="14" fill="#3D2817" opacity="0.5"/><path d="M -90 55 Q 0 70 95 50" stroke="#5D4E37" stroke-width="1.5" fill="none" opacity="0.5"/>
  </g>

  <!-- Comparison labels -->
  <g font-size="20" fill="#333">
    <rect x="60" y="495" width="460" height="80" rx="8" fill="#E8F5E9"/>
    <text x="80" y="520" font-weight="bold" fill="#2C5F2D">● 株がしっかりまとまる</text>
    <text x="80" y="545" font-weight="bold" fill="#2C5F2D">● 色が深い茶色、肉厚</text>
    <text x="80" y="568" fill="#666" font-size="17">香り強い=料理映え</text>

    <rect x="560" y="495" width="460" height="80" rx="8" fill="#FFEBEE"/>
    <text x="580" y="520" font-weight="bold" fill="#C62828">× カサがバラバラに崩れる</text>
    <text x="580" y="545" font-weight="bold" fill="#C62828">× 色がくすむ・湿気</text>
    <text x="580" y="568" fill="#666" font-size="17">黒ずみ=古い・劣化</text>
  </g>
</svg>
