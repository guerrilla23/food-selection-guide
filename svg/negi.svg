<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="Noto Sans CJK JP, sans-serif">
  <rect width="1080" height="600" fill="#FFFFFF" rx="20"/>
  
  <!-- Header -->
  <text x="60" y="60" font-size="44" font-weight="900" fill="#2C5F2D">ねぎ(長ねぎ)</text>
  <line x1="60" y1="75" x2="320" y2="75" stroke="#2C5F2D" stroke-width="4"/>
  <text x="340" y="68" font-size="22" fill="#666">旬:11月〜2月</text>
  
  <line x1="540" y1="100" x2="540" y2="540" stroke="#DDD" stroke-width="2" stroke-dasharray="6,6"/>
  
  <!-- OK side (Pattern A: watercolor with strong ink lines) -->
  <g transform="translate(280, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#2C5F2D"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">○</text>

    <!-- Watercolor defs (negi-specific) -->
    <defs>
      <linearGradient id="wcWhiteNegi" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
        <stop offset="50%" stop-color="#F5F2EA" stop-opacity="0.85"/>
        <stop offset="100%" stop-color="#C8C0AC" stop-opacity="0.7"/>
      </linearGradient>
      <linearGradient id="wcGreenNegi" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#9BCB7A" stop-opacity="0.9"/>
        <stop offset="50%" stop-color="#5D8F3D" stop-opacity="0.85"/>
        <stop offset="100%" stop-color="#2C5F2D" stop-opacity="0.7"/>
      </linearGradient>
      <filter id="wcRoughNegi" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.04" numOctaves="3" seed="7"/>
        <feDisplacementMap in="SourceGraphic" scale="4"/>
      </filter>
      <filter id="wcBlurNegi">
        <feGaussianBlur stdDeviation="1.5"/>
      </filter>
    </defs>

    <g transform="rotate(-15)">
      <!-- Watercolor bleeds (背景、細長い形に合わせて) -->
      <g filter="url(#wcBlurNegi)" opacity="0.4">
        <ellipse cx="-175" cy="0" rx="65" ry="38" fill="#5D8F3D"/>
        <ellipse cx="55" cy="0" rx="180" ry="38" fill="#E8DCC0"/>
      </g>

      <!-- Green leaves part (細く長く) -->
      <g filter="url(#wcRoughNegi)">
        <path d="M -220 -25 L -220 25 Q -180 28 -130 25 L -130 -25 Q -180 -28 -220 -25 Z" fill="url(#wcGreenNegi)"/>
      </g>

      <!-- Sharp transition (緑と白のくっきり境目) -->
      <path d="M -130 -25 L -110 -28 L -110 28 L -130 25 Z" fill="#A8C76E" opacity="0.85"/>

      <!-- White part (細く長い円柱) -->
      <g filter="url(#wcRoughNegi)">
        <path d="M -110 -28 L 200 -25 Q 220 -25 220 -20 L 220 20 Q 220 25 200 25 L -110 28 Z" fill="url(#wcWhiteNegi)"/>
      </g>

      <!-- Right end (root cap) -->
      <ellipse cx="220" cy="0" rx="5" ry="22" fill="#F0F0E8" opacity="0.85"/>

      <!-- Strong ink lines (Pattern A) -->
      <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
        <!-- Green leaves outline -->
        <path d="M -220 -25 L -220 25 Q -180 28 -130 25 L -130 -25 Q -180 -28 -220 -25 Z"/>
        <!-- White body outline -->
        <path d="M -110 -28 L 200 -25 Q 220 -25 220 -20 L 220 20 Q 220 25 200 25 L -110 28 Z"/>
        <!-- Sharp boundary (緑↔白) -->
        <line x1="-120" y1="-26" x2="-120" y2="26" stroke-width="2.5"/>
        <!-- Leaf vertical bands -->
        <line x1="-218" y1="-13" x2="-132" y2="-13" opacity="0.7" stroke-width="1.5"/>
        <line x1="-218" y1="0"   x2="-132" y2="0"   opacity="0.7" stroke-width="1.5"/>
        <line x1="-218" y1="13"  x2="-132" y2="13"  opacity="0.7" stroke-width="1.5"/>
        <!-- White-section ridges -->
        <path d="M -100 -12 Q 50 -10 210 -8" opacity="0.5" stroke-width="1.3"/>
        <path d="M -100 0    Q 50 2 210 4"   opacity="0.5" stroke-width="1.3"/>
        <path d="M -100 12   Q 50 14 210 16" opacity="0.5" stroke-width="1.3"/>
        <!-- Hair roots (ねぎの特徴部分: 太く長く目立たせる) -->
        <line x1="220" y1="-15" x2="246" y2="-22"/>
        <line x1="220" y1="-7"  x2="250" y2="-10"/>
        <line x1="220" y1="0"   x2="254" y2="0"/>
        <line x1="220" y1="7"   x2="250" y2="10"/>
        <line x1="220" y1="15"  x2="246" y2="22"/>
      </g>
    </g>
  </g>
  
  <!-- NG side -->
  <g transform="translate(800, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#C62828"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">×</text>
    
    <g transform="rotate(-15)">
      <!-- Yellowing leaves -->
      <path d="M -180 -45 L -180 45 Q -150 50 -120 45 L -120 -45 Q -150 -50 -180 -45 Z" fill="#9F8730"/>
      <!-- Wilted tip -->
      <path d="M -180 -45 Q -195 -30 -200 -10 L -200 10 Q -195 30 -180 45" fill="#7A6720" opacity="0.8"/>
      <line x1="-178" y1="-25" x2="-122" y2="-25" stroke="#5D4E0F" stroke-width="1"/>
      <line x1="-178" y1="0" x2="-122" y2="0" stroke="#5D4E0F" stroke-width="1"/>
      <line x1="-178" y1="25" x2="-122" y2="25" stroke="#5D4E0F" stroke-width="1"/>
      
      <!-- Blurred transition -->
      <path d="M -120 -45 L -100 -45 L -100 45 L -120 45 Z" fill="#B5B080"/>
      
      <!-- White part (thinner, dull) -->
      <path d="M -100 -38 L 150 -35 Q 170 -35 170 -30 L 170 30 Q 170 35 150 35 L -100 38 Z" fill="#E8E5D2"/>
      <!-- Wrinkles on white -->
      <path d="M -90 -25 Q -30 -20 30 -25 Q 90 -20 160 -25" stroke="#A89E7A" stroke-width="1.5" fill="none"/>
      <path d="M -90 0 Q -30 5 30 0 Q 90 5 160 0" stroke="#A89E7A" stroke-width="1.5" fill="none"/>
      <path d="M -90 25 Q -30 20 30 25 Q 90 20 160 25" stroke="#A89E7A" stroke-width="1.5" fill="none"/>
      <!-- Brown spots -->
      <ellipse cx="30" cy="-15" rx="10" ry="5" fill="#8B6F47" opacity="0.5"/>
      <ellipse cx="80" cy="15" rx="8" ry="4" fill="#8B6F47" opacity="0.5"/>
      <!-- Dried/brown root end -->
      <ellipse cx="170" cy="0" rx="6" ry="35" fill="#A89E7A"/>
      <ellipse cx="170" cy="0" rx="3" ry="30" fill="#5D4E37"/>
    </g>
  </g>
  
  <!-- Comparison labels -->
  <g font-size="20" fill="#333">
    <rect x="60" y="495" width="460" height="80" rx="8" fill="#E8F5E9"/>
    <text x="80" y="520" font-weight="bold" fill="#2C5F2D">● 白い部分が太く詰まっている</text>
    <text x="80" y="545" font-weight="bold" fill="#2C5F2D">● 緑と白の境目がくっきり、葉先までピン</text>
    <text x="80" y="568" fill="#666" font-size="17">白=加熱で甘み / 緑=薬味・炒め物</text>
    
    <rect x="560" y="495" width="460" height="80" rx="8" fill="#FFEBEE"/>
    <text x="580" y="520" font-weight="bold" fill="#C62828">× 白い部分が細く空洞感がある</text>
    <text x="580" y="545" font-weight="bold" fill="#C62828">× 葉が黄色く萎れ、切り口が乾燥</text>
    <text x="580" y="568" fill="#666" font-size="17">境目がぼやけている=鮮度落ちのサイン</text>
  </g>
</svg>
