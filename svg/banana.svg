<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="Noto Sans CJK JP, sans-serif">
  <rect width="1080" height="600" fill="#FFFFFF" rx="20"/>

  <!-- Header -->
  <text x="60" y="60" font-size="44" font-weight="900" fill="#E0B040">バナナ</text>
  <line x1="60" y1="75" x2="150" y2="75" stroke="#E0B040" stroke-width="4"/>
  <text x="170" y="68" font-size="22" fill="#666">旬:通年</text>

  <line x1="540" y1="100" x2="540" y2="540" stroke="#DDD" stroke-width="2" stroke-dasharray="6,6"/>

  <!-- OK side (watercolor Pattern A) -->
  <g transform="translate(280, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#2C5F2D"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">○</text>
    <defs>
      <radialGradient id="wcBodyBanana" cx="35%" cy="25%"><stop offset="0%" stop-color="#FFF5C0" stop-opacity="0.95"/><stop offset="40%" stop-color="#FFE066" stop-opacity="0.9"/><stop offset="80%" stop-color="#F2C232" stop-opacity="0.85"/><stop offset="100%" stop-color="#B88A1B" stop-opacity="0.7"/></radialGradient>
      <radialGradient id="wcLeafBanana" cx="50%" cy="20%"><stop offset="0%" stop-color="#9BCB7A" stop-opacity="0.9"/><stop offset="60%" stop-color="#5D8F3D" stop-opacity="0.7"/><stop offset="100%" stop-color="#2C5F2D" stop-opacity="0.5"/></radialGradient>
      <filter id="wcRoughBanana" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.04" numOctaves="3" seed="37"/>
        <feDisplacementMap in="SourceGraphic" scale="4"/>
      </filter>
      <filter id="wcBlurBanana"><feGaussianBlur stdDeviation="1.5"/></filter>
    </defs>
    <g filter="url(#wcBlurBanana)" opacity="0.4"><ellipse cx="10" cy="0" rx="140" ry="75" fill="#FFE066"/></g>
    <g filter="url(#wcRoughBanana)" opacity="0.8"><path d="M -98 -38 Q -115 -65 -100 -90 Q -82 -78 -88 -42 Z" fill="url(#wcLeafBanana)"/></g>
    <g filter="url(#wcRoughBanana)"><path d="M -98 -38 Q -55 -88 30 -85 Q 95 -75 115 -25 Q 122 -2 105 10 Q 55 -5 -10 -5 Q -75 -8 -95 -22 Q -110 -32 -98 -38 Z" fill="url(#wcBodyBanana)"/></g>
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"><path d="M -98 -38 Q -55 -88 30 -85 Q 95 -75 115 -25 Q 122 -2 105 10 Q 55 -5 -10 -5 Q -75 -8 -95 -22 Q -110 -32 -98 -38 Z"/><path d="M -98 -38 Q -115 -65 -100 -90 Q -82 -78 -88 -42 Z" opacity="0.9" stroke-width="2.2"/><path d="M -75 -65 Q -10 -75 60 -75" opacity="0.55" stroke-width="1.4"/><path d="M -75 -25 Q -10 -38 70 -38" opacity="0.5" stroke-width="1.3"/><path d="M 115 -25 L 122 -10 L 117 -2" opacity="0.85" stroke-width="2.2"/></g>
  </g>

  <!-- NG side (flat) -->
  <g transform="translate(800, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#C62828"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">×</text>
    <path d="M -95 -65 Q -50 -100 50 -85 Q 105 -65 120 -15 Q 110 25 75 30 Q 0 15 -55 25 Q -90 25 -110 0 Q -120 -35 -95 -65 Z" fill="#988030"/><path d="M -100 -55 Q -110 -85 -90 -100 Q -78 -95 -85 -65 Z" fill="#3D2817"/><ellipse cx="-40" cy="-50" rx="25" ry="18" fill="#3D2817" opacity="0.7"/><ellipse cx="30" cy="-20" rx="30" ry="22" fill="#3D2817" opacity="0.7"/><ellipse cx="80" cy="5" rx="18" ry="14" fill="#3D2817" opacity="0.65"/>
  </g>

  <!-- Comparison labels -->
  <g font-size="20" fill="#333">
    <rect x="60" y="495" width="460" height="80" rx="8" fill="#E8F5E9"/>
    <text x="80" y="520" font-weight="bold" fill="#2C5F2D">● 黄色が鮮やか、軸が緑</text>
    <text x="80" y="545" font-weight="bold" fill="#2C5F2D">● シュガースポット少なめ</text>
    <text x="80" y="568" fill="#666" font-size="17">糖度ピーク=斑点出始め(完熟)</text>

    <rect x="560" y="495" width="460" height="80" rx="8" fill="#FFEBEE"/>
    <text x="580" y="520" font-weight="bold" fill="#C62828">× 全体に黒い斑点が大きく広がる</text>
    <text x="580" y="545" font-weight="bold" fill="#C62828">× 軸が黒く折れそう、軟らかい</text>
    <text x="580" y="568" fill="#666" font-size="17">皮全体が黒くても、中が良ければ食べれる</text>
  </g>
</svg>
