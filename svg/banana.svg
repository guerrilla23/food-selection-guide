<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="Noto Sans CJK JP, sans-serif">
  <rect width="1080" height="600" fill="#FFFFFF" rx="20"/>

  <!-- Header -->
  <text x="60" y="60" font-size="44" font-weight="900" fill="#F0C038">バナナ</text>
  <line x1="60" y1="75" x2="220" y2="75" stroke="#F0C038" stroke-width="4"/>
  <text x="240" y="68" font-size="22" fill="#666">旬:通年</text>

  <line x1="540" y1="100" x2="540" y2="540" stroke="#DDD" stroke-width="2" stroke-dasharray="6,6"/>

  <!-- OK side -->
  <g transform="translate(280, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#2C5F2D"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">○</text>

    <defs>
      <linearGradient id="wcBodyBanana" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#FFE988" stop-opacity="0.95"/>
        <stop offset="50%" stop-color="#F0C038" stop-opacity="0.92"/>
        <stop offset="100%" stop-color="#B88A20" stop-opacity="0.78"/>
      </linearGradient>
      <linearGradient id="wcBodyBananaBack" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#F0C870" stop-opacity="0.92"/>
        <stop offset="100%" stop-color="#A07820" stop-opacity="0.75"/>
      </linearGradient>
      <linearGradient id="wcStemBanana" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#9BCB7A" stop-opacity="0.92"/>
        <stop offset="60%" stop-color="#7A8838" stop-opacity="0.88"/>
        <stop offset="100%" stop-color="#5A4525" stop-opacity="0.85"/>
      </linearGradient>
      <filter id="wcRoughBanana" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.04" numOctaves="3" seed="19"/>
        <feDisplacementMap in="SourceGraphic" scale="3"/>
      </filter>
      <filter id="wcBlurBanana">
        <feGaussianBlur stdDeviation="1.5"/>
      </filter>
    </defs>

    <!-- Watercolor bleeds (横長) -->
    <g filter="url(#wcBlurBanana)" opacity="0.4">
      <ellipse cx="0" cy="0" rx="170" ry="80" fill="#FFE585"/>
    </g>

    <!-- ====================
         横向き構図: 左にヘタ(緑)、右にお尻(花落ちの黒い先端)
         机に置いた状態を表現、バナナは横たわる
         ==================== -->

    <!-- 軸/ヘタ(左側、緑から茶色のグラデ) -->
    <g filter="url(#wcRoughBanana)">
      <path d="M -150 -45
               Q -165 -25 -168 0
               Q -165 25 -150 45
               L -130 38
               Q -125 0 -130 -38 Z" fill="url(#wcStemBanana)"/>
    </g>

    <!-- バナナ1: 後ろ(やや上、奥にあるので少し色が薄い) -->
    <g filter="url(#wcRoughBanana)">
      <path d="M -130 -38
               Q -100 -55 -50 -60
               Q 30 -62 90 -50
               Q 130 -38 145 -15
               Q 148 0 140 12
               Q 130 18 110 18
               Q 30 18 -50 8
               Q -100 0 -125 -10
               Q -130 -25 -130 -38 Z" fill="url(#wcBodyBananaBack)"/>
    </g>

    <!-- バナナ2: 中央(主役、最も前で大きく見える) -->
    <g filter="url(#wcRoughBanana)">
      <path d="M -130 -10
               Q -90 -10 -50 -8
               Q 30 -8 90 -2
               Q 135 5 155 25
               Q 162 38 155 48
               Q 145 55 130 55
               Q 30 55 -50 45
               Q -100 38 -128 25
               Q -135 10 -130 -10 Z" fill="url(#wcBodyBanana)"/>
    </g>

    <!-- バナナ3: 前(下、少し前にせり出る) -->
    <g filter="url(#wcRoughBanana)">
      <path d="M -130 25
               Q -90 30 -50 35
               Q 30 40 90 50
               Q 130 60 145 75
               Q 148 88 138 95
               Q 125 100 105 98
               Q 30 90 -50 80
               Q -100 72 -125 55
               Q -130 40 -130 25 Z" fill="url(#wcBodyBanana)"/>
    </g>

    <!-- Strong ink lines -->
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
      <!-- ヘタ(軸) -->
      <path d="M -150 -45 Q -165 -25 -168 0 Q -165 25 -150 45 L -130 38 Q -125 0 -130 -38 Z"/>

      <!-- バナナ1(後ろ、控えめ) -->
      <path d="M -130 -38 Q -100 -55 -50 -60 Q 30 -62 90 -50 Q 130 -38 145 -15 Q 148 0 140 12 Q 130 18 110 18 Q 30 18 -50 8 Q -100 0 -125 -10" opacity="0.8"/>
      <!-- バナナ2(中央) -->
      <path d="M -130 -10 Q -90 -10 -50 -8 Q 30 -8 90 -2 Q 135 5 155 25 Q 162 38 155 48 Q 145 55 130 55 Q 30 55 -50 45 Q -100 38 -128 25"/>
      <!-- バナナ3(前) -->
      <path d="M -130 25 Q -90 30 -50 35 Q 30 40 90 50 Q 130 60 145 75 Q 148 88 138 95 Q 125 100 105 98 Q 30 90 -50 80 Q -100 72 -125 55"/>

      <!-- 各バナナの稜線(横方向の角) -->
      <path d="M -50 -55 Q 30 -55 90 -45" opacity="0.55"/>
      <path d="M -50 -3 Q 30 -3 90 3" opacity="0.55"/>
      <path d="M -50 40 Q 30 45 90 55" opacity="0.55"/>

      <!-- 先端の黒(右側、お尻の3つ) -->
      <ellipse cx="148" cy="-2" rx="3" ry="5" fill="#3D2817"/>
      <ellipse cx="160" cy="38" rx="3" ry="5" fill="#3D2817"/>
      <ellipse cx="148" cy="85" rx="3" ry="5" fill="#3D2817"/>
    </g>

    <!-- 適度な糖斑点 -->
    <g fill="#7A4A1F" opacity="0.5">
      <circle cx="-30" cy="-25" r="2"/>
      <circle cx="40" cy="-15" r="1.8"/>
      <circle cx="0" cy="25" r="2"/>
      <circle cx="60" cy="65" r="1.8"/>
      <circle cx="-60" cy="60" r="1.8"/>
    </g>

    <!-- 影(机置き感) -->
    <ellipse cx="0" cy="115" rx="140" ry="8" fill="#3D2817" opacity="0.1"/>
  </g>

  <!-- NG side -->
  <g transform="translate(800, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#C62828"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">×</text>

    <!-- ヘタ(黒ずむ) -->
    <path d="M -150 -45 Q -165 -25 -168 0 Q -165 25 -150 45 L -130 38 Q -125 0 -130 -38 Z" fill="#3A2812" stroke="#3D2817" stroke-width="2.5"/>

    <!-- バナナ3本(茶色く変色) -->
    <path d="M -130 -38 Q -100 -55 -50 -60 Q 30 -62 90 -50 Q 130 -38 145 -15 Q 148 0 140 12 Q 130 18 110 18 Q 30 18 -50 8 Q -100 0 -125 -10 Q -130 -25 -130 -38 Z" fill="#9A7838"/>
    <path d="M -130 -10 Q -90 -10 -50 -8 Q 30 -8 90 -2 Q 135 5 155 25 Q 162 38 155 48 Q 145 55 130 55 Q 30 55 -50 45 Q -100 38 -128 25 Q -135 10 -130 -10 Z" fill="#A88040"/>
    <path d="M -130 25 Q -90 30 -50 35 Q 30 40 90 50 Q 130 60 145 75 Q 148 88 138 95 Q 125 100 105 98 Q 30 90 -50 80 Q -100 72 -125 55 Q -130 40 -130 25 Z" fill="#A88040"/>

    <!-- 大きな黒い斑点 -->
    <g fill="#2A1F15" opacity="0.75">
      <ellipse cx="-70" cy="-30" rx="13" ry="9"/>
      <ellipse cx="20" cy="-30" rx="14" ry="10"/>
      <ellipse cx="80" cy="-15" rx="11" ry="8"/>
      <ellipse cx="-50" cy="20" rx="12" ry="9"/>
      <ellipse cx="40" cy="20" rx="14" ry="10"/>
      <ellipse cx="100" cy="30" rx="11" ry="8"/>
      <ellipse cx="-60" cy="65" rx="13" ry="9"/>
      <ellipse cx="20" cy="65" rx="14" ry="10"/>
      <ellipse cx="90" cy="80" rx="11" ry="8"/>
    </g>
    <!-- 中サイズの茶斑 -->
    <g fill="#5A3A18" opacity="0.7">
      <ellipse cx="-30" cy="-50" rx="6" ry="5"/>
      <ellipse cx="60" cy="-50" rx="6" ry="5"/>
      <ellipse cx="-90" cy="0" rx="5" ry="4"/>
      <ellipse cx="-20" cy="40" rx="5" ry="4"/>
    </g>

    <!-- 稜線 -->
    <g stroke="#3D2817" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.55">
      <path d="M -50 -55 Q 30 -55 90 -45"/>
      <path d="M -50 -3 Q 30 -3 90 3"/>
      <path d="M -50 40 Q 30 45 90 55"/>
    </g>

    <!-- 先端の黒(右、お尻) -->
    <ellipse cx="148" cy="-2" rx="4" ry="6" fill="#1F1812"/>
    <ellipse cx="160" cy="38" rx="4" ry="6" fill="#1F1812"/>
    <ellipse cx="148" cy="85" rx="4" ry="6" fill="#1F1812"/>

    <!-- 輪郭 -->
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M -130 -38 Q -100 -55 -50 -60 Q 30 -62 90 -50 Q 130 -38 145 -15 Q 148 0 140 12 Q 130 18 110 18 Q 30 18 -50 8 Q -100 0 -125 -10" opacity="0.8"/>
      <path d="M -130 -10 Q -90 -10 -50 -8 Q 30 -8 90 -2 Q 135 5 155 25 Q 162 38 155 48 Q 145 55 130 55 Q 30 55 -50 45 Q -100 38 -128 25"/>
      <path d="M -130 25 Q -90 30 -50 35 Q 30 40 90 50 Q 130 60 145 75 Q 148 88 138 95 Q 125 100 105 98 Q 30 90 -50 80 Q -100 72 -125 55"/>
    </g>

    <!-- 影 -->
    <ellipse cx="0" cy="115" rx="135" ry="7" fill="#3D2817" opacity="0.08"/>
  </g>

  <!-- Comparison labels -->
  <g font-size="20" fill="#333">
    <rect x="60" y="495" width="460" height="80" rx="8" fill="#E8F5E9"/>
    <text x="80" y="520" font-weight="bold" fill="#2C5F2D">● 鮮やかな黄色、軸が緑色</text>
    <text x="80" y="545" font-weight="bold" fill="#2C5F2D">● 軽い茶色の点(シュガースポット)が出始め</text>
    <text x="80" y="568" fill="#666" font-size="17">軸が太く張り=完熟前 / 軸が細い=食べ頃</text>

    <rect x="560" y="495" width="460" height="80" rx="8" fill="#FFEBEE"/>
    <text x="580" y="520" font-weight="bold" fill="#C62828">× 大きな黒い斑点が広がっている</text>
    <text x="580" y="545" font-weight="bold" fill="#C62828">× 軸が黒ずみ、皮が茶色く全体変色</text>
    <text x="580" y="568" fill="#666" font-size="17">完熟超え=料理向き(バナナケーキなど)</text>
  </g>
</svg>
