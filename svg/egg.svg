<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="Noto Sans CJK JP, sans-serif">
  <rect width="1080" height="600" fill="#FFFFFF" rx="20"/>

  <!-- Header -->
  <text x="60" y="60" font-size="44" font-weight="900" fill="#C8A878">卵</text>
  <line x1="60" y1="75" x2="90" y2="75" stroke="#C8A878" stroke-width="4"/>
  <text x="110" y="68" font-size="22" fill="#666">旬:通年</text>

  <line x1="540" y1="100" x2="540" y2="540" stroke="#DDD" stroke-width="2" stroke-dasharray="6,6"/>

  <!-- OK side (watercolor Pattern A) -->
  <g transform="translate(280, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#2C5F2D"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">○</text>
    <defs>
      <radialGradient id="wcBodyEgg" cx="35%" cy="25%"><stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/><stop offset="40%" stop-color="#F8F0E0" stop-opacity="0.85"/><stop offset="80%" stop-color="#E8D5B0" stop-opacity="0.7"/><stop offset="100%" stop-color="#B89870" stop-opacity="0.5"/></radialGradient>
      <radialGradient id="wcLeafEgg" cx="50%" cy="20%"><stop offset="0%" stop-color="#9BCB7A" stop-opacity="0.9"/><stop offset="60%" stop-color="#5D8F3D" stop-opacity="0.7"/><stop offset="100%" stop-color="#2C5F2D" stop-opacity="0.5"/></radialGradient>
      <filter id="wcRoughEgg" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.04" numOctaves="3" seed="17"/>
        <feDisplacementMap in="SourceGraphic" scale="4"/>
      </filter>
      <filter id="wcBlurEgg"><feGaussianBlur stdDeviation="1.5"/></filter>
    </defs>
    <g filter="url(#wcBlurEgg)" opacity="0.4"><ellipse cx="0" cy="0" rx="80" ry="105" fill="#E8D5B0"/></g>
    
    <g filter="url(#wcRoughEgg)"><path d="M -55 0 Q -55 -85 0 -100 Q 55 -85 55 0 Q 55 85 0 100 Q -55 85 -55 0 Z" fill="url(#wcBodyEgg)"/></g>
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"><path d="M -55 0 Q -55 -85 0 -100 Q 55 -85 55 0 Q 55 85 0 100 Q -55 85 -55 0 Z"/></g>
  </g>

  <!-- NG side (flat) -->
  <g transform="translate(800, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#C62828"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">×</text>
    <path d="M -55 0 Q -55 -85 0 -100 Q 55 -85 55 0 Q 55 85 0 100 Q -55 85 -55 0 Z" fill="#D5C0A0"/><path d="M -25 -50 L -15 -20 L -25 0 L -10 25" stroke="#5D4E37" stroke-width="2" fill="none" opacity="0.85"/><path d="M 10 -65 L 25 -45" stroke="#5D4E37" stroke-width="1.8" fill="none" opacity="0.7"/><ellipse cx="20" cy="30" rx="12" ry="8" fill="#8B6F47" opacity="0.4"/><ellipse cx="-30" cy="50" rx="8" ry="6" fill="#8B6F47" opacity="0.4"/>
  </g>

  <!-- Comparison labels -->
  <g font-size="20" fill="#333">
    <rect x="60" y="495" width="460" height="80" rx="8" fill="#E8F5E9"/>
    <text x="80" y="520" font-weight="bold" fill="#2C5F2D">● ヒビ・割れがない、表面ザラつかない</text>
    <text x="80" y="545" font-weight="bold" fill="#2C5F2D">● 振っても音がしない、形が整う</text>
    <text x="80" y="568" fill="#666" font-size="17">冷蔵庫から出した時に汗をかかない</text>

    <rect x="560" y="495" width="460" height="80" rx="8" fill="#FFEBEE"/>
    <text x="580" y="520" font-weight="bold" fill="#C62828">× ヒビあり、汚れが付着</text>
    <text x="580" y="545" font-weight="bold" fill="#C62828">× 振るとカチャカチャ音(中の腐敗)</text>
    <text x="580" y="568" fill="#666" font-size="17">黄身が崩れる=古い、白身が広がる</text>
  </g>
</svg>
