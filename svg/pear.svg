<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="Noto Sans CJK JP, sans-serif">
  <rect width="1080" height="600" fill="#FFFFFF" rx="20"/>

  <!-- Header -->
  <text x="60" y="60" font-size="44" font-weight="900" fill="#C8A878">梨</text>
  <line x1="60" y1="75" x2="90" y2="75" stroke="#C8A878" stroke-width="4"/>
  <text x="110" y="68" font-size="22" fill="#666">旬:8〜10月</text>

  <line x1="540" y1="100" x2="540" y2="540" stroke="#DDD" stroke-width="2" stroke-dasharray="6,6"/>

  <!-- OK side (watercolor Pattern A) -->
  <g transform="translate(280, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#2C5F2D"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">○</text>
    <defs>
      <radialGradient id="wcBodyPear" cx="35%" cy="25%"><stop offset="0%" stop-color="#FFF5DC" stop-opacity="0.95"/><stop offset="40%" stop-color="#F0DEB0" stop-opacity="0.9"/><stop offset="80%" stop-color="#D4B880" stop-opacity="0.85"/><stop offset="100%" stop-color="#9A7848" stop-opacity="0.65"/></radialGradient>
      <radialGradient id="wcLeafPear" cx="50%" cy="20%"><stop offset="0%" stop-color="#9BCB7A" stop-opacity="0.9"/><stop offset="60%" stop-color="#5D8F3D" stop-opacity="0.7"/><stop offset="100%" stop-color="#2C5F2D" stop-opacity="0.5"/></radialGradient>
      <filter id="wcRoughPear" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.04" numOctaves="3" seed="151"/>
        <feDisplacementMap in="SourceGraphic" scale="4"/>
      </filter>
      <filter id="wcBlurPear"><feGaussianBlur stdDeviation="1.5"/></filter>
    </defs>
    <g filter="url(#wcBlurPear)" opacity="0.4"><ellipse cx="0" cy="0" rx="90" ry="105" fill="#E0C088"/></g>
    
    <g filter="url(#wcRoughPear)"><path d="M 0 -100 Q -25 -95 -45 -80 Q -85 -55 -85 0 Q -90 70 0 100 Q 90 70 85 0 Q 85 -55 45 -80 Q 25 -95 0 -100 Z" fill="url(#wcBodyPear)"/></g>
    
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"><path d="M 0 -100 Q -25 -95 -45 -80 Q -85 -55 -85 0 Q -90 70 0 100 Q 90 70 85 0 Q 85 -55 45 -80 Q 25 -95 0 -100 Z"/><path d="M 0 -100 L -3 -118" opacity="0.85" stroke-width="2.5"/><path d="M -20 -90 Q 0 -85 20 -90" opacity="0.5" stroke-width="1.4"/><path d="M -45 -30 L -42 -28" opacity="0.7" stroke-width="1.8"/><path d="M -20 0 L -17 2" opacity="0.6" stroke-width="1.6"/><path d="M 25 -20 L 28 -18" opacity="0.6" stroke-width="1.6"/><path d="M 50 30 L 53 32" opacity="0.6" stroke-width="1.6"/><path d="M -25 50 L -22 52" opacity="0.6" stroke-width="1.6"/><path d="M 30 70 L 33 72" opacity="0.6" stroke-width="1.6"/></g>
  </g>

  <!-- NG side (flat) -->
  <g transform="translate(800, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#C62828"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">×</text>
    <path d="M 0 -100 Q -25 -95 -45 -80 Q -85 -55 -85 0 Q -90 70 0 100 Q 90 70 85 0 Q 85 -55 45 -80 Q 25 -95 0 -100 Z" fill="#988050"/><ellipse cx="-30" cy="30" rx="22" ry="18" fill="#5D4E37" opacity="0.55"/><ellipse cx="30" cy="-20" rx="14" ry="18" fill="#5D4E37" opacity="0.5"/><path d="M 0 -100 L -3 -110" stroke="#5D4E37" stroke-width="2" fill="none" opacity="0.7"/>
  </g>

  <!-- Comparison labels -->
  <g font-size="20" fill="#333">
    <rect x="60" y="495" width="460" height="80" rx="8" fill="#E8F5E9"/>
    <text x="80" y="520" font-weight="bold" fill="#2C5F2D">● 皮にハリ・ツヤあり</text>
    <text x="80" y="545" font-weight="bold" fill="#2C5F2D">● ずっしり重い、形整う</text>
    <text x="80" y="568" fill="#666" font-size="17">お尻ゴワゴワ=糖度高</text>

    <rect x="560" y="495" width="460" height="80" rx="8" fill="#FFEBEE"/>
    <text x="580" y="520" font-weight="bold" fill="#C62828">× 茶色斑点・打痕</text>
    <text x="580" y="545" font-weight="bold" fill="#C62828">× 柔らかい・色くすむ</text>
    <text x="580" y="568" fill="#666" font-size="17">軽い=水分抜け、サクサク感失う</text>
  </g>
</svg>
