<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="Noto Sans CJK JP, sans-serif">
  <rect width="1080" height="600" fill="#FFFFFF" rx="20"/>

  <!-- Header -->
  <text x="60" y="60" font-size="44" font-weight="900" fill="#5C7E40">豆腐</text>
  <line x1="60" y1="75" x2="200" y2="75" stroke="#5C7E40" stroke-width="4"/>
  <text x="220" y="68" font-size="22" fill="#666">旬:通年</text>

  <line x1="540" y1="100" x2="540" y2="540" stroke="#DDD" stroke-width="2" stroke-dasharray="6,6"/>

  <!-- OK side -->
  <g transform="translate(280, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#2C5F2D"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">○</text>

    <defs>
      <linearGradient id="wcTopTofu" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#FFFFFA" stop-opacity="0.95"/>
        <stop offset="100%" stop-color="#F0F0E0" stop-opacity="0.92"/>
      </linearGradient>
      <linearGradient id="wcFrontTofu" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#F5F5E5" stop-opacity="0.95"/>
        <stop offset="100%" stop-color="#D8D8C0" stop-opacity="0.92"/>
      </linearGradient>
      <linearGradient id="wcSideTofu" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#E5E5D0" stop-opacity="0.92"/>
        <stop offset="100%" stop-color="#C8C8A8" stop-opacity="0.88"/>
      </linearGradient>
      <filter id="wcRoughTofu" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.04" numOctaves="3" seed="27"/>
        <feDisplacementMap in="SourceGraphic" scale="2"/>
      </filter>
      <filter id="wcBlurTofu">
        <feGaussianBlur stdDeviation="1.5"/>
      </filter>
    </defs>

    <!-- Watercolor bleeds -->
    <g filter="url(#wcBlurTofu)" opacity="0.4">
      <ellipse cx="0" cy="0" rx="160" ry="70" fill="#F0F0E0"/>
    </g>

    <!-- ====================
         豆腐本体のみの立体図(斜めから見た視点)
         パックなし、豆腐そのままの3D表現
         ==================== -->

    <!-- 豆腐本体 -->
    <!-- 上面(平行四辺形) -->
    <g filter="url(#wcRoughTofu)">
      <path d="M -130 -40
               L -100 -85
               L 100 -85
               L 130 -40 Z" fill="url(#wcTopTofu)"/>
    </g>

    <!-- 前面(長方形、メインの面) -->
    <g filter="url(#wcRoughTofu)">
      <path d="M -130 -40
               L 130 -40
               L 130 65
               L -130 65 Z" fill="url(#wcFrontTofu)"/>
    </g>

    <!-- Strong ink lines -->
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
      <!-- 豆腐本体輪郭 -->
      <path d="M -130 -40 L -100 -85 L 100 -85 L 130 -40 Z"/>
      <path d="M -130 -40 L 130 -40 L 130 65 L -130 65 Z"/>
      <!-- 上面のハイライト線(滑らかな表面) -->
      <path d="M -90 -70 L 90 -70" opacity="0.65" stroke-width="2"/>
      <path d="M -85 -78 L 50 -78" opacity="0.5" stroke-width="1.3"/>
    </g>

    <!-- 前面のハイライト(光沢) -->
    <ellipse cx="-50" cy="10" rx="32" ry="6" fill="#FFFFFF" opacity="0.45"/>
    <ellipse cx="-45" cy="10" rx="14" ry="3" fill="#FFFFFF" opacity="0.65"/>

    <!-- 影 -->
    <ellipse cx="0" cy="80" rx="155" ry="9" fill="#3D2817" opacity="0.15"/>
  </g>

  <!-- NG side -->
  <g transform="translate(800, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#C62828"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">×</text>

    <!-- 豆腐本体(変色、表面が崩れる) -->
    <path d="M -130 -40 L -100 -85 L 100 -85 L 130 -40 Z" fill="#E8E8D0"/>
    <path d="M -130 -40 L 130 -40 L 130 65 L -130 65 Z" fill="#D8D8B8"/>

    <!-- 表面の崩れ・気泡(NG表現) -->
    <ellipse cx="-50" cy="-5" rx="10" ry="6" fill="#7A6840" opacity="0.55"/>
    <ellipse cx="30" cy="20" rx="11" ry="7" fill="#7A6840" opacity="0.5"/>
    <ellipse cx="-25" cy="40" rx="8" ry="5" fill="#7A6840" opacity="0.5"/>
    <ellipse cx="60" cy="-20" rx="6" ry="4" fill="#7A6840" opacity="0.45"/>
    <ellipse cx="-80" cy="20" rx="7" ry="5" fill="#7A6840" opacity="0.45"/>
    <!-- 上面のシミ -->
    <ellipse cx="-30" cy="-65" rx="9" ry="3" fill="#7A6840" opacity="0.5"/>
    <ellipse cx="40" cy="-72" rx="7" ry="3" fill="#7A6840" opacity="0.45"/>

    <!-- 表面のひび -->
    <path d="M -85 5 Q -25 10 25 5" stroke="#3D2817" stroke-width="1" fill="none" opacity="0.55"/>
    <path d="M 0 35 Q 50 33 100 37" stroke="#3D2817" stroke-width="1" fill="none" opacity="0.5"/>

    <!-- 角の崩れ -->
    <path d="M 130 -40 Q 125 -30 130 -20" stroke="#3D2817" stroke-width="1.5" fill="none" opacity="0.5"/>

    <!-- 輪郭 -->
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M -130 -40 L -100 -85 L 100 -85 L 130 -40 Z"/>
      <path d="M -130 -40 L 130 -40 L 130 65 L -130 65 Z"/>
    </g>

    <!-- 影 -->
    <ellipse cx="0" cy="80" rx="155" ry="8" fill="#3D2817" opacity="0.12"/>
  </g>

  <!-- Comparison labels -->
  <g font-size="20" fill="#333">
    <rect x="60" y="495" width="460" height="80" rx="8" fill="#E8F5E9"/>
    <text x="80" y="520" font-weight="bold" fill="#2C5F2D">● 表面が滑らかで白く均一</text>
    <text x="80" y="545" font-weight="bold" fill="#2C5F2D">● 角がしっかり、形が崩れていない</text>
    <text x="80" y="568" fill="#666" font-size="17">製造日が新しい=口当たりが滑らかで美味しい</text>

    <rect x="560" y="495" width="460" height="80" rx="8" fill="#FFEBEE"/>
    <text x="580" y="520" font-weight="bold" fill="#C62828">× 表面に気泡や茶色いシミ、ひびが入る</text>
    <text x="580" y="545" font-weight="bold" fill="#C62828">× 全体の色がくすみ、角が崩れる</text>
    <text x="580" y="568" fill="#666" font-size="17">パックに膨らみがある=ガス発生のサイン</text>
  </g>
</svg>
