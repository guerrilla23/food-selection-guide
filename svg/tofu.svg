<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="Noto Sans CJK JP, sans-serif">
  <rect width="1080" height="600" fill="#FFFFFF" rx="20"/>

  <!-- Header -->
  <text x="60" y="60" font-size="44" font-weight="900" fill="#C8A878">豆腐</text>
  <line x1="60" y1="75" x2="120" y2="75" stroke="#C8A878" stroke-width="4"/>
  <text x="140" y="68" font-size="22" fill="#666">旬:通年</text>

  <line x1="540" y1="100" x2="540" y2="540" stroke="#DDD" stroke-width="2" stroke-dasharray="6,6"/>

  <!-- OK side (watercolor Pattern A) -->
  <g transform="translate(280, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#2C5F2D"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">○</text>
    <defs>
      <radialGradient id="wcBodyTofu" cx="35%" cy="25%"><stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/><stop offset="40%" stop-color="#F8F4E8" stop-opacity="0.9"/><stop offset="80%" stop-color="#E8E0CC" stop-opacity="0.75"/><stop offset="100%" stop-color="#B0A88C" stop-opacity="0.5"/></radialGradient>
      <radialGradient id="wcLeafTofu" cx="50%" cy="20%"><stop offset="0%" stop-color="#9BCB7A" stop-opacity="0.9"/><stop offset="60%" stop-color="#5D8F3D" stop-opacity="0.7"/><stop offset="100%" stop-color="#2C5F2D" stop-opacity="0.5"/></radialGradient>
      <filter id="wcRoughTofu" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.04" numOctaves="3" seed="157"/>
        <feDisplacementMap in="SourceGraphic" scale="4"/>
      </filter>
      <filter id="wcBlurTofu"><feGaussianBlur stdDeviation="1.5"/></filter>
    </defs>
    <g filter="url(#wcBlurTofu)" opacity="0.4"><ellipse cx="0" cy="0" rx="100" ry="65" fill="#F0E8D0"/></g>
    
    <g filter="url(#wcRoughTofu)"><path d="M -85 -55 L 85 -55 Q 92 -55 92 -48 L 92 48 Q 92 55 85 55 L -85 55 Q -92 55 -92 48 L -92 -48 Q -92 -55 -85 -55 Z" fill="url(#wcBodyTofu)"/></g>
    
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"><path d="M -85 -55 L 85 -55 Q 92 -55 92 -48 L 92 48 Q 92 55 85 55 L -85 55 Q -92 55 -92 48 L -92 -48 Q -92 -55 -85 -55 Z"/><path d="M -80 -55 L 80 -55" opacity="0.5" stroke-width="1.4"/><path d="M -70 -25 Q 0 -22 70 -25" opacity="0.4" stroke-width="1.2"/><path d="M -75 5 Q 0 7 75 5" opacity="0.4" stroke-width="1.2"/><path d="M -70 30 Q 0 32 70 30" opacity="0.4" stroke-width="1.2"/></g>
  </g>

  <!-- NG side (flat) -->
  <g transform="translate(800, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#C62828"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">×</text>
    <path d="M -85 -55 L 85 -55 Q 92 -55 92 -48 L 92 48 Q 92 55 85 55 L -85 55 Q -92 55 -92 48 L -92 -48 Q -92 -55 -85 -55 Z" fill="#D8C898"/><ellipse cx="-30" cy="10" rx="22" ry="18" fill="#A8A050" opacity="0.4"/><ellipse cx="35" cy="-15" rx="18" ry="14" fill="#A8A050" opacity="0.4"/><path d="M -10 -55 L -5 0 L -15 55" stroke="#5D4E37" stroke-width="1.5" fill="none" opacity="0.6"/><path d="M 20 -55 L 25 0 L 18 55" stroke="#5D4E37" stroke-width="1.5" fill="none" opacity="0.55"/>
  </g>

  <!-- Comparison labels -->
  <g font-size="20" fill="#333">
    <rect x="60" y="495" width="460" height="80" rx="8" fill="#E8F5E9"/>
    <text x="80" y="520" font-weight="bold" fill="#2C5F2D">● 形が整う、角が綺麗</text>
    <text x="80" y="545" font-weight="bold" fill="#2C5F2D">● 水が透き通る、無臭</text>
    <text x="80" y="568" fill="#666" font-size="17">絹=つるん、木綿=ザラ・しっかり</text>

    <rect x="560" y="495" width="460" height="80" rx="8" fill="#FFEBEE"/>
    <text x="580" y="520" font-weight="bold" fill="#C62828">× 形が崩れる、ベタつき</text>
    <text x="580" y="545" font-weight="bold" fill="#C62828">× 水が濁る、酸っぱい臭</text>
    <text x="580" y="568" fill="#666" font-size="17">黄ばみ・ヌメリ=傷み始め</text>
  </g>
</svg>
