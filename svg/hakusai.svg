<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="Noto Sans CJK JP, sans-serif">
  <rect width="1080" height="600" fill="#FFFFFF" rx="20"/>

  <!-- Header -->
  <text x="60" y="60" font-size="44" font-weight="900" fill="#7BAB46">白菜</text>
  <line x1="60" y1="75" x2="120" y2="75" stroke="#7BAB46" stroke-width="4"/>
  <text x="140" y="68" font-size="22" fill="#666">旬:11〜2月</text>

  <line x1="540" y1="100" x2="540" y2="540" stroke="#DDD" stroke-width="2" stroke-dasharray="6,6"/>

  <!-- OK side (watercolor Pattern A) -->
  <g transform="translate(280, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#2C5F2D"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">○</text>
    <defs>
      <radialGradient id="wcBodyHakusai" cx="35%" cy="25%"><stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/><stop offset="40%" stop-color="#FFF8DC" stop-opacity="0.9"/><stop offset="80%" stop-color="#F0E8B0" stop-opacity="0.75"/><stop offset="100%" stop-color="#D4C868" stop-opacity="0.5"/></radialGradient>
      <radialGradient id="wcLeafHakusai" cx="50%" cy="20%"><stop offset="0%" stop-color="#9BCB7A" stop-opacity="0.95"/><stop offset="40%" stop-color="#7BAB46" stop-opacity="0.9"/><stop offset="80%" stop-color="#4A7C2E" stop-opacity="0.8"/><stop offset="100%" stop-color="#2C5F2D" stop-opacity="0.6"/></radialGradient>
      <filter id="wcRoughHakusai" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.04" numOctaves="3" seed="59"/>
        <feDisplacementMap in="SourceGraphic" scale="4"/>
      </filter>
      <filter id="wcBlurHakusai"><feGaussianBlur stdDeviation="1.5"/></filter>
    </defs>
    <g filter="url(#wcBlurHakusai)" opacity="0.4"><ellipse cx="0" cy="0" rx="110" ry="145" fill="#C8E0A0"/></g>
    <g filter="url(#wcRoughHakusai)" opacity="0.8"><path d="M -90 130 L -90 -50 Q -95 -140 0 -160 Q 95 -140 90 -50 L 90 130 Q 85 148 0 152 Q -85 148 -90 130 Z" fill="url(#wcLeafHakusai)"/></g>
    <g filter="url(#wcRoughHakusai)"><path d="M -65 125 L -65 -45 Q -70 -125 0 -140 Q 70 -125 65 -45 L 65 125 Q 60 138 0 140 Q -60 138 -65 125 Z" fill="url(#wcBodyHakusai)"/></g>
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"><path d="M -90 130 L -90 -50 Q -95 -140 0 -160 Q 95 -140 90 -50 L 90 130 Q 85 148 0 152 Q -85 148 -90 130 Z"/><path d="M -65 125 L -65 -45 Q -70 -125 0 -140 Q 70 -125 65 -45 L 65 125 Q 60 138 0 140 Q -60 138 -65 125 Z"/><path d="M 0 -160 L 0 140" opacity="0.7" stroke-width="2"/><path d="M -45 -110 Q -55 -10 -45 120" opacity="0.55" stroke-width="1.4"/><path d="M 45 -110 Q 55 -10 45 120" opacity="0.55" stroke-width="1.4"/><path d="M -25 -130 Q -32 -10 -25 135" opacity="0.5" stroke-width="1.3"/><path d="M 25 -130 Q 32 -10 25 135" opacity="0.5" stroke-width="1.3"/><path d="M -75 -130 Q -65 -160 -45 -140" opacity="0.75" stroke-width="1.7"/><path d="M -30 -150 Q -10 -175 5 -150" opacity="0.75" stroke-width="1.7"/><path d="M 15 -148 Q 35 -170 50 -135" opacity="0.75" stroke-width="1.7"/><path d="M 60 -130 Q 78 -150 80 -115" opacity="0.75" stroke-width="1.7"/><path d="M -55 -50 Q 0 -38 55 -50" opacity="0.45" stroke-width="1.3"/><path d="M -55 30 Q 0 42 55 30" opacity="0.45" stroke-width="1.3"/><path d="M -75 138 Q 0 150 75 138" opacity="0.55" stroke-width="1.5"/></g>
  </g>

  <!-- NG side (flat) -->
  <g transform="translate(800, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#C62828"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">×</text>
    <path d="M -65 125 L -65 -45 Q -70 -125 0 -140 Q 70 -125 65 -45 L 65 125 Q 60 138 0 140 Q -60 138 -65 125 Z" fill="#C8C880"/><path d="M -90 130 L -90 -50 Q -95 -140 0 -160 Q 95 -140 90 -50 L 90 130 Q 85 148 0 152 Q -85 148 -90 130 Z" fill="#A0A040"/><ellipse cx="-40" cy="-90" rx="14" ry="20" fill="#8B6F47" opacity="0.5"/><ellipse cx="30" cy="50" rx="16" ry="22" fill="#8B6F47" opacity="0.5"/><path d="M -75 140 Q 0 152 75 140" stroke="#8B6F47" stroke-width="2.5" fill="none" opacity="0.7"/>
  </g>

  <!-- Comparison labels -->
  <g font-size="20" fill="#333">
    <rect x="60" y="495" width="460" height="80" rx="8" fill="#E8F5E9"/>
    <text x="80" y="520" font-weight="bold" fill="#2C5F2D">● 葉先がパリッ、緑が濃い</text>
    <text x="80" y="545" font-weight="bold" fill="#2C5F2D">● 切り口が白くツヤあり</text>
    <text x="80" y="568" fill="#666" font-size="17">ずっしり重く葉が詰まる=甘い</text>

    <rect x="560" y="495" width="460" height="80" rx="8" fill="#FFEBEE"/>
    <text x="580" y="520" font-weight="bold" fill="#C62828">× 葉先が萎れ・黄ばむ</text>
    <text x="580" y="545" font-weight="bold" fill="#C62828">× 切り口が黒・ベタつく</text>
    <text x="580" y="568" fill="#666" font-size="17">黒い斑点=ゴマ症(味は問題なし)</text>
  </g>
</svg>
