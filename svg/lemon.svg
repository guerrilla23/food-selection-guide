<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="Noto Sans CJK JP, sans-serif">
  <rect width="1080" height="600" fill="#FFFFFF" rx="20"/>

  <!-- Header -->
  <text x="60" y="60" font-size="44" font-weight="900" fill="#F2C232">レモン</text>
  <line x1="60" y1="75" x2="150" y2="75" stroke="#F2C232" stroke-width="4"/>
  <text x="170" y="68" font-size="22" fill="#666">旬:10〜3月</text>

  <line x1="540" y1="100" x2="540" y2="540" stroke="#DDD" stroke-width="2" stroke-dasharray="6,6"/>

  <!-- OK side (watercolor Pattern A) -->
  <g transform="translate(280, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#2C5F2D"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">○</text>
    <defs>
      <radialGradient id="wcBodyLemon" cx="35%" cy="25%"><stop offset="0%" stop-color="#FFF8C8" stop-opacity="0.95"/><stop offset="40%" stop-color="#FFE066" stop-opacity="0.9"/><stop offset="80%" stop-color="#F2C232" stop-opacity="0.85"/><stop offset="100%" stop-color="#B88A1B" stop-opacity="0.65"/></radialGradient>
      <radialGradient id="wcLeafLemon" cx="50%" cy="20%"><stop offset="0%" stop-color="#9BCB7A" stop-opacity="0.9"/><stop offset="60%" stop-color="#5D8F3D" stop-opacity="0.7"/><stop offset="100%" stop-color="#2C5F2D" stop-opacity="0.5"/></radialGradient>
      <filter id="wcRoughLemon" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.04" numOctaves="3" seed="109"/>
        <feDisplacementMap in="SourceGraphic" scale="4"/>
      </filter>
      <filter id="wcBlurLemon"><feGaussianBlur stdDeviation="1.5"/></filter>
    </defs>
    <g filter="url(#wcBlurLemon)" opacity="0.4"><ellipse cx="0" cy="0" rx="80" ry="110" fill="#FFE066"/></g>
    
    <g filter="url(#wcRoughLemon)"><path d="M 0 -110 Q -10 -110 -25 -100 Q -65 -80 -65 0 Q -65 80 -25 100 Q -10 110 0 110 Q 10 110 25 100 Q 65 80 65 0 Q 65 -80 25 -100 Q 10 -110 0 -110 Z" fill="url(#wcBodyLemon)"/></g>
    
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"><path d="M 0 -110 Q -10 -110 -25 -100 Q -65 -80 -65 0 Q -65 80 -25 100 Q -10 110 0 110 Q 10 110 25 100 Q 65 80 65 0 Q 65 -80 25 -100 Q 10 -110 0 -110 Z"/><path d="M 0 -110 L 0 -130" opacity="0.85" stroke-width="2.5"/><path d="M 0 110 L 0 122" opacity="0.85" stroke-width="2.5"/><path d="M -50 -40 Q -35 -45 -40 -20" opacity="0.4" stroke-width="1.2"/><path d="M 50 30 Q 35 35 40 60" opacity="0.4" stroke-width="1.2"/></g>
  </g>

  <!-- NG side (flat) -->
  <g transform="translate(800, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#C62828"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">×</text>
    <path d="M 0 -110 Q -10 -110 -25 -100 Q -65 -80 -65 0 Q -65 80 -25 100 Q -10 110 0 110 Q 10 110 25 100 Q 65 80 65 0 Q 65 -80 25 -100 Q 10 -110 0 -110 Z" fill="#A88830"/><ellipse cx="-20" cy="30" rx="18" ry="22" fill="#5D4E10" opacity="0.5"/><path d="M -50 -10 Q 0 0 50 -15" stroke="#5D4E37" stroke-width="1.5" fill="none" opacity="0.55"/><path d="M 0 -110 L -2 -125" stroke="#5D4E37" stroke-width="2" fill="none" opacity="0.7"/>
  </g>

  <!-- Comparison labels -->
  <g font-size="20" fill="#333">
    <rect x="60" y="495" width="460" height="80" rx="8" fill="#E8F5E9"/>
    <text x="80" y="520" font-weight="bold" fill="#2C5F2D">● 色が濃い黄、ハリ・ツヤ</text>
    <text x="80" y="545" font-weight="bold" fill="#2C5F2D">● ずっしり重い=果汁多</text>
    <text x="80" y="568" fill="#666" font-size="17">皮の凹凸が細かい=新鮮</text>

    <rect x="560" y="495" width="460" height="80" rx="8" fill="#FFEBEE"/>
    <text x="580" y="520" font-weight="bold" fill="#C62828">× 色がくすむ・茶色斑点</text>
    <text x="580" y="545" font-weight="bold" fill="#C62828">× 柔らかい・シワ</text>
    <text x="580" y="568" fill="#666" font-size="17">軽い=水分抜け、果汁少</text>
  </g>
</svg>
