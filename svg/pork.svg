<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="Noto Sans CJK JP, sans-serif">
  <rect width="1080" height="600" fill="#FFFFFF" rx="20"/>

  <!-- Header -->
  <text x="60" y="60" font-size="44" font-weight="900" fill="#E08878">豚肉</text>
  <line x1="60" y1="75" x2="120" y2="75" stroke="#E08878" stroke-width="4"/>
  <text x="140" y="68" font-size="22" fill="#666">旬:通年</text>

  <line x1="540" y1="100" x2="540" y2="540" stroke="#DDD" stroke-width="2" stroke-dasharray="6,6"/>

  <!-- OK side (watercolor Pattern A) -->
  <g transform="translate(280, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#2C5F2D"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">○</text>
    <defs>
      <radialGradient id="wcBodyPork" cx="35%" cy="25%"><stop offset="0%" stop-color="#FFE0D8" stop-opacity="0.95"/><stop offset="40%" stop-color="#F8B0A0" stop-opacity="0.9"/><stop offset="80%" stop-color="#E08070" stop-opacity="0.85"/><stop offset="100%" stop-color="#A05040" stop-opacity="0.65"/></radialGradient>
      <radialGradient id="wcLeafPork" cx="50%" cy="20%"><stop offset="0%" stop-color="#9BCB7A" stop-opacity="0.9"/><stop offset="60%" stop-color="#5D8F3D" stop-opacity="0.7"/><stop offset="100%" stop-color="#2C5F2D" stop-opacity="0.5"/></radialGradient>
      <filter id="wcRoughPork" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.04" numOctaves="3" seed="167"/>
        <feDisplacementMap in="SourceGraphic" scale="4"/>
      </filter>
      <filter id="wcBlurPork"><feGaussianBlur stdDeviation="1.5"/></filter>
    </defs>
    <g filter="url(#wcBlurPork)" opacity="0.4"><ellipse cx="0" cy="0" rx="110" ry="70" fill="#F8B0A0"/></g>
    
    <g filter="url(#wcRoughPork)"><path d="M -90 -45 Q -100 0 -90 50 Q 0 75 90 50 Q 100 0 90 -45 Q 0 -65 -90 -45 Z" fill="url(#wcBodyPork)"/></g>
    
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"><path d="M -90 -45 Q -100 0 -90 50 Q 0 75 90 50 Q 100 0 90 -45 Q 0 -65 -90 -45 Z"/><path d="M -75 -25 Q 0 -20 75 -25" opacity="0.6" stroke-width="1.5"/><path d="M -78 0 Q 0 5 78 0" opacity="0.6" stroke-width="1.5"/><path d="M -72 25 Q 0 30 72 25" opacity="0.6" stroke-width="1.5"/><path d="M -45 -10 Q -20 -5 0 -15" opacity="0.7" stroke-width="2"/><path d="M 20 5 Q 40 15 60 5" opacity="0.7" stroke-width="2"/><path d="M -30 30 Q 0 38 30 30" opacity="0.7" stroke-width="2"/></g>
  
    <!-- animal-icon: pork (snout + ear) -->
    <g transform="translate(88, 72)" data-icon="pork">
      <circle cx="0" cy="0" r="38" fill="#FFFFFF" fill-opacity="0.96" stroke="#3D2817" stroke-width="2"/>
      <path d="M -11 -16 L -3 -25 L 0 -11 Z" fill="#F8B0A0" stroke="#3D2817" stroke-width="2" stroke-linejoin="round"/>
      <path d="M -20 0 Q -20 -14 -6 -17 Q 11 -17 20 -6 Q 25 8 17 17 Q 0 20 -14 14 Q -22 6 -20 0 Z" fill="#F8B0A0" stroke="#3D2817" stroke-width="2"/>
      <ellipse cx="20" cy="6" rx="10" ry="8" fill="#F08878" stroke="#3D2817" stroke-width="2"/>
      <ellipse cx="20" cy="3" rx="1.4" ry="1.8" fill="#3D2817"/>
      <ellipse cx="20" cy="9" rx="1.4" ry="1.8" fill="#3D2817"/>
      <circle cx="3" cy="-4" r="2.3" fill="#3D2817"/>
    </g>
</g>

  <!-- NG side (flat) -->
  <g transform="translate(800, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#C62828"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">×</text>
    <path d="M -90 -45 Q -100 0 -90 50 Q 0 75 90 50 Q 100 0 90 -45 Q 0 -65 -90 -45 Z" fill="#A87878"/><ellipse cx="-30" cy="0" rx="25" ry="18" fill="#5D4E37" opacity="0.4"/><ellipse cx="35" cy="15" rx="18" ry="12" fill="#5D4E37" opacity="0.4"/><ellipse cx="0" cy="70" rx="50" ry="8" fill="#A03828" opacity="0.55"/>
  
    <!-- animal-icon: pork (snout + ear) -->
    <g transform="translate(88, 72)" data-icon="pork">
      <circle cx="0" cy="0" r="38" fill="#FFFFFF" fill-opacity="0.96" stroke="#3D2817" stroke-width="2"/>
      <path d="M -11 -16 L -3 -25 L 0 -11 Z" fill="#F8B0A0" stroke="#3D2817" stroke-width="2" stroke-linejoin="round"/>
      <path d="M -20 0 Q -20 -14 -6 -17 Q 11 -17 20 -6 Q 25 8 17 17 Q 0 20 -14 14 Q -22 6 -20 0 Z" fill="#F8B0A0" stroke="#3D2817" stroke-width="2"/>
      <ellipse cx="20" cy="6" rx="10" ry="8" fill="#F08878" stroke="#3D2817" stroke-width="2"/>
      <ellipse cx="20" cy="3" rx="1.4" ry="1.8" fill="#3D2817"/>
      <ellipse cx="20" cy="9" rx="1.4" ry="1.8" fill="#3D2817"/>
      <circle cx="3" cy="-4" r="2.3" fill="#3D2817"/>
    </g>
</g>

  <!-- Comparison labels -->
  <g font-size="20" fill="#333">
    <rect x="60" y="495" width="460" height="80" rx="8" fill="#E8F5E9"/>
    <text x="80" y="520" font-weight="bold" fill="#2C5F2D">● 色が淡いピンク、ツヤあり</text>
    <text x="80" y="545" font-weight="bold" fill="#2C5F2D">● 脂は白く、肉と境がくっきり</text>
    <text x="80" y="568" fill="#666" font-size="17">弾力あり、ドリップ少なめ</text>

    <rect x="560" y="495" width="460" height="80" rx="8" fill="#FFEBEE"/>
    <text x="580" y="520" font-weight="bold" fill="#C62828">× 色が暗い赤・グレー</text>
    <text x="580" y="545" font-weight="bold" fill="#C62828">× 脂が黄ばむ・ベタつく</text>
    <text x="580" y="568" fill="#666" font-size="17">ドリップ多+赤茶=要注意</text>
  </g>
</svg>
