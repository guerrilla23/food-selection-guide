<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="Noto Sans CJK JP, sans-serif">
  <rect width="1080" height="600" fill="#FFFFFF" rx="20"/>

  <!-- Header -->
  <text x="60" y="60" font-size="44" font-weight="900" fill="#506068">一尾魚の見方</text>
  <line x1="60" y1="75" x2="240" y2="75" stroke="#506068" stroke-width="4"/>
  <text x="260" y="68" font-size="22" fill="#666">旬:魚種により</text>

  <line x1="540" y1="100" x2="540" y2="540" stroke="#DDD" stroke-width="2" stroke-dasharray="6,6"/>

  <!-- OK side (watercolor Pattern A) -->
  <g transform="translate(280, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#2C5F2D"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">○</text>
    <defs>
      <radialGradient id="wcBodyWhole_fish" cx="35%" cy="25%"><stop offset="0%" stop-color="#F8F8FA" stop-opacity="0.95"/><stop offset="40%" stop-color="#D0D8DC" stop-opacity="0.9"/><stop offset="80%" stop-color="#90A0A8" stop-opacity="0.85"/><stop offset="100%" stop-color="#506068" stop-opacity="0.65"/></radialGradient>
      <radialGradient id="wcLeafWhole_fish" cx="50%" cy="20%"><stop offset="0%" stop-color="#9BCB7A" stop-opacity="0.9"/><stop offset="60%" stop-color="#5D8F3D" stop-opacity="0.7"/><stop offset="100%" stop-color="#2C5F2D" stop-opacity="0.5"/></radialGradient>
      <filter id="wcRoughWhole_fish" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.04" numOctaves="3" seed="199"/>
        <feDisplacementMap in="SourceGraphic" scale="4"/>
      </filter>
      <filter id="wcBlurWhole_fish"><feGaussianBlur stdDeviation="1.5"/></filter>
    </defs>
    <g filter="url(#wcBlurWhole_fish)" opacity="0.4"><ellipse cx="0" cy="0" rx="145" ry="60" fill="#A0B0B8"/></g>
    
    <g filter="url(#wcRoughWhole_fish)"><path d="M -130 0 Q -125 -50 -50 -55 Q 60 -55 110 -32 L 130 -25 Q 145 -12 145 0 Q 145 12 130 25 L 110 32 Q 60 55 -50 55 Q -125 50 -130 0 Z" fill="url(#wcBodyWhole_fish)"/><path d="M 130 -25 L 158 -50 L 152 0 L 158 50 L 130 25 Z" fill="url(#wcBodyWhole_fish)"/></g>
    
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"><path d="M -130 0 Q -125 -50 -50 -55 Q 60 -55 110 -32 L 130 -25 Q 145 -12 145 0 Q 145 12 130 25 L 110 32 Q 60 55 -50 55 Q -125 50 -130 0 Z"/><path d="M 130 -25 L 158 -50 L 152 0 L 158 50 L 130 25"/><path d="M -110 -18 m -7 0 a 7 7 0 1 0 14 0 a 7 7 0 1 0 -14 0 Z" opacity="0.95" stroke-width="2.5"/><path d="M -90 -35 Q -85 0 -88 35" opacity="0.85" stroke-width="2.5"/><path d="M -130 0 Q -135 8 -123 15" opacity="0.85" stroke-width="1.8"/><path d="M -100 5 Q 0 8 110 5" opacity="0.55" stroke-width="1.4"/><path d="M -50 -30 Q -20 -25 10 -30" opacity="0.5" stroke-width="1.3"/><path d="M 20 -30 Q 50 -25 80 -30" opacity="0.5" stroke-width="1.3"/><path d="M -80 35 Q 0 40 90 35" opacity="0.5" stroke-width="1.4"/></g>
  </g>

  <!-- NG side (flat) -->
  <g transform="translate(800, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#C62828"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">×</text>
    <path d="M -130 0 Q -125 -50 -50 -55 Q 60 -55 110 -32 L 130 -25 Q 145 -12 145 0 Q 145 12 130 25 L 110 32 Q 60 55 -50 55 Q -125 50 -130 0 Z" fill="#787878"/><path d="M 130 -25 L 158 -50 L 152 0 L 158 50 L 130 25 Z" fill="#787878"/><ellipse cx="-110" cy="-18" rx="7" ry="7" fill="#C8C0B0" opacity="0.85"/><ellipse cx="-90" cy="0" rx="9" ry="22" fill="#7A4828" opacity="0.6"/><ellipse cx="0" cy="0" rx="60" ry="30" fill="#5D4E37" opacity="0.3"/>
  </g>

  <!-- Comparison labels -->
  <g font-size="20" fill="#333">
    <rect x="60" y="495" width="460" height="80" rx="8" fill="#E8F5E9"/>
    <text x="80" y="520" font-weight="bold" fill="#2C5F2D">● 目:黒く澄む / エラ:赤</text>
    <text x="80" y="545" font-weight="bold" fill="#2C5F2D">● 体表:銀ピカ / 弾力あり</text>
    <text x="80" y="568" fill="#666" font-size="17">腹が固い=内臓新鮮</text>

    <rect x="560" y="495" width="460" height="80" rx="8" fill="#FFEBEE"/>
    <text x="580" y="520" font-weight="bold" fill="#C62828">× 目:白濁 / エラ:茶〜黒</text>
    <text x="580" y="545" font-weight="bold" fill="#C62828">× 体表:ヌメ・乾 / 軟</text>
    <text x="580" y="568" fill="#666" font-size="17">腹が破れる=内臓崩れ</text>
  </g>
</svg>
