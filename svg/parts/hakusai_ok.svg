<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" opacity="0.9">
  <defs>
    <radialGradient id="hakusai-aura-ok" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#D8E5B0" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#D8E5B0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hakusai-body-ok" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A8C770"/>
      <stop offset="20%" stop-color="#C8DC8E"/>
      <stop offset="45%" stop-color="#F8FAE0"/>
      <stop offset="70%" stop-color="#FFFAE8"/>
      <stop offset="100%" stop-color="#F0E8C8"/>
    </linearGradient>
    <linearGradient id="hakusai-leaf-ok" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7FA850"/>
      <stop offset="60%" stop-color="#B8D480"/>
      <stop offset="100%" stop-color="#E8EDC0"/>
    </linearGradient>
  </defs>

  <ellipse cx="200" cy="225" rx="140" ry="180" fill="url(#hakusai-aura-ok)"/>

  <!-- 本体: 縦長砲弾型 -->
  <path d="M 200 60
           Q 145 65 130 130
           Q 118 200 122 280
           Q 130 345 200 355
           Q 270 345 278 280
           Q 282 200 270 130
           Q 255 65 200 60 Z"
        fill="url(#hakusai-body-ok)" stroke="#3D2817" stroke-width="3" stroke-linejoin="round"/>

  <!-- 上部の葉(濃い緑が巻き込まれる葉先) -->
  <path d="M 165 65 Q 155 50 175 45 Q 185 60 178 75 Z" fill="url(#hakusai-leaf-ok)" stroke="#3D2817" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M 200 55 Q 195 40 215 42 Q 220 58 210 70 Z" fill="url(#hakusai-leaf-ok)" stroke="#3D2817" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M 235 65 Q 245 48 230 42 Q 218 55 222 72 Z" fill="url(#hakusai-leaf-ok)" stroke="#3D2817" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- 葉の重なり(白系で同じ縦縞=白菜の透明感のある軸を表現) -->
  <path d="M 145 75 Q 138 200 145 340" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.65"/>
  <path d="M 165 65 Q 158 200 162 348" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <path d="M 185 60 Q 182 200 183 353" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M 200 60 Q 200 200 200 355" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
  <path d="M 215 60 Q 218 200 217 353" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M 235 65 Q 242 200 238 348" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <path d="M 255 75 Q 262 200 255 340" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.65"/>

  <!-- 軸の中央線(うっすら影、薄ベージュで自然に) -->
  <path d="M 175 90 Q 173 175 178 280 Q 180 320 178 345" fill="none" stroke="#D4C495" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <path d="M 225 90 Q 227 175 222 280 Q 220 320 222 345" fill="none" stroke="#D4C495" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

  <!-- 上部のフリル -->
  <path d="M 130 130 Q 138 110 148 120 Q 156 100 165 115" fill="none" stroke="#3D2817" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
  <path d="M 235 115 Q 244 100 252 120 Q 262 110 270 130" fill="none" stroke="#3D2817" stroke-width="2" stroke-linecap="round" opacity="0.55"/>

  <!-- 上部の緑頭部 -->
  <path d="M 130 130 Q 145 90 200 85 Q 255 90 270 130 Q 260 105 200 95 Q 140 105 130 130 Z"
        fill="#9DC560" opacity="0.5"/>

  <!-- 切り口(白く新鮮に) -->
  <ellipse cx="200" cy="355" rx="40" ry="6" fill="#FFFAE8" stroke="#3D2817" stroke-width="2.5"/>
  <ellipse cx="200" cy="354" rx="35" ry="3.5" fill="#F0E8C8"/>

  <!-- 大きなハイライト(瑞々しい) -->
  <ellipse cx="170" cy="180" rx="25" ry="90" fill="#FFFFFF" opacity="0.4" transform="rotate(-5 170 180)"/>
  <ellipse cx="160" cy="140" rx="15" ry="35" fill="#FFFFFF" opacity="0.55" transform="rotate(-5 160 140)"/>

  <ellipse cx="200" cy="370" rx="80" ry="7" fill="#3D2817" opacity="0.12"/>
</svg>
