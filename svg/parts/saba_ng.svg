<svg xmlns="http://www.w3.org/2000/svg" viewBox="-160 -80 320 160" font-family="Noto Sans CJK JP, sans-serif">
<!-- 本体(くすんだ色) -->
    <path d="M -195 0 Q -190 -35 -130 -42 Q -50 -47 50 -42 Q 120 -38 145 -22 L 188 -45 L 180 0 L 188 45 L 145 22 Q 120 38 50 42 Q -50 47 -130 42 Q -190 35 -195 0 Z" fill="#888888"/>

    <!-- 波模様(ぼやけて目立たない) -->
    <g stroke="#3D3F45" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5">
      <path d="M -100 -25 Q -75 -28 -50 -25"/>
      <path d="M -25 -28 Q 0 -32 25 -28"/>
      <path d="M 50 -27 Q 80 -30 110 -27"/>
    </g>

    <!-- ドリップ(血液が出ている) -->
    <ellipse cx="-50" cy="20" rx="22" ry="6" fill="#7A2820" opacity="0.5"/>
    <ellipse cx="0" cy="25" rx="18" ry="5" fill="#7A2820" opacity="0.45"/>
    <ellipse cx="50" cy="22" rx="15" ry="5" fill="#7A2820" opacity="0.45"/>
    <!-- 茶色シミ -->
    <ellipse cx="-65" cy="0" rx="11" ry="6" fill="#7A4A1F" opacity="0.5"/>
    <ellipse cx="40" cy="-5" rx="9" ry="5" fill="#7A4A1F" opacity="0.45"/>

    <!-- 目(濁る) -->
    <circle cx="-160" cy="-12" r="10" fill="#C8C0B0" stroke="#3D2817" stroke-width="2.5"/>
    <circle cx="-159" cy="-11" r="6" fill="#7A7060" opacity="0.7"/>

    <!-- 輪郭 -->
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M -195 0 Q -190 -35 -130 -42 Q -50 -47 50 -42 Q 120 -38 145 -22 L 188 -45 L 180 0 L 188 45 L 145 22 Q 120 38 50 42 Q -50 47 -130 42 Q -190 35 -195 0 Z"/>
      <path d="M 145 -22 L 188 -45" opacity="0.6"/>
      <path d="M 145 22 L 188 45" opacity="0.6"/>

      <!-- エラ(黒ずむ) -->
      <path d="M -115 -32 Q -115 0 -110 32" stroke-width="2.5"/>
      <path d="M -118 -20 Q -118 0 -113 20" stroke="#5A3215" stroke-width="1.5" opacity="0.6"/>

      <!-- 背びれ -->
      <path d="M -55 -42 L -45 -62 L -28 -55 L -22 -45" stroke-width="2.5"/>
      <path d="M 50 -45 Q 70 -55 95 -45" stroke-width="2"/>
      <!-- 小離鰭 -->
      <path d="M 110 -30 L 113 -35 L 117 -30" stroke-width="1.8"/>
      <path d="M 122 -28 L 125 -33 L 129 -28" stroke-width="1.8"/>
      <!-- 腹びれ -->
      <path d="M -75 42 Q -65 56 -55 42" stroke-width="2.5"/>
    </g>

    <ellipse cx="-30" cy="75" rx="170" ry="5" fill="#3D2817" opacity="0.1"/>
</svg>
