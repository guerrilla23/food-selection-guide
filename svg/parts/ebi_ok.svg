<svg xmlns="http://www.w3.org/2000/svg" viewBox="-210 -130 420 250" font-family="Noto Sans CJK JP, sans-serif">
<defs>
      <linearGradient id="wcBodyEbi" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#FF9050" stop-opacity="0.95"/>
        <stop offset="50%" stop-color="#F06A28" stop-opacity="0.92"/>
        <stop offset="100%" stop-color="#A84012" stop-opacity="0.85"/>
      </linearGradient>
      <filter id="wcRoughEbi" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.04" numOctaves="3" seed="33"/>
        <feDisplacementMap in="SourceGraphic" scale="3"/>
      </filter>
      <filter id="wcBlurEbi">
        <feGaussianBlur stdDeviation="1.5"/>
      </filter>
    </defs>

    <!-- Watercolor bleeds -->
    <g filter="url(#wcBlurEbi)" opacity="0.4">
      <ellipse cx="0" cy="20" rx="170" ry="80" fill="#FBBA80"/>
    </g>

    <!-- ====================
         エビの形: 滑らかなC字カーブ全体
         頭(左の丸い大きい部分)→胴体(C字に湾曲)→尾(右の扇)
         体節は線で示し、輪郭は1本の滑らかなカーブ
         ==================== -->

    <!-- エビ全体の本体(頭+胴体が滑らかにつながったC字) -->
    <g filter="url(#wcRoughEbi)">
      <path d="M -160 -30
               Q -180 -10 -175 15
               Q -170 40 -150 50
               Q -130 60 -110 55
               Q -100 50 -95 35
               Q -85 30 -75 35
               Q -50 50 -10 55
               Q 30 58 70 50
               Q 105 38 125 18
               Q 140 0 142 -15
               L 168 -35
               L 175 -10
               L 168 15
               L 142 -8
               Q 138 -30 120 -45
               Q 95 -60 60 -65
               Q 20 -68 -25 -60
               Q -65 -52 -100 -42
               Q -125 -38 -140 -38
               Q -155 -38 -160 -30 Z" fill="url(#wcBodyEbi)"/>
    </g>

    <!-- Strong ink lines -->
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
      <!-- 本体輪郭 -->
      <path d="M -160 -30
               Q -180 -10 -175 15
               Q -170 40 -150 50
               Q -130 60 -110 55
               Q -100 50 -95 35
               Q -85 30 -75 35
               Q -50 50 -10 55
               Q 30 58 70 50
               Q 105 38 125 18
               Q 140 0 142 -15
               L 168 -35
               L 175 -10
               L 168 15
               L 142 -8
               Q 138 -30 120 -45
               Q 95 -60 60 -65
               Q 20 -68 -25 -60
               Q -65 -52 -100 -42
               Q -125 -38 -140 -38
               Q -155 -38 -160 -30 Z"/>

      <!-- 触覚(頭から伸びる、長い) -->
      <path d="M -155 -32 Q -180 -55 -195 -85 Q -200 -100 -195 -115" stroke-width="1.8"/>
      <path d="M -148 -38 Q -170 -65 -180 -90 Q -180 -105 -175 -118" stroke-width="1.5"/>
      <path d="M -140 -38 Q -150 -55 -155 -75" stroke-width="1.3"/>

      <!-- 目(頭の下) -->
      <circle cx="-150" cy="-5" r="5" fill="#3D2817"/>
      <circle cx="-148" cy="-7" r="1.5" fill="#FFFFFF"/>

      <!-- 体節の境界線(胴体に5本の弧で「節」を示す) -->
      <path d="M -85 -55 Q -88 -10 -90 30" stroke-width="2.2" opacity="0.8"/>
      <path d="M -55 -62 Q -55 -10 -55 35" stroke-width="2.2" opacity="0.8"/>
      <path d="M -20 -65 Q -20 -10 -15 38" stroke-width="2.2" opacity="0.8"/>
      <path d="M 20 -65 Q 22 -10 28 38" stroke-width="2.2" opacity="0.8"/>
      <path d="M 60 -60 Q 65 -10 75 30" stroke-width="2.2" opacity="0.8"/>
      <path d="M 100 -50 Q 105 -10 113 22" stroke-width="2.2" opacity="0.8"/>

      <!-- 尾びれの放射線 -->
      <path d="M 145 -25 L 165 -30" stroke-width="1.5"/>
      <path d="M 148 0 L 170 0" stroke-width="1.5"/>
      <path d="M 145 25 L 165 30" stroke-width="1.5"/>

      <!-- 脚(下方向に伸びる、4〜5本) -->
      <path d="M -100 50 Q -105 65 -108 78" stroke-width="1.5"/>
      <path d="M -75 55 Q -78 70 -78 82" stroke-width="1.5"/>
      <path d="M -45 58 Q -45 73 -42 85" stroke-width="1.5"/>
      <path d="M -10 60 Q -8 75 -5 87" stroke-width="1.5"/>
      <path d="M 30 58 Q 32 72 35 84" stroke-width="1.5"/>
      <path d="M 65 52 Q 68 65 70 78" stroke-width="1.5"/>
    </g>

    <!-- 体節間の白いライン(プリッと感を演出) -->
    <g stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.55">
      <path d="M -83 -50 Q -86 -10 -88 25"/>
      <path d="M -53 -57 Q -53 -10 -53 30"/>
      <path d="M -18 -60 Q -18 -10 -13 33"/>
      <path d="M 22 -60 Q 24 -10 30 33"/>
      <path d="M 62 -55 Q 67 -10 77 25"/>
    </g>

    <!-- ハイライト(プリッとした光沢) -->
    <ellipse cx="-50" cy="-30" rx="80" ry="6" fill="#FFFFFF" opacity="0.45"/>
    <ellipse cx="-30" cy="-35" rx="40" ry="3" fill="#FFFFFF" opacity="0.65"/>

    <!-- 影 -->
    <ellipse cx="0" cy="105" rx="160" ry="7" fill="#3D2817" opacity="0.12"/>
</svg>
