<svg xmlns="http://www.w3.org/2000/svg" viewBox="-220 -110 440 220" font-family="Noto Sans CJK JP, sans-serif">
<!-- Long negi (horizontal) - thick, vibrant -->
    <g transform="rotate(-15)">
      <!-- Green leaves (top) -->
      <path d="M -180 -50 L -180 50 Q -150 55 -120 50 L -120 -50 Q -150 -55 -180 -50 Z" fill="#4A7C2E"/>
      <!-- Multiple leaf layers -->
      <line x1="-178" y1="-30" x2="-122" y2="-30" stroke="#2C5F2D" stroke-width="1"/>
      <line x1="-178" y1="0" x2="-122" y2="0" stroke="#2C5F2D" stroke-width="1"/>
      <line x1="-178" y1="30" x2="-122" y2="30" stroke="#2C5F2D" stroke-width="1"/>
      
      <!-- Transition zone (sharp boundary) -->
      <path d="M -120 -50 L -100 -55 L -100 55 L -120 50 Z" fill="#A8C76E"/>
      
      <!-- White part (thick, plump) -->
      <path d="M -100 -55 L 150 -52 Q 170 -52 170 -45 L 170 45 Q 170 52 150 52 L -100 55 Z" fill="#FAFAF8"/>
      <!-- Ridges on white -->
      <path d="M -90 -50 Q 30 -48 160 -45" stroke="#E8E8E0" stroke-width="1" fill="none"/>
      <path d="M -90 -25 Q 30 -23 160 -20" stroke="#E8E8E0" stroke-width="1" fill="none"/>
      <path d="M -90 0 Q 30 2 160 5" stroke="#E8E8E0" stroke-width="1" fill="none"/>
      <path d="M -90 25 Q 30 27 160 30" stroke="#E8E8E0" stroke-width="1" fill="none"/>
      <!-- Highlight -->
      <ellipse cx="30" cy="-30" rx="100" ry="6" fill="#FFFFFF" opacity="0.7"/>
      <!-- Right end (root, clean cut) -->
      <ellipse cx="170" cy="0" rx="6" ry="45" fill="#F0F0E8"/>
      <!-- Tiny clean roots -->
      <line x1="170" y1="-30" x2="180" y2="-32" stroke="#999" stroke-width="1"/>
      <line x1="170" y1="-15" x2="182" y2="-15" stroke="#999" stroke-width="1"/>
      <line x1="170" y1="0" x2="183" y2="0" stroke="#999" stroke-width="1"/>
      <line x1="170" y1="15" x2="182" y2="15" stroke="#999" stroke-width="1"/>
      <line x1="170" y1="30" x2="180" y2="32" stroke="#999" stroke-width="1"/>
    </g>
</svg>
