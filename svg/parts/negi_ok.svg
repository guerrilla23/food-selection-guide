<svg xmlns="http://www.w3.org/2000/svg" viewBox="-280 -110 560 220" font-family="Noto Sans CJK JP, sans-serif">
<!-- Watercolor defs (negi-specific) -->
    <defs>
      <linearGradient id="wcWhiteNegi" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
        <stop offset="50%" stop-color="#F5F2EA" stop-opacity="0.85"/>
        <stop offset="100%" stop-color="#C8C0AC" stop-opacity="0.7"/>
      </linearGradient>
      <linearGradient id="wcGreenNegi" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#9BCB7A" stop-opacity="0.9"/>
        <stop offset="50%" stop-color="#5D8F3D" stop-opacity="0.85"/>
        <stop offset="100%" stop-color="#2C5F2D" stop-opacity="0.7"/>
      </linearGradient>
      <filter id="wcRoughNegi" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.04" numOctaves="3" seed="7"/>
        <feDisplacementMap in="SourceGraphic" scale="4"/>
      </filter>
      <filter id="wcBlurNegi">
        <feGaussianBlur stdDeviation="1.5"/>
      </filter>
    </defs>

    <g transform="rotate(-15)">
      <!-- Watercolor bleeds (背景、細長い形に合わせて) -->
      <g filter="url(#wcBlurNegi)" opacity="0.4">
        <ellipse cx="-175" cy="0" rx="65" ry="38" fill="#5D8F3D"/>
        <ellipse cx="55" cy="0" rx="180" ry="38" fill="#E8DCC0"/>
      </g>

      <!-- Green leaves part (細く長く) -->
      <g filter="url(#wcRoughNegi)">
        <path d="M -220 -25 L -220 25 Q -180 28 -130 25 L -130 -25 Q -180 -28 -220 -25 Z" fill="url(#wcGreenNegi)"/>
      </g>

      <!-- Sharp transition (緑と白のくっきり境目) -->
      <path d="M -130 -25 L -110 -28 L -110 28 L -130 25 Z" fill="#A8C76E" opacity="0.85"/>

      <!-- White part (細く長い円柱) -->
      <g filter="url(#wcRoughNegi)">
        <path d="M -110 -28 L 200 -25 Q 220 -25 220 -20 L 220 20 Q 220 25 200 25 L -110 28 Z" fill="url(#wcWhiteNegi)"/>
      </g>

      <!-- Right end (root cap) -->
      <ellipse cx="220" cy="0" rx="5" ry="22" fill="#F0F0E8" opacity="0.85"/>

      <!-- Strong ink lines (Pattern A) -->
      <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
        <!-- Green leaves outline -->
        <path d="M -220 -25 L -220 25 Q -180 28 -130 25 L -130 -25 Q -180 -28 -220 -25 Z"/>
        <!-- White body outline -->
        <path d="M -110 -28 L 200 -25 Q 220 -25 220 -20 L 220 20 Q 220 25 200 25 L -110 28 Z"/>
        <!-- Sharp boundary (緑↔白) -->
        <line x1="-120" y1="-26" x2="-120" y2="26" stroke-width="2.5"/>
        <!-- Leaf vertical bands -->
        <line x1="-218" y1="-13" x2="-132" y2="-13" opacity="0.7" stroke-width="1.5"/>
        <line x1="-218" y1="0"   x2="-132" y2="0"   opacity="0.7" stroke-width="1.5"/>
        <line x1="-218" y1="13"  x2="-132" y2="13"  opacity="0.7" stroke-width="1.5"/>
        <!-- White-section ridges -->
        <path d="M -100 -12 Q 50 -10 210 -8" opacity="0.5" stroke-width="1.3"/>
        <path d="M -100 0    Q 50 2 210 4"   opacity="0.5" stroke-width="1.3"/>
        <path d="M -100 12   Q 50 14 210 16" opacity="0.5" stroke-width="1.3"/>
        <!-- Hair roots (ねぎの特徴部分: 太く長く目立たせる) -->
        <line x1="220" y1="-15" x2="246" y2="-22"/>
        <line x1="220" y1="-7"  x2="250" y2="-10"/>
        <line x1="220" y1="0"   x2="254" y2="0"/>
        <line x1="220" y1="7"   x2="250" y2="10"/>
        <line x1="220" y1="15"  x2="246" y2="22"/>
      </g>
    </g>
</svg>
