<svg xmlns="http://www.w3.org/2000/svg" viewBox="-125 -140 250 295" font-family="Noto Sans CJK JP, sans-serif">
<defs>
      <radialGradient id="wcCapEringi" cx="50%" cy="40%">
        <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
        <stop offset="60%" stop-color="#F5F0DC" stop-opacity="0.9"/>
        <stop offset="100%" stop-color="#D8C8A0" stop-opacity="0.85"/>
      </radialGradient>
      <linearGradient id="wcStemEringi" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#E8DCB8" stop-opacity="0.92"/>
        <stop offset="50%" stop-color="#FAF2D8" stop-opacity="0.95"/>
        <stop offset="100%" stop-color="#C8B888" stop-opacity="0.88"/>
      </linearGradient>
      <filter id="wcRoughEringi" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.04" numOctaves="3" seed="23"/>
        <feDisplacementMap in="SourceGraphic" scale="3"/>
      </filter>
      <filter id="wcBlurEringi">
        <feGaussianBlur stdDeviation="1.5"/>
      </filter>
    </defs>

    <!-- Watercolor bleeds -->
    <g filter="url(#wcBlurEringi)" opacity="0.4">
      <ellipse cx="0" cy="-80" rx="115" ry="40" fill="#F5F0DC"/>
      <ellipse cx="0" cy="40" rx="55" ry="100" fill="#FAF2D8"/>
    </g>

    <!-- 軸(白く太い) -->
    <g filter="url(#wcRoughEringi)">
      <path d="M -50 -55
               Q -55 0 -52 100
               Q -50 130 0 132
               Q 50 130 52 100
               Q 55 0 50 -55 Z" fill="url(#wcStemEringi)"/>
    </g>

    <!-- 傘(白色) -->
    <g filter="url(#wcRoughEringi)">
      <path d="M -100 -55
               Q -105 -100 -65 -118
               Q -25 -130 0 -130
               Q 25 -130 65 -118
               Q 105 -100 100 -55
               Q 90 -42 65 -42
               Q 25 -40 0 -40
               Q -25 -40 -65 -42
               Q -90 -42 -100 -55 Z" fill="url(#wcCapEringi)"/>
    </g>

    <!-- Strong ink lines -->
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
      <!-- 軸輪郭 -->
      <path d="M -50 -55 Q -55 0 -52 100 Q -50 130 0 132 Q 50 130 52 100 Q 55 0 50 -55"/>
      <!-- 傘輪郭 -->
      <path d="M -100 -55 Q -105 -100 -65 -118 Q -25 -130 0 -130 Q 25 -130 65 -118 Q 105 -100 100 -55 Q 90 -42 65 -42 Q 25 -40 0 -40 Q -25 -40 -65 -42 Q -90 -42 -100 -55 Z"/>
      <!-- 軸の縦の繊維線 -->
      <path d="M -30 -45 Q -32 50 -28 125" opacity="0.55"/>
      <path d="M 0 -45 Q 0 50 0 130" opacity="0.5"/>
      <path d="M 30 -45 Q 32 50 28 125" opacity="0.55"/>
      <!-- 傘の表面のうねり -->
      <path d="M -85 -90 Q -45 -100 0 -102 Q 45 -100 85 -90" opacity="0.6"/>
      <path d="M -90 -75 Q -45 -82 0 -84 Q 45 -82 90 -75" opacity="0.55"/>
      <!-- 傘と軸の境界 -->
      <path d="M -100 -55 Q -50 -50 0 -50 Q 50 -50 100 -55" opacity="0.65"/>
    </g>

    <!-- 軸のハイライト -->
    <ellipse cx="-15" cy="40" rx="8" ry="60" fill="#FFFFFF" opacity="0.45"/>
    <!-- 傘のハイライト -->
    <ellipse cx="-30" cy="-95" rx="20" ry="8" fill="#FFFFFF" opacity="0.5"/>

    <!-- 影 -->
    <ellipse cx="0" cy="143" rx="55" ry="6" fill="#3D2817" opacity="0.12"/>
</svg>
