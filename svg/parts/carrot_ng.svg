<svg xmlns="http://www.w3.org/2000/svg" viewBox="-130 -230 260 440" font-family="Noto Sans CJK JP, sans-serif">
<!-- Large dark cut at top -->
    <g transform="translate(0, -150)">
      <ellipse cx="0" cy="0" rx="22" ry="6" fill="#3D2817"/>
      <ellipse cx="0" cy="-2" rx="20" ry="4" fill="#5D4E37"/>
    </g>
    
    <!-- Carrot body (dull, with imperfections) -->
    <path d="M -45 -150 Q -50 -130 -50 -100 L -25 100 Q -10 150 0 170 Q 10 150 25 100 L 50 -100 Q 50 -130 45 -150 Q 0 -160 -45 -150 Z" fill="#C77A4A"/>
    <!-- Discolored patch -->
    <ellipse cx="20" cy="-30" rx="15" ry="20" fill="#8B5A30" opacity="0.6"/>
    <ellipse cx="-15" cy="50" rx="12" ry="18" fill="#8B5A30" opacity="0.5"/>
    <!-- Wrinkles/cracks -->
    <path d="M -30 -80 Q -10 -70 0 -85" stroke="#5D4E37" stroke-width="1.5" fill="none"/>
    <path d="M 10 0 Q 25 10 30 -5" stroke="#5D4E37" stroke-width="1.5" fill="none"/>
    <path d="M -25 80 Q 0 85 20 75" stroke="#5D4E37" stroke-width="1.5" fill="none"/>
    <!-- Many hair roots (rough) -->
    <line x1="-40" y1="-50" x2="-50" y2="-48" stroke="#5D4E37" stroke-width="1.5"/>
    <line x1="40" y1="-30" x2="50" y2="-25" stroke="#5D4E37" stroke-width="1.5"/>
    <line x1="-35" y1="20" x2="-48" y2="25" stroke="#5D4E37" stroke-width="1.5"/>
    <line x1="35" y1="40" x2="48" y2="48" stroke="#5D4E37" stroke-width="1.5"/>
    <line x1="-30" y1="80" x2="-42" y2="85" stroke="#5D4E37" stroke-width="1.5"/>
    <line x1="0" y1="170" x2="-5" y2="183" stroke="#5D4E37" stroke-width="1.5"/>
    <line x1="0" y1="170" x2="5" y2="183" stroke="#5D4E37" stroke-width="1.5"/>
</svg>
