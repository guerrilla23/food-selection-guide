<svg xmlns="http://www.w3.org/2000/svg" viewBox="-65 -220 130 410" font-family="Noto Sans CJK JP, sans-serif">
<!-- Leaves (small cut, fresh) -->
    <g transform="translate(0, -150)">
      <!-- Small green stem stub -->
      <path d="M -15 0 Q -20 -25 -10 -40 Q 0 -25 10 -40 Q 20 -25 15 0 Z" fill="#4A7C2E"/>
      <!-- Tiny tuft of leaves -->
      <circle cx="-10" cy="-45" r="8" fill="#5D8F3D"/>
      <circle cx="0" cy="-50" r="9" fill="#4A7C2E"/>
      <circle cx="10" cy="-45" r="8" fill="#5D8F3D"/>
    </g>
    
    <!-- Carrot body (vibrant orange, smooth) -->
    <path d="M -45 -150 Q -50 -130 -50 -100 L -25 100 Q -10 150 0 170 Q 10 150 25 100 L 50 -100 Q 50 -130 45 -150 Q 0 -160 -45 -150 Z" fill="#FF8C42"/>
    <!-- Highlight -->
    <ellipse cx="-15" cy="-50" rx="8" ry="80" fill="#FFB07A" opacity="0.6"/>
    <!-- Subtle horizontal lines (texture) -->
    <path d="M -42 -100 Q 0 -95 42 -100" stroke="#E07020" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M -38 -50 Q 0 -45 38 -50" stroke="#E07020" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M -32 0 Q 0 5 32 0" stroke="#E07020" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M -25 50 Q 0 55 25 50" stroke="#E07020" stroke-width="1" fill="none" opacity="0.5"/>
    <!-- Few short hair roots -->
    <line x1="0" y1="170" x2="-3" y2="180" stroke="#D45F1A" stroke-width="1"/>
    <line x1="0" y1="170" x2="3" y2="180" stroke="#D45F1A" stroke-width="1"/>
</svg>
