  <path d="M 305 270 Q 295 220 285 170" fill="none" stroke="#F0FAD8" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <path d="M 305 270 Q 320 245 335 220" fill="none" stroke="#F0FAD8" stroke-width="1.5" stroke-linecap="round" opacity="0.65"/>

  <!-- 本体球 -->
  <ellipse cx="200" cy="215" rx="125" ry="120" fill="url(#cabbage-body-ok)" stroke="#3D2817" stroke-width="3"/>

  <!-- 葉の重なり(白系で同じ葉脈) -->
  <path d="M 200 110 Q 175 140 155 195 Q 145 245 165 305" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.75"/>
  <path d="M 200 110 Q 225 140 245 195 Q 255 245 235 305" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.75"/>
  <path d="M 200 105 Q 200 175 200 320" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

  <!-- 横方向葉脈 -->
  <path d="M 110 195 Q 145 175 195 160" fill="none" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round" opacity="0.55"/>
  <path d="M 115 250 Q 150 250 195 250" fill="none" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round" opacity="0.55"/>
  <path d="M 290 195 Q 255 175 205 160" fill="none" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round" opacity="0.55"/>
  <path d="M 285 250 Q 250 250 205 250" fill="none" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round" opacity="0.55"/>

  <!-- 上部頂点 -->
  <path d="M 195 110 Q 200 100 205 110" fill="#6B8E3D" stroke="#3D2817" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- ハイライト強化 -->
  <ellipse cx="155" cy="155" rx="45" ry="28" fill="#FFFFFF" opacity="0.4" transform="rotate(-25 155 155)"/>
  <ellipse cx="170" cy="135" rx="20" ry="12" fill="#FFFFFF" opacity="0.55" transform="rotate(-25 170 135)"/>

  <ellipse cx="200" cy="345" rx="120" ry="12" fill="#3D2817" opacity="0.12"/>
