<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" opacity="0.9">
  <defs>
    <radialGradient id="cabbage-aura-ok" cx="50%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#C5E1A5" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#C5E1A5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cabbage-body-ok" cx="40%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#F0F8DC"/>
