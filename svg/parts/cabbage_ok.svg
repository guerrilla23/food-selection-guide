<svg xmlns="http://www.w3.org/2000/svg" viewBox="-170 -160 340 320" font-family="Noto Sans CJK JP, sans-serif">
<defs>
      <radialGradient id="wcBodyCabbage" cx="35%" cy="25%">
        <stop offset="0%" stop-color="#E8F5C8" stop-opacity="0.95"/>
        <stop offset="50%" stop-color="#A8C97C" stop-opacity="0.85"/>
        <stop offset="100%" stop-color="#5D8F3D" stop-opacity="0.7"/>
      </radialGradient>
      <radialGradient id="wcOuterCabbage" cx="50%" cy="40%">
        <stop offset="0%" stop-color="#9BCB7A" stop-opacity="0.9"/>
        <stop offset="100%" stop-color="#4A6B2A" stop-opacity="0.7"/>
      </radialGradient>
      <filter id="wcRoughCabbage" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.04" numOctaves="3" seed="9"/>
        <feDisplacementMap in="SourceGraphic" scale="4"/>
      </filter>
      <filter id="wcBlurCabbage">
        <feGaussianBlur stdDeviation="1.5"/>
      </filter>
    </defs>

    <!-- Watercolor bleeds (背景) -->
    <g filter="url(#wcBlurCabbage)" opacity="0.4">
      <ellipse cx="0" cy="0" rx="160" ry="150" fill="#9BCB7A"/>
      <ellipse cx="-80" cy="20" rx="60" ry="80" fill="#5D8F3D"/>
      <ellipse cx="80" cy="20" rx="60" ry="80" fill="#5D8F3D"/>
    </g>

    <!-- 外葉(左、開いた状態) -->
    <g filter="url(#wcRoughCabbage)" opacity="0.85">
      <path d="M -130 30 Q -150 -10 -140 -55 Q -110 -85 -75 -75 Q -70 -30 -78 5 Q -90 50 -120 65 Q -135 60 -130 30 Z" fill="url(#wcOuterCabbage)"/>
    </g>

    <!-- 外葉(右) -->
    <g filter="url(#wcRoughCabbage)" opacity="0.85">
      <path d="M 130 30 Q 150 -10 140 -55 Q 110 -85 75 -75 Q 70 -30 78 5 Q 90 50 120 65 Q 135 60 130 30 Z" fill="url(#wcOuterCabbage)"/>
    </g>

    <!-- 本体球 -->
    <g filter="url(#wcRoughCabbage)">
      <ellipse cx="0" cy="0" rx="115" ry="110" fill="url(#wcBodyCabbage)"/>
    </g>

    <!-- Strong ink lines (Pattern A) -->
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
      <!-- 本体輪郭 -->
      <ellipse cx="0" cy="0" rx="115" ry="110"/>
      <!-- 外葉(左) -->
      <path d="M -130 30 Q -150 -10 -140 -55 Q -110 -85 -75 -75 Q -70 -30 -78 5 Q -90 50 -120 65 Q -135 60 -130 30 Z"/>
      <!-- 外葉(右) -->
      <path d="M 130 30 Q 150 -10 140 -55 Q 110 -85 75 -75 Q 70 -30 78 5 Q 90 50 120 65 Q 135 60 130 30 Z"/>
      <!-- 葉の重なり線(中央から放射) -->
      <path d="M 0 -105 Q -25 -75 -45 -25 Q -55 25 -35 90" opacity="0.75"/>
      <path d="M 0 -105 Q 25 -75 45 -25 Q 55 25 35 90" opacity="0.75"/>
      <path d="M 0 -108 Q 0 -50 0 100" opacity="0.7"/>
      <!-- 葉脈(横方向、白系で透明感) -->
      <path d="M -90 -10 Q -50 -25 -5 -38" opacity="0.55"/>
      <path d="M -85 50 Q -50 50 -5 50" opacity="0.55"/>
      <path d="M 90 -10 Q 50 -25 5 -38" opacity="0.55"/>
      <path d="M 85 50 Q 50 50 5 50" opacity="0.55"/>
      <!-- 上部の頂点 -->
      <path d="M -5 -110 Q 0 -118 5 -110"/>
    </g>

    <!-- 葉脈の白い光(瑞々しさ表現) -->
    <g stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7">
      <path d="M 0 -100 Q -22 -70 -42 -20 Q -50 28 -32 88"/>
      <path d="M 0 -100 Q 22 -70 42 -20 Q 50 28 32 88"/>
    </g>
</svg>
