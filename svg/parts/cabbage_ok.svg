  <path d="M 95 270 Q 100 220 115 165" fill="none" stroke="#F0FAD8" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <path d="M 95 270 Q 80 240 70 215" fill="none" stroke="#F0FAD8" stroke-width="1.5" stroke-linecap="round" opacity="0.65"/>
  <path d="M 95 270 Q 110 245 125 220" fill="none" stroke="#F0FAD8" stroke-width="1.5" stroke-linecap="round" opacity="0.65"/>

  <!-- 外葉(右) -->
  <path d="M 320 240 Q 345 215 340 175 Q 320 145 280 145 Q 265 180 270 220 Q 285 260 310 275 Q 325 270 320 240 Z"
