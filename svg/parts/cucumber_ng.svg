<svg xmlns="http://www.w3.org/2000/svg" viewBox="-180 -90 360 180" font-family="Noto Sans CJK JP, sans-serif">
<!-- 本体(しなびて細る、黄ばむ) -->
    <path d="M -210 0
             Q -205 -28 -150 -38
             Q -50 -42 50 -40
             Q 130 -38 175 -32
             Q 200 -22 205 0
             Q 200 22 175 32
             Q 130 38 50 40
             Q -50 42 -150 38
             Q -205 28 -210 0 Z" fill="#A8B068"/>

    <!-- ヘタ(乾燥) -->
    <path d="M -210 -5 L -228 -5 L -225 -12 L -228 0 L -225 7 L -228 5 L -210 5" stroke="#3D2817" stroke-width="2" fill="#A88A50"/>
    <path d="M 205 -5 Q 220 -8 220 0 Q 220 8 205 5" fill="#5A5828" stroke="#3D2817" stroke-width="2"/>

    <!-- 縦のシワ(しなび) -->
    <g stroke="#3D2817" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.55">
      <path d="M -150 -32 Q -148 0 -152 32"/>
      <path d="M -110 -36 Q -108 0 -112 36"/>
      <path d="M -65 -40 Q -65 0 -67 40"/>
      <path d="M -20 -42 Q -20 0 -22 42"/>
      <path d="M 25 -42 Q 27 0 25 42"/>
      <path d="M 70 -40 Q 72 0 70 40"/>
      <path d="M 115 -36 Q 117 0 115 36"/>
      <path d="M 150 -32 Q 152 0 150 32"/>
    </g>

    <!-- 黄ばみのシミ -->
    <ellipse cx="-80" cy="0" rx="22" ry="14" fill="#D4C060" opacity="0.5"/>
    <ellipse cx="0" cy="-5" rx="28" ry="16" fill="#D4C060" opacity="0.45"/>
    <ellipse cx="85" cy="5" rx="20" ry="12" fill="#D4C060" opacity="0.5"/>

    <!-- 茶色の傷み斑点 -->
    <ellipse cx="-45" cy="10" rx="8" ry="6" fill="#7A4A1F" opacity="0.6"/>
    <ellipse cx="40" cy="15" rx="9" ry="6" fill="#7A4A1F" opacity="0.55"/>
    <ellipse cx="105" cy="-5" rx="6" ry="5" fill="#7A4A1F" opacity="0.5"/>

    <!-- イボ(しぼんでいる) -->
    <g fill="#5A5828" stroke="#3D2817" stroke-width="1.5" opacity="0.7">
      <ellipse cx="-95" cy="-25" rx="2.5" ry="1.8"/>
      <ellipse cx="-35" cy="-30" rx="2.5" ry="1.8"/>
      <ellipse cx="25" cy="-32" rx="2.5" ry="1.8"/>
      <ellipse cx="85" cy="-28" rx="2.5" ry="1.8"/>
    </g>

    <!-- 輪郭 -->
    <path d="M -210 0 Q -205 -28 -150 -38 Q -50 -42 50 -40 Q 130 -38 175 -32 Q 200 -22 205 0 Q 200 22 175 32 Q 130 38 50 40 Q -50 42 -150 38 Q -205 28 -210 0 Z" stroke="#3D2817" stroke-width="3" fill="none"/>
</svg>
