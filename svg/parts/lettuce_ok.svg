<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" opacity="0.9">
  <defs>
    <radialGradient id="lettuce-aura-ok" cx="50%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#DCEDA0" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#DCEDA0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lettuce-body-ok" cx="40%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#F8FCE0"/>
      <stop offset="55%" stop-color="#BCDB7A"/>
      <stop offset="100%" stop-color="#7AAB3D"/>
    </radialGradient>
    <radialGradient id="lettuce-outer-ok" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#D0E595"/>
      <stop offset="100%" stop-color="#7AAB3D"/>
    </radialGradient>
  </defs>

  <ellipse cx="200" cy="225" rx="185" ry="160" fill="url(#lettuce-aura-ok)"/>

  <!-- 外葉(左) -->
  <path d="M 80 230 Q 55 200 60 165 Q 70 130 105 120 Q 130 115 150 130
           Q 145 100 165 95 Q 145 145 150 195
           Q 145 250 125 290 Q 100 305 80 285 Q 55 265 80 230 Z"
        fill="url(#lettuce-outer-ok)" stroke="#3D2817" stroke-width="3" stroke-linejoin="round"/>
  <!-- 葉縁の波打ち(輪郭は焦げ茶のままでギザに描き出す) -->
  <path d="M 60 175 Q 65 168 72 175 Q 78 168 85 175 Q 92 168 100 175"
        fill="none" stroke="#3D2817" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
  <path d="M 80 290 Q 90 282 100 290 Q 110 282 120 290"
        fill="none" stroke="#3D2817" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
  <!-- 葉脈は白系で透明感 -->
  <path d="M 105 290 Q 100 200 130 110" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <path d="M 105 290 Q 80 240 65 195" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>

  <!-- 外葉(右) -->
  <path d="M 320 230 Q 345 200 340 165 Q 330 130 295 120 Q 270 115 250 130
           Q 255 100 235 95 Q 255 145 250 195
           Q 255 250 275 290 Q 300 305 320 285 Q 345 265 320 230 Z"
        fill="url(#lettuce-outer-ok)" stroke="#3D2817" stroke-width="3" stroke-linejoin="round"/>
  <path d="M 340 175 Q 335 168 328 175 Q 322 168 315 175 Q 308 168 300 175"
        fill="none" stroke="#3D2817" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
  <path d="M 320 290 Q 310 282 300 290 Q 290 282 280 290"
        fill="none" stroke="#3D2817" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
  <path d="M 295 290 Q 300 200 270 110" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>

  <!-- 上部の葉(頂点周り) -->
  <path d="M 200 80 Q 165 90 145 120 Q 140 95 175 70 Q 200 60 230 70 Q 260 95 255 120 Q 235 90 200 80 Z"
        fill="url(#lettuce-outer-ok)" stroke="#3D2817" stroke-width="3" stroke-linejoin="round"/>
  <path d="M 145 75 Q 155 68 165 75 Q 175 68 185 75 Q 195 68 205 75 Q 215 68 225 75 Q 235 68 245 75"
        fill="none" stroke="#3D2817" stroke-width="2" stroke-linecap="round" opacity="0.55"/>

  <!-- 本体(中心の球) -->
  <ellipse cx="200" cy="220" rx="118" ry="115" fill="url(#lettuce-body-ok)" stroke="#3D2817" stroke-width="3"/>

  <!-- 内側の葉の重なり(白系の明るい線) -->
  <path d="M 200 120 Q 170 155 158 215 Q 155 270 180 315" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <path d="M 200 120 Q 230 155 242 215 Q 245 270 220 315" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <path d="M 200 115 Q 200 180 200 325" fill="none" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>

  <!-- 細かい葉脈(白系) -->
  <path d="M 100 200 Q 145 195 195 200" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M 205 200 Q 255 195 300 200" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M 110 250 Q 150 248 195 250" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M 205 250 Q 250 248 290 250" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- ハイライト強化 -->
  <ellipse cx="160" cy="160" rx="48" ry="30" fill="#FFFFFF" opacity="0.45" transform="rotate(-25 160 160)"/>
  <ellipse cx="175" cy="140" rx="22" ry="13" fill="#FFFFFF" opacity="0.6" transform="rotate(-25 175 140)"/>

  <ellipse cx="200" cy="350" rx="115" ry="10" fill="#3D2817" opacity="0.1"/>
</svg>
