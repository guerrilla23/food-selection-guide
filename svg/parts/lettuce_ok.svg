<svg xmlns="http://www.w3.org/2000/svg" viewBox="-170 -165 340 330" font-family="Noto Sans CJK JP, sans-serif">
<defs>
      <radialGradient id="wcBodyLettuce" cx="35%" cy="25%">
        <stop offset="0%" stop-color="#F2FAD8" stop-opacity="0.95"/>
        <stop offset="50%" stop-color="#BCDB7A" stop-opacity="0.85"/>
        <stop offset="100%" stop-color="#7AAB3D" stop-opacity="0.7"/>
      </radialGradient>
      <radialGradient id="wcLeafLettuce" cx="50%" cy="40%">
        <stop offset="0%" stop-color="#C8E18A" stop-opacity="0.9"/>
        <stop offset="100%" stop-color="#5D8F3D" stop-opacity="0.7"/>
      </radialGradient>
      <filter id="wcRoughLettuce" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.05" numOctaves="3" seed="11"/>
        <feDisplacementMap in="SourceGraphic" scale="5"/>
      </filter>
      <filter id="wcBlurLettuce">
        <feGaussianBlur stdDeviation="1.5"/>
      </filter>
    </defs>

    <!-- Watercolor bleeds -->
    <g filter="url(#wcBlurLettuce)" opacity="0.4">
      <ellipse cx="0" cy="0" rx="160" ry="155" fill="#BCDB7A"/>
      <ellipse cx="-80" cy="-30" rx="55" ry="80" fill="#7AAB45"/>
      <ellipse cx="80" cy="-30" rx="55" ry="80" fill="#7AAB45"/>
    </g>

    <!-- 上部の葉(ふんわり広がる) -->
    <g filter="url(#wcRoughLettuce)" opacity="0.85">
      <path d="M 0 -90 Q -45 -75 -70 -45 Q -75 -85 -45 -110 Q 0 -130 45 -110 Q 75 -85 70 -45 Q 45 -75 0 -90 Z" fill="url(#wcLeafLettuce)"/>
    </g>

    <!-- 外葉(左、フリル状) -->
    <g filter="url(#wcRoughLettuce)" opacity="0.85">
      <path d="M -120 30 Q -150 0 -150 -40 Q -130 -85 -85 -90 Q -65 -50 -75 0 Q -85 50 -110 80 Q -135 75 -120 30 Z" fill="url(#wcLeafLettuce)"/>
    </g>

    <!-- 外葉(右、フリル状) -->
    <g filter="url(#wcRoughLettuce)" opacity="0.85">
      <path d="M 120 30 Q 150 0 150 -40 Q 130 -85 85 -90 Q 65 -50 75 0 Q 85 50 110 80 Q 135 75 120 30 Z" fill="url(#wcLeafLettuce)"/>
    </g>

    <!-- 本体球(中心、ふんわり) -->
    <g filter="url(#wcRoughLettuce)">
      <ellipse cx="0" cy="5" rx="105" ry="100" fill="url(#wcBodyLettuce)"/>
    </g>

    <!-- Strong ink lines -->
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
      <!-- 本体 -->
      <ellipse cx="0" cy="5" rx="105" ry="100"/>
      <!-- 上部の葉 -->
      <path d="M 0 -90 Q -45 -75 -70 -45 Q -75 -85 -45 -110 Q 0 -130 45 -110 Q 75 -85 70 -45 Q 45 -75 0 -90 Z"/>
      <!-- 上部の葉先のフリル波 -->
      <path d="M -55 -110 Q -45 -118 -35 -110 Q -25 -118 -15 -110 Q -5 -118 5 -110 Q 15 -118 25 -110 Q 35 -118 45 -110 Q 55 -118 60 -110" stroke-width="2" opacity="0.7"/>
      <!-- 外葉(左) -->
      <path d="M -120 30 Q -150 0 -150 -40 Q -130 -85 -85 -90 Q -65 -50 -75 0 Q -85 50 -110 80 Q -135 75 -120 30 Z"/>
      <path d="M -148 -50 Q -140 -60 -130 -50 Q -120 -60 -110 -50" stroke-width="2" opacity="0.7"/>
      <path d="M -120 80 Q -110 70 -100 80" stroke-width="2" opacity="0.7"/>
      <!-- 外葉(右) -->
      <path d="M 120 30 Q 150 0 150 -40 Q 130 -85 85 -90 Q 65 -50 75 0 Q 85 50 110 80 Q 135 75 120 30 Z"/>
      <path d="M 148 -50 Q 140 -60 130 -50 Q 120 -60 110 -50" stroke-width="2" opacity="0.7"/>
      <path d="M 120 80 Q 110 70 100 80" stroke-width="2" opacity="0.7"/>
      <!-- 重なり -->
      <path d="M 0 -85 Q -25 -55 -40 0 Q -45 55 -25 95" opacity="0.7"/>
      <path d="M 0 -85 Q 25 -55 40 0 Q 45 55 25 95" opacity="0.7"/>
    </g>

    <!-- 葉脈の白い光 -->
    <g stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.65">
      <path d="M 0 -85 Q -22 -55 -38 0 Q -42 55 -22 92"/>
      <path d="M 0 -85 Q 22 -55 38 0 Q 42 55 22 92"/>
    </g>
</svg>
