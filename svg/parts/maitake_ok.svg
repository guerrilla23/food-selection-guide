<svg xmlns="http://www.w3.org/2000/svg" viewBox="-160 -130 320 240" font-family="Noto Sans CJK JP, sans-serif">
<defs>
      <radialGradient id="wcCapMaitake" cx="50%" cy="40%">
        <stop offset="0%" stop-color="#A88858" stop-opacity="0.92"/>
        <stop offset="60%" stop-color="#7A6235" stop-opacity="0.88"/>
        <stop offset="100%" stop-color="#5A4520" stop-opacity="0.8"/>
      </radialGradient>
      <linearGradient id="wcStemMaitake" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#E8DCB8" stop-opacity="0.92"/>
        <stop offset="50%" stop-color="#FAF2D8" stop-opacity="0.95"/>
        <stop offset="100%" stop-color="#C8B888" stop-opacity="0.88"/>
      </linearGradient>
      <filter id="wcRoughMaitake" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.04" numOctaves="3" seed="25"/>
        <feDisplacementMap in="SourceGraphic" scale="3"/>
      </filter>
      <filter id="wcBlurMaitake">
        <feGaussianBlur stdDeviation="1.5"/>
      </filter>
    </defs>

    <!-- Watercolor bleeds -->
    <g filter="url(#wcBlurMaitake)" opacity="0.4">
      <ellipse cx="0" cy="0" rx="135" ry="105" fill="#A88858"/>
    </g>

    <!-- ====================
         エリンギ風の小さなキノコ4本が束になる構造
         株元で軸が集まり、傘が個別に見える
         ==================== -->

    <!-- 株元(軸が集まる白い部分) -->
    <g filter="url(#wcRoughMaitake)">
      <ellipse cx="0" cy="105" rx="55" ry="18" fill="url(#wcStemMaitake)"/>
    </g>

    <!-- ===== キノコ1: 左奥(後ろ、少し小さく) ===== -->
    <!-- 軸 -->
    <g filter="url(#wcRoughMaitake)">
      <path d="M -65 -10
               Q -68 35 -65 90
               Q -60 105 -45 105
               Q -32 100 -32 90
               Q -33 35 -33 -10 Z" fill="url(#wcStemMaitake)"/>
    </g>
    <!-- 傘 -->
    <g filter="url(#wcRoughMaitake)">
      <path d="M -85 -10
               Q -88 -45 -65 -60
               Q -45 -65 -28 -60
               Q -10 -45 -12 -10
               Q -20 -2 -32 -2
               Q -50 0 -65 -2
               Q -78 -2 -85 -10 Z" fill="url(#wcCapMaitake)"/>
    </g>

    <!-- ===== キノコ2: 中央左(前、最も大きい) ===== -->
    <!-- 軸 -->
    <g filter="url(#wcRoughMaitake)">
      <path d="M -25 -5
               Q -28 35 -25 95
               Q -20 110 -5 110
               Q 8 105 8 95
               Q 7 35 7 -5 Z" fill="url(#wcStemMaitake)"/>
    </g>
    <!-- 傘 -->
    <g filter="url(#wcRoughMaitake)">
      <path d="M -45 -5
               Q -48 -55 -25 -72
               Q 0 -78 18 -72
               Q 35 -55 32 -5
               Q 25 5 8 5
               Q -10 7 -25 5
               Q -38 5 -45 -5 Z" fill="url(#wcCapMaitake)"/>
    </g>

    <!-- ===== キノコ3: 中央右(前) ===== -->
    <!-- 軸 -->
    <g filter="url(#wcRoughMaitake)">
      <path d="M 18 0
               Q 15 40 18 100
               Q 23 115 38 110
               Q 52 105 50 95
               Q 50 40 50 0 Z" fill="url(#wcStemMaitake)"/>
    </g>
    <!-- 傘 -->
    <g filter="url(#wcRoughMaitake)">
      <path d="M 0 0
               Q -3 -50 18 -68
               Q 38 -73 60 -68
               Q 78 -50 75 0
               Q 65 8 50 8
               Q 30 10 18 8
               Q 5 8 0 0 Z" fill="url(#wcCapMaitake)"/>
    </g>

    <!-- ===== キノコ4: 右奥(後ろ、少し小さく) ===== -->
    <!-- 軸 -->
    <g filter="url(#wcRoughMaitake)">
      <path d="M 60 -5
               Q 58 35 60 90
               Q 65 100 78 100
               Q 90 95 90 88
               Q 90 35 90 -5 Z" fill="url(#wcStemMaitake)"/>
    </g>
    <!-- 傘 -->
    <g filter="url(#wcRoughMaitake)">
      <path d="M 45 -5
               Q 42 -45 62 -60
               Q 80 -65 95 -60
               Q 110 -45 108 -5
               Q 100 2 90 2
               Q 75 4 62 2
               Q 50 2 45 -5 Z" fill="url(#wcCapMaitake)"/>
    </g>

    <!-- Strong ink lines -->
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
      <!-- 株元 -->
      <ellipse cx="0" cy="105" rx="55" ry="18"/>

      <!-- キノコ1 -->
      <path d="M -65 -10 Q -68 35 -65 90 Q -60 105 -45 105 Q -32 100 -32 90 Q -33 35 -33 -10"/>
      <path d="M -85 -10 Q -88 -45 -65 -60 Q -45 -65 -28 -60 Q -10 -45 -12 -10 Q -20 -2 -32 -2 Q -50 0 -65 -2 Q -78 -2 -85 -10 Z"/>
      <path d="M -85 -10 Q -50 -5 -12 -10" opacity="0.6"/>

      <!-- キノコ2(中央左) -->
      <path d="M -25 -5 Q -28 35 -25 95 Q -20 110 -5 110 Q 8 105 8 95 Q 7 35 7 -5"/>
      <path d="M -45 -5 Q -48 -55 -25 -72 Q 0 -78 18 -72 Q 35 -55 32 -5 Q 25 5 8 5 Q -10 7 -25 5 Q -38 5 -45 -5 Z"/>
      <path d="M -45 -5 Q -10 0 32 -5" opacity="0.6"/>

      <!-- キノコ3(中央右) -->
      <path d="M 18 0 Q 15 40 18 100 Q 23 115 38 110 Q 52 105 50 95 Q 50 40 50 0"/>
      <path d="M 0 0 Q -3 -50 18 -68 Q 38 -73 60 -68 Q 78 -50 75 0 Q 65 8 50 8 Q 30 10 18 8 Q 5 8 0 0 Z"/>
      <path d="M 0 0 Q 35 5 75 0" opacity="0.6"/>

      <!-- キノコ4 -->
      <path d="M 60 -5 Q 58 35 60 90 Q 65 100 78 100 Q 90 95 90 88 Q 90 35 90 -5"/>
      <path d="M 45 -5 Q 42 -45 62 -60 Q 80 -65 95 -60 Q 110 -45 108 -5 Q 100 2 90 2 Q 75 4 62 2 Q 50 2 45 -5 Z"/>
      <path d="M 45 -5 Q 75 0 108 -5" opacity="0.6"/>

      <!-- 傘の表面のうねり線(各キノコ) -->
      <path d="M -75 -35 Q -50 -42 -22 -35" opacity="0.5" stroke-width="1.5"/>
      <path d="M -35 -50 Q 0 -58 25 -50" opacity="0.5" stroke-width="1.5"/>
      <path d="M 10 -45 Q 38 -55 65 -45" opacity="0.5" stroke-width="1.5"/>
      <path d="M 55 -35 Q 78 -42 100 -35" opacity="0.5" stroke-width="1.5"/>
    </g>

    <!-- 軸のハイライト(各キノコ) -->
    <ellipse cx="-50" cy="40" rx="3" ry="40" fill="#FFFFFF" opacity="0.5"/>
    <ellipse cx="-12" cy="50" rx="4" ry="45" fill="#FFFFFF" opacity="0.55"/>
    <ellipse cx="30" cy="50" rx="4" ry="45" fill="#FFFFFF" opacity="0.55"/>
    <ellipse cx="73" cy="40" rx="3" ry="40" fill="#FFFFFF" opacity="0.5"/>

    <!-- 影 -->
    <ellipse cx="0" cy="128" rx="55" ry="6" fill="#3D2817" opacity="0.12"/>
</svg>
