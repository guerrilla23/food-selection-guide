<svg xmlns="http://www.w3.org/2000/svg" viewBox="-140 -80 280 160" font-family="Noto Sans CJK JP, sans-serif">
<!-- 本体(くすんだ色) -->
    <path d="M -180 0 Q -175 -45 -120 -55 Q -50 -60 30 -55 Q 100 -50 130 -25 L 175 -50 L 168 0 L 175 50 L 130 25 Q 100 50 30 55 Q -50 60 -120 55 Q -175 45 -180 0 Z" fill="#9C9888"/>

    <!-- 茶色く変色したシミ -->
    <ellipse cx="-50" cy="-15" rx="14" ry="9" fill="#7A4A1F" opacity="0.5"/>
    <ellipse cx="0" cy="20" rx="16" ry="8" fill="#7A4A1F" opacity="0.5"/>
    <ellipse cx="60" cy="-20" rx="11" ry="7" fill="#7A4A1F" opacity="0.45"/>

    <!-- ぜいご(劣化、控えめ) -->
    <g stroke="#3D2817" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.55">
      <path d="M 30 0 Q 80 0 130 0"/>
      <path d="M 50 -3 L 55 -7 L 60 -3"/>
      <path d="M 90 -3 L 95 -7 L 100 -3"/>
    </g>

    <!-- 目(濁って白っぽい) -->
    <circle cx="-145" cy="-15" r="11" fill="#D8D0B8" stroke="#3D2817" stroke-width="2.5"/>
    <circle cx="-144" cy="-14" r="7" fill="#7A7060" opacity="0.7"/>

    <!-- 輪郭 -->
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M -180 0 Q -175 -45 -120 -55 Q -50 -60 30 -55 Q 100 -50 130 -25 L 175 -50 L 168 0 L 175 50 L 130 25 Q 100 50 30 55 Q -50 60 -120 55 Q -175 45 -180 0 Z"/>
      <path d="M 130 -25 L 175 -50" opacity="0.6"/>
      <path d="M 130 25 L 175 50" opacity="0.6"/>

      <!-- エラ(黒ずむ) -->
      <path d="M -100 -38 Q -100 0 -95 38" stroke-width="2.5"/>
      <path d="M -103 -25 Q -103 0 -98 25" stroke="#5A3215" stroke-width="1.5" opacity="0.6"/>

      <!-- 背びれ -->
      <path d="M -65 -55 L -55 -75 L -40 -68 L -35 -58 L -40 -52" stroke-width="2.5"/>
      <path d="M 0 -55 Q 15 -65 30 -55" stroke-width="2"/>
      <!-- 腹びれ -->
      <path d="M -55 55 Q -45 68 -35 55" stroke-width="2.5"/>
    </g>

    <ellipse cx="-30" cy="80" rx="155" ry="5" fill="#3D2817" opacity="0.1"/>
</svg>
