<svg xmlns="http://www.w3.org/2000/svg" viewBox="-150 -250 300 460" font-family="Noto Sans CJK JP, sans-serif">
<!-- Watercolor defs (food-specific IDs to avoid future conflicts) -->
    <defs>
      <radialGradient id="wcBodyDaikon" cx="35%" cy="25%">
        <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
        <stop offset="40%" stop-color="#F5F2EA" stop-opacity="0.85"/>
        <stop offset="80%" stop-color="#C8C0AC" stop-opacity="0.7"/>
        <stop offset="100%" stop-color="#A89E80" stop-opacity="0.5"/>
      </radialGradient>
      <radialGradient id="wcLeafDaikon" cx="35%" cy="20%">
        <stop offset="0%" stop-color="#9BCB7A" stop-opacity="0.9"/>
        <stop offset="60%" stop-color="#5D8F3D" stop-opacity="0.7"/>
        <stop offset="100%" stop-color="#2C5F2D" stop-opacity="0.5"/>
      </radialGradient>
      <filter id="wcRoughDaikon" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.04" numOctaves="3" seed="5"/>
        <feDisplacementMap in="SourceGraphic" scale="4"/>
      </filter>
      <filter id="wcBlurDaikon">
        <feGaussianBlur stdDeviation="1.5"/>
      </filter>
    </defs>

    <!-- Watercolor bleeds (背景、ぼかし) -->
    <g filter="url(#wcBlurDaikon)" opacity="0.4">
      <ellipse cx="0" cy="-180" rx="80" ry="40" fill="#9BCB7A"/>
      <ellipse cx="-15" cy="-20" rx="80" ry="100" fill="#E8DCC0"/>
      <ellipse cx="20" cy="120" rx="65" ry="50" fill="#D5C8A8"/>
    </g>

    <!-- Watercolor leaves -->
    <g filter="url(#wcRoughDaikon)" opacity="0.8">
      <path d="M -50 -135 Q -65 -190 -38 -210 Q -22 -185 -25 -148" fill="url(#wcLeafDaikon)"/>
      <path d="M -18 -140 Q -12 -205 8 -218 Q 22 -200 16 -150" fill="url(#wcLeafDaikon)"/>
      <path d="M 22 -140 Q 35 -200 50 -190 Q 55 -175 45 -145" fill="url(#wcLeafDaikon)"/>
    </g>

    <!-- Watercolor body + tip -->
    <g filter="url(#wcRoughDaikon)">
      <path d="M -50 -130 L 50 -130 Q 55 -130 55 -120 L 50 100 Q 45 130 0 140 Q -45 130 -50 100 L -55 -120 Q -55 -130 -50 -130 Z" fill="url(#wcBodyDaikon)"/>
      <path d="M -50 100 Q 0 150 50 100 Q 25 175 0 180 Q -25 175 -50 100 Z" fill="url(#wcBodyDaikon)" opacity="0.95"/>
    </g>

    <!-- Strong ink lines (Pattern A: 線はっきり・絵本感) -->
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
      <path d="M -52 -128 Q -54 -132 -50 -130 L 50 -132 Q 56 -125 55 -118 L 50 102 Q 47 130 0 140 Q -45 132 -50 100 L -55 -118 Q -56 -130 -50 -130"/>
      <path d="M -48 102 Q 0 150 50 100 Q 25 174 2 180 Q -22 174 -48 102"/>
      <path d="M -50 -135 Q -65 -188 -38 -210"/>
      <path d="M -38 -210 Q -22 -185 -25 -148"/>
      <path d="M -18 -140 Q -12 -204 7 -217"/>
      <path d="M 7 -217 Q 22 -200 16 -150"/>
      <path d="M 22 -140 Q 35 -200 50 -190"/>
      <path d="M 50 -190 Q 55 -175 45 -145"/>
      <path d="M -36 -195 L -30 -150" opacity="0.7"/>
      <path d="M 5 -205 L 2 -150" opacity="0.7"/>
      <path d="M 38 -190 L 38 -148" opacity="0.7"/>
    </g>
</svg>
