<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="Noto Sans CJK JP, sans-serif">
  <defs>
    <filter id="shadowDaikon" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
  </defs>
  
  <rect width="1080" height="600" fill="#FFFFFF" rx="20"/>
  
  <!-- Header -->
  <text x="60" y="60" font-size="44" font-weight="900" fill="#7BA05B">大根</text>
  <line x1="60" y1="75" x2="200" y2="75" stroke="#7BA05B" stroke-width="4"/>
  <text x="220" y="68" font-size="22" fill="#666">旬:11月〜2月</text>
  
  <!-- Divider -->
  <line x1="540" y1="100" x2="540" y2="540" stroke="#DDD" stroke-width="2" stroke-dasharray="6,6"/>
  
  <!-- OK side (Pattern A: watercolor with strong ink lines) -->
  <g transform="translate(280, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#2C5F2D"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">○</text>

    <!-- Watercolor defs (food-specific IDs to avoid future conflicts) -->
    <defs>
      <radialGradient id="wcBodyDaikon" cx="35%" cy="25%">
        <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
        <stop offset="40%" stop-color="#F5F2EA" stop-opacity="0.85"/>
        <stop offset="80%" stop-color="#C8C0AC" stop-opacity="0.7"/>
        <stop offset="100%" stop-color="#A89E80" stop-opacity="0.5"/>
      </radialGradient>
      <radialGradient id="wcLeafDaikon" cx="35%" cy="20%">
        <stop offset="0%" stop-color="#9BCB7A" stop-opacity="0.9"/>
        <stop offset="60%" stop-color="#5D8F3D" stop-opacity="0.7"/>
        <stop offset="100%" stop-color="#2C5F2D" stop-opacity="0.5"/>
      </radialGradient>
      <filter id="wcRoughDaikon" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.04" numOctaves="3" seed="5"/>
        <feDisplacementMap in="SourceGraphic" scale="4"/>
      </filter>
      <filter id="wcBlurDaikon">
        <feGaussianBlur stdDeviation="1.5"/>
      </filter>
    </defs>

    <!-- Watercolor bleeds (背景、ぼかし) -->
    <g filter="url(#wcBlurDaikon)" opacity="0.4">
      <ellipse cx="0" cy="-180" rx="80" ry="40" fill="#9BCB7A"/>
      <ellipse cx="-15" cy="-20" rx="80" ry="100" fill="#E8DCC0"/>
      <ellipse cx="20" cy="120" rx="65" ry="50" fill="#D5C8A8"/>
    </g>

    <!-- Watercolor leaves -->
    <g filter="url(#wcRoughDaikon)" opacity="0.8">
      <path d="M -50 -135 Q -65 -190 -38 -210 Q -22 -185 -25 -148" fill="url(#wcLeafDaikon)"/>
      <path d="M -18 -140 Q -12 -205 8 -218 Q 22 -200 16 -150" fill="url(#wcLeafDaikon)"/>
      <path d="M 22 -140 Q 35 -200 50 -190 Q 55 -175 45 -145" fill="url(#wcLeafDaikon)"/>
    </g>

    <!-- Watercolor body + tip -->
    <g filter="url(#wcRoughDaikon)">
      <path d="M -50 -130 L 50 -130 Q 55 -130 55 -120 L 50 100 Q 45 130 0 140 Q -45 130 -50 100 L -55 -120 Q -55 -130 -50 -130 Z" fill="url(#wcBodyDaikon)"/>
      <path d="M -50 100 Q 0 150 50 100 Q 25 175 0 180 Q -25 175 -50 100 Z" fill="url(#wcBodyDaikon)" opacity="0.95"/>
    </g>

    <!-- Strong ink lines (Pattern A: 線はっきり・絵本感) -->
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
      <path d="M -52 -128 Q -54 -132 -50 -130 L 50 -132 Q 56 -125 55 -118 L 50 102 Q 47 130 0 140 Q -45 132 -50 100 L -55 -118 Q -56 -130 -50 -130"/>
      <path d="M -48 102 Q 0 150 50 100 Q 25 174 2 180 Q -22 174 -48 102"/>
      <path d="M -50 -135 Q -65 -188 -38 -210"/>
      <path d="M -38 -210 Q -22 -185 -25 -148"/>
      <path d="M -18 -140 Q -12 -204 7 -217"/>
      <path d="M 7 -217 Q 22 -200 16 -150"/>
      <path d="M 22 -140 Q 35 -200 50 -190"/>
      <path d="M 50 -190 Q 55 -175 45 -145"/>
      <path d="M -36 -195 L -30 -150" opacity="0.7"/>
      <path d="M 5 -205 L 2 -150" opacity="0.7"/>
      <path d="M 38 -190 L 38 -148" opacity="0.7"/>
    </g>
  </g>
  
  <!-- NG side -->
  <g transform="translate(800, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#C62828"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">×</text>
    
    <!-- Wilted yellow leaves -->
    <g transform="translate(-100, -150)">
      <path d="M 0 0 Q -10 -40 -5 -70 Q 0 -45 5 -45 Q 10 -70 15 -45 Q 20 -20 10 0 Z" fill="#B8A040"/>
      <path d="M 30 0 Q 30 -30 40 -60 Q 50 -40 55 -40 Q 60 -65 60 -30 Q 55 -10 40 5 Z" fill="#9F8730"/>
      <path d="M 60 0 Q 65 -25 75 -55 Q 80 -35 85 -35 Q 90 -60 90 -20 Q 85 -5 75 5 Z" fill="#B8A040"/>
    </g>
    
    <!-- Withered root (greyish, wrinkled) -->
    <path d="M -50 -150 L 50 -150 Q 60 -150 60 -130 L 55 100 Q 50 130 0 140 Q -50 130 -55 100 L -60 -130 Q -60 -150 -50 -150 Z" fill="#D5D0BC"/>
    <ellipse cx="0" cy="-150" rx="50" ry="8" fill="#A89E7A"/>
    <!-- Wrinkles -->
    <path d="M -40 -50 Q -20 -45 0 -50 Q 20 -45 40 -50" stroke="#8B7355" stroke-width="1.5" fill="none"/>
    <path d="M -40 0 Q -20 5 0 0 Q 20 5 40 0" stroke="#8B7355" stroke-width="1.5" fill="none"/>
    <path d="M -40 50 Q -20 55 0 50 Q 20 55 40 50" stroke="#8B7355" stroke-width="1.5" fill="none"/>
    <!-- Brown spots -->
    <ellipse cx="-15" cy="-80" rx="5" ry="3" fill="#5D4E37" opacity="0.5"/>
    <ellipse cx="20" cy="20" rx="6" ry="4" fill="#5D4E37" opacity="0.5"/>
    <!-- Zigzag hair roots -->
    <line x1="-30" y1="-50" x2="-38" y2="-46" stroke="#666" stroke-width="1.5"/>
    <line x1="-30" y1="-20" x2="-25" y2="-14" stroke="#666" stroke-width="1.5"/>
    <line x1="-30" y1="10" x2="-40" y2="16" stroke="#666" stroke-width="1.5"/>
    <line x1="-30" y1="40" x2="-22" y2="48" stroke="#666" stroke-width="1.5"/>
    <line x1="-30" y1="70" x2="-42" y2="76" stroke="#666" stroke-width="1.5"/>
    <!-- Tip -->
    <path d="M -55 100 Q 0 150 55 100 Q 30 175 0 180 Q -30 175 -55 100 Z" fill="#C5BFAB"/>
  </g>
  
  <!-- Comparison labels -->
  <g font-size="20" fill="#333">
    <rect x="60" y="495" width="460" height="80" rx="8" fill="#E8F5E9"/>
    <text x="80" y="520" font-weight="bold" fill="#2C5F2D">● 葉が鮮やかな緑、白い部分にハリ</text>
    <text x="80" y="545" font-weight="bold" fill="#2C5F2D">● ずっしり重く、ひげ根の穴が一直線</text>
    <text x="80" y="568" fill="#666" font-size="17">部位別:上=甘い・中=煮物・下=辛い</text>
    
    <rect x="560" y="495" width="460" height="80" rx="8" fill="#FFEBEE"/>
    <text x="580" y="520" font-weight="bold" fill="#C62828">× 葉が黄色く萎れている</text>
    <text x="580" y="545" font-weight="bold" fill="#C62828">× シワ、軽い、ひげ根がジグザグ</text>
    <text x="580" y="568" fill="#666" font-size="17">表面スポンジ状=水分抜けで美味しくない</text>
  </g>
</svg>
