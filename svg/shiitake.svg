<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="Noto Sans CJK JP, sans-serif">
  <rect width="1080" height="600" fill="#FFFFFF" rx="20"/>

  <!-- Header -->
  <text x="60" y="60" font-size="44" font-weight="900" fill="#7E5A2A">椎茸</text>
  <line x1="60" y1="75" x2="120" y2="75" stroke="#7E5A2A" stroke-width="4"/>
  <text x="140" y="68" font-size="22" fill="#666">旬:9〜11月・3〜5月</text>

  <line x1="540" y1="100" x2="540" y2="540" stroke="#DDD" stroke-width="2" stroke-dasharray="6,6"/>

  <!-- OK side (watercolor Pattern A) -->
  <g transform="translate(280, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#2C5F2D"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">○</text>
    <defs>
      <radialGradient id="wcBodyShiitake" cx="35%" cy="25%"><stop offset="0%" stop-color="#D8B89A" stop-opacity="0.95"/><stop offset="40%" stop-color="#A07848" stop-opacity="0.9"/><stop offset="80%" stop-color="#7E5A2A" stop-opacity="0.85"/><stop offset="100%" stop-color="#4F3A1F" stop-opacity="0.65"/></radialGradient>
      <radialGradient id="wcLeafShiitake" cx="50%" cy="20%"><stop offset="0%" stop-color="#9BCB7A" stop-opacity="0.9"/><stop offset="60%" stop-color="#5D8F3D" stop-opacity="0.7"/><stop offset="100%" stop-color="#2C5F2D" stop-opacity="0.5"/></radialGradient>
      <filter id="wcRoughShiitake" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.04" numOctaves="3" seed="83"/>
        <feDisplacementMap in="SourceGraphic" scale="4"/>
      </filter>
      <filter id="wcBlurShiitake"><feGaussianBlur stdDeviation="1.5"/></filter>
    </defs>
    <g filter="url(#wcBlurShiitake)" opacity="0.4"><ellipse cx="0" cy="-30" rx="100" ry="50" fill="#A07848"/></g>
    
    <g filter="url(#wcRoughShiitake)"><path d="M -80 -40 Q -85 -90 0 -100 Q 85 -90 80 -40 Q 70 -10 0 -10 Q -70 -10 -80 -40 Z" fill="url(#wcBodyShiitake)"/><path d="M -20 -10 Q -22 50 -15 80 L 15 80 Q 22 50 20 -10 Z" fill="url(#wcBodyShiitake)"/></g>
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"><path d="M -80 -40 Q -85 -90 0 -100 Q 85 -90 80 -40 Q 70 -10 0 -10 Q -70 -10 -80 -40 Z"/><path d="M -20 -10 Q -22 50 -15 80 L 15 80 Q 22 50 20 -10"/><path d="M -45 -75 L -30 -40" opacity="0.65" stroke-width="1.5"/><path d="M -15 -90 L -10 -40" opacity="0.65" stroke-width="1.5"/><path d="M 15 -90 L 10 -40" opacity="0.65" stroke-width="1.5"/><path d="M 45 -75 L 30 -40" opacity="0.65" stroke-width="1.5"/><path d="M -65 -15 Q 0 -5 65 -15" opacity="0.4" stroke-width="1.3"/></g>
  </g>

  <!-- NG side (flat) -->
  <g transform="translate(800, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#C62828"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">×</text>
    <path d="M -80 -40 Q -85 -90 0 -100 Q 85 -90 80 -40 Q 70 -10 0 -10 Q -70 -10 -80 -40 Z" fill="#988050"/><path d="M -20 -10 Q -22 50 -15 80 L 15 80 Q 22 50 20 -10 Z" fill="#988050"/><ellipse cx="-30" cy="-60" rx="18" ry="14" fill="#3D2817" opacity="0.55"/><ellipse cx="20" cy="-50" rx="12" ry="9" fill="#3D2817" opacity="0.5"/><path d="M -20 30 Q 0 40 20 30" stroke="#5D4E37" stroke-width="1.5" fill="none" opacity="0.6"/>
  </g>

  <!-- Comparison labels -->
  <g font-size="20" fill="#333">
    <rect x="60" y="495" width="460" height="80" rx="8" fill="#E8F5E9"/>
    <text x="80" y="520" font-weight="bold" fill="#2C5F2D">● カサが内巻き、肉厚</text>
    <text x="80" y="545" font-weight="bold" fill="#2C5F2D">● ヒダが白く整う</text>
    <text x="80" y="568" fill="#666" font-size="17">軸が太く硬い=旨味豊富</text>

    <rect x="560" y="495" width="460" height="80" rx="8" fill="#FFEBEE"/>
    <text x="580" y="520" font-weight="bold" fill="#C62828">× カサが開ききる(花咲き)</text>
    <text x="580" y="545" font-weight="bold" fill="#C62828">× ヒダが黒ずむ・湿る</text>
    <text x="580" y="568" fill="#666" font-size="17">カサ裏が茶=傷み(白が新鮮)</text>
  </g>
</svg>
