<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="Noto Sans CJK JP, sans-serif">
  <rect width="1080" height="600" fill="#FFFFFF" rx="20"/>

  <!-- Header -->
  <text x="60" y="60" font-size="44" font-weight="900" fill="#A04030">牛肉</text>
  <line x1="60" y1="75" x2="120" y2="75" stroke="#A04030" stroke-width="4"/>
  <text x="140" y="68" font-size="22" fill="#666">旬:通年</text>

  <line x1="540" y1="100" x2="540" y2="540" stroke="#DDD" stroke-width="2" stroke-dasharray="6,6"/>

  <!-- OK side (watercolor Pattern A) -->
  <g transform="translate(280, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#2C5F2D"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">○</text>
    <defs>
      <radialGradient id="wcBodyBeef" cx="35%" cy="25%"><stop offset="0%" stop-color="#F8B8A8" stop-opacity="0.95"/><stop offset="40%" stop-color="#D87060" stop-opacity="0.9"/><stop offset="80%" stop-color="#A03020" stop-opacity="0.85"/><stop offset="100%" stop-color="#601810" stop-opacity="0.65"/></radialGradient>
      <radialGradient id="wcLeafBeef" cx="50%" cy="20%"><stop offset="0%" stop-color="#9BCB7A" stop-opacity="0.9"/><stop offset="60%" stop-color="#5D8F3D" stop-opacity="0.7"/><stop offset="100%" stop-color="#2C5F2D" stop-opacity="0.5"/></radialGradient>
      <filter id="wcRoughBeef" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.04" numOctaves="3" seed="173"/>
        <feDisplacementMap in="SourceGraphic" scale="4"/>
      </filter>
      <filter id="wcBlurBeef"><feGaussianBlur stdDeviation="1.5"/></filter>
    </defs>
    <g filter="url(#wcBlurBeef)" opacity="0.4"><ellipse cx="0" cy="0" rx="110" ry="70" fill="#D87060"/></g>
    
    <g filter="url(#wcRoughBeef)"><path d="M -90 -45 Q -100 0 -90 50 Q 0 75 90 50 Q 100 0 90 -45 Q 0 -65 -90 -45 Z" fill="url(#wcBodyBeef)"/></g>
    
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"><path d="M -90 -45 Q -100 0 -90 50 Q 0 75 90 50 Q 100 0 90 -45 Q 0 -65 -90 -45 Z"/><path d="M -75 -30 Q 0 -25 75 -30" opacity="0.65" stroke-width="1.5"/><path d="M -78 -5 Q 0 0 78 -5" opacity="0.65" stroke-width="1.5"/><path d="M -72 20 Q 0 25 72 20" opacity="0.65" stroke-width="1.5"/><path d="M -65 45 Q 0 50 65 45" opacity="0.65" stroke-width="1.5"/><path d="M -55 -18 Q -25 -12 5 -22" opacity="0.75" stroke-width="2.2"/><path d="M -10 -3 Q 20 5 50 -5" opacity="0.75" stroke-width="2.2"/><path d="M 25 18 Q 50 22 70 12" opacity="0.75" stroke-width="2.2"/><path d="M -45 32 Q -15 38 15 30" opacity="0.75" stroke-width="2.2"/><path d="M 30 45 Q 50 50 65 42" opacity="0.7" stroke-width="2"/></g>
  </g>

  <!-- NG side (flat) -->
  <g transform="translate(800, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#C62828"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">×</text>
    <path d="M -90 -45 Q -100 0 -90 50 Q 0 75 90 50 Q 100 0 90 -45 Q 0 -65 -90 -45 Z" fill="#683838"/><ellipse cx="-25" cy="0" rx="30" ry="22" fill="#3D2817" opacity="0.55"/><ellipse cx="30" cy="20" rx="18" ry="14" fill="#3D2817" opacity="0.45"/><ellipse cx="0" cy="70" rx="55" ry="8" fill="#601810" opacity="0.6"/>
  </g>

  <!-- Comparison labels -->
  <g font-size="20" fill="#333">
    <rect x="60" y="495" width="460" height="80" rx="8" fill="#E8F5E9"/>
    <text x="80" y="520" font-weight="bold" fill="#2C5F2D">● 色が鮮やかな赤、ツヤあり</text>
    <text x="80" y="545" font-weight="bold" fill="#2C5F2D">● 脂が白く、霜降りが綺麗</text>
    <text x="80" y="568" fill="#666" font-size="17">弾力あり、繊維が均一</text>

    <rect x="560" y="495" width="460" height="80" rx="8" fill="#FFEBEE"/>
    <text x="580" y="520" font-weight="bold" fill="#C62828">× 色がどす黒い赤、グレー</text>
    <text x="580" y="545" font-weight="bold" fill="#C62828">× 脂が黄ばむ、ベタつく</text>
    <text x="580" y="568" fill="#666" font-size="17">空気に長く触れた=酸化(切る前なら鮮)</text>
  </g>
</svg>
