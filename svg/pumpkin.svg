<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="Noto Sans CJK JP, sans-serif">
  <rect width="1080" height="600" fill="#FFFFFF" rx="20"/>

  <!-- Header -->
  <text x="60" y="60" font-size="44" font-weight="900" fill="#2C5F2D">かぼちゃ</text>
  <line x1="60" y1="75" x2="180" y2="75" stroke="#2C5F2D" stroke-width="4"/>
  <text x="200" y="68" font-size="22" fill="#666">旬:7〜10月</text>

  <line x1="540" y1="100" x2="540" y2="540" stroke="#DDD" stroke-width="2" stroke-dasharray="6,6"/>

  <!-- OK side: cross-section showing flesh + seeds -->
  <g transform="translate(280, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#2C5F2D"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">○</text>
    <defs>
      <radialGradient id="wcFleshPumpkin" cx="50%" cy="50%">
        <stop offset="0%" stop-color="#FFD095" stop-opacity="0.95"/>
        <stop offset="50%" stop-color="#F09838" stop-opacity="0.92"/>
        <stop offset="100%" stop-color="#C66818" stop-opacity="0.88"/>
      </radialGradient>
      <radialGradient id="wcSkinPumpkin" cx="50%" cy="20%">
        <stop offset="0%" stop-color="#5D8F3D" stop-opacity="0.95"/>
        <stop offset="100%" stop-color="#1A3F1A" stop-opacity="0.95"/>
      </radialGradient>
      <filter id="wcRoughPumpkin" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.05" numOctaves="3" seed="79"/>
        <feDisplacementMap in="SourceGraphic" scale="3"/>
      </filter>
      <filter id="wcBlurPumpkin"><feGaussianBlur stdDeviation="1.5"/></filter>
    </defs>

    <g filter="url(#wcBlurPumpkin)" opacity="0.35"><ellipse cx="0" cy="0" rx="120" ry="100" fill="#E89540"/></g>

    <g filter="url(#wcRoughPumpkin)">
      <!-- Outer skin ring (dark green) -->
      <path d="M -110 0 Q -115 80 0 95 Q 115 80 110 0 Q 100 -75 0 -85 Q -100 -75 -110 0 Z M -98 0 Q -103 68 0 82 Q 103 68 98 0 Q 88 -65 0 -73 Q -88 -65 -98 0 Z" fill="url(#wcSkinPumpkin)" fill-rule="evenodd"/>
      <!-- Inner skin band (lighter green transition) -->
      <path d="M -98 0 Q -103 68 0 82 Q 103 68 98 0 Q 88 -65 0 -73 Q -88 -65 -98 0 Z M -88 0 Q -93 60 0 73 Q 93 60 88 0 Q 78 -58 0 -65 Q -78 -58 -88 0 Z" fill="#7AAB46" fill-rule="evenodd" opacity="0.85"/>
      <!-- Flesh (orange) -->
      <path d="M -88 0 Q -93 60 0 73 Q 93 60 88 0 Q 78 -58 0 -65 Q -78 -58 -88 0 Z" fill="url(#wcFleshPumpkin)"/>
    </g>

    <!-- Seed cavity (slightly lighter oval) -->
    <ellipse cx="0" cy="-3" rx="50" ry="34" fill="#FFF0CC" opacity="0.6"/>
    <!-- Stringy fibers around cavity -->
    <g stroke="#D08840" stroke-width="0.8" fill="none" opacity="0.5">
      <path d="M -48 -20 Q -32 -10 -18 -5"/>
      <path d="M 48 -20 Q 32 -10 18 -5"/>
      <path d="M -45 20 Q -28 12 -12 8"/>
      <path d="M 45 20 Q 28 12 12 8"/>
      <path d="M -35 -28 Q -20 -22 -8 -28"/>
      <path d="M 35 -28 Q 20 -22 8 -28"/>
    </g>
    <!-- Seeds (8 almond shapes scattered in cavity) -->
    <g fill="#FFF8E0" stroke="#3D2817" stroke-width="1.3">
      <ellipse cx="-28" cy="-12" rx="6.5" ry="10" transform="rotate(-25 -28 -12)"/>
      <ellipse cx="-10" cy="-22" rx="6.5" ry="10" transform="rotate(8 -10 -22)"/>
      <ellipse cx="14" cy="-20" rx="6.5" ry="10" transform="rotate(-18 14 -20)"/>
      <ellipse cx="30" cy="-6" rx="6.5" ry="10" transform="rotate(22 30 -6)"/>
      <ellipse cx="-32" cy="8" rx="6.5" ry="10" transform="rotate(15 -32 8)"/>
      <ellipse cx="-12" cy="14" rx="6.5" ry="10" transform="rotate(-8 -12 14)"/>
      <ellipse cx="10" cy="16" rx="6.5" ry="10" transform="rotate(20 10 16)"/>
      <ellipse cx="28" cy="12" rx="6.5" ry="10" transform="rotate(-22 28 12)"/>
    </g>

    <!-- Outer outline + skin ridges -->
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
      <path d="M -110 0 Q -115 80 0 95 Q 115 80 110 0 Q 100 -75 0 -85 Q -100 -75 -110 0 Z"/>
      <path d="M -98 0 Q -103 68 0 82 Q 103 68 98 0 Q 88 -65 0 -73 Q -88 -65 -98 0 Z" stroke-width="1.5" opacity="0.7"/>
    </g>
    <!-- Stem (visible cross-section nub on top) -->
    <path d="M -10 -85 L -12 -110 L 12 -108 L 10 -85 Z" fill="#5D8F3D" stroke="#3D2817" stroke-width="2.5" stroke-linejoin="round"/>
  </g>

  <!-- NG side: cross-section gone bad -->
  <g transform="translate(800, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#C62828"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">×</text>
    <!-- Skin (faded green) -->
    <path d="M -110 0 Q -115 80 0 95 Q 115 80 110 0 Q 100 -75 0 -85 Q -100 -75 -110 0 Z M -98 0 Q -103 68 0 82 Q 103 68 98 0 Q 88 -65 0 -73 Q -88 -65 -98 0 Z" fill="#5A7048" fill-rule="evenodd"/>
    <!-- Flesh (pale, watery) -->
    <path d="M -98 0 Q -103 68 0 82 Q 103 68 98 0 Q 88 -65 0 -73 Q -88 -65 -98 0 Z" fill="#F2C895"/>
    <!-- Empty/wet cavity (no plump seeds) -->
    <ellipse cx="0" cy="-3" rx="58" ry="40" fill="#D8B080" opacity="0.7"/>
    <!-- A few shriveled/dark seeds -->
    <g fill="#A88860" stroke="#5D4520" stroke-width="0.8" opacity="0.85">
      <ellipse cx="-20" cy="-8" rx="5" ry="7" transform="rotate(-15 -20 -8)"/>
      <ellipse cx="22" cy="6" rx="5" ry="7" transform="rotate(20 22 6)"/>
      <ellipse cx="-12" cy="18" rx="5" ry="7" transform="rotate(-5 -12 18)"/>
    </g>
    <!-- Mold patches -->
    <ellipse cx="-50" cy="40" rx="14" ry="9" fill="#3D5530" opacity="0.55"/>
    <ellipse cx="40" cy="-30" rx="9" ry="6" fill="#3D5530" opacity="0.5"/>
    <ellipse cx="55" cy="40" rx="8" ry="5" fill="#5A4030" opacity="0.5"/>
    <!-- Limp stem -->
    <path d="M -8 -85 L -8 -100" stroke="#5D4530" stroke-width="2.5" fill="none"/>
    <!-- Weak outline -->
    <path d="M -110 0 Q -115 80 0 95 Q 115 80 110 0 Q 100 -75 0 -85 Q -100 -75 -110 0 Z" stroke="#3D2817" stroke-width="2.5" fill="none" opacity="0.7"/>
  </g>

  <!-- Comparison labels -->
  <g font-size="20" fill="#333">
    <rect x="60" y="495" width="460" height="80" rx="8" fill="#E8F5E9"/>
    <text x="80" y="520" font-weight="bold" fill="#2C5F2D">● 果肉が濃いオレンジ・厚い</text>
    <text x="80" y="545" font-weight="bold" fill="#2C5F2D">● 種が大きく密に詰まる</text>
    <text x="80" y="568" fill="#666" font-size="17">皮が硬く凹凸/ヘタは太くコルク化</text>

    <rect x="560" y="495" width="460" height="80" rx="8" fill="#FFEBEE"/>
    <text x="580" y="520" font-weight="bold" fill="#C62828">× 果肉が薄黄・水っぽい</text>
    <text x="580" y="545" font-weight="bold" fill="#C62828">× 種がスカスカ・空洞が大きい</text>
    <text x="580" y="568" fill="#666" font-size="17">ヘタが青く湿り/皮が柔らかい</text>
  </g>
</svg>
