<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="Noto Sans CJK JP, sans-serif">
  <rect width="1080" height="600" fill="#FFFFFF" rx="20"/>

  <!-- Header -->
  <text x="60" y="60" font-size="44" font-weight="900" fill="#2C5F2D">かぼちゃ</text>
  <line x1="60" y1="75" x2="180" y2="75" stroke="#2C5F2D" stroke-width="4"/>
  <text x="200" y="68" font-size="22" fill="#666">旬:7〜10月</text>

  <line x1="540" y1="100" x2="540" y2="540" stroke="#DDD" stroke-width="2" stroke-dasharray="6,6"/>

  <!-- OK side (watercolor Pattern A) -->
  <g transform="translate(280, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#2C5F2D"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">○</text>
    <defs>
      <radialGradient id="wcBodyPumpkin" cx="35%" cy="25%"><stop offset="0%" stop-color="#7BAB46" stop-opacity="0.95"/><stop offset="40%" stop-color="#4A7C2E" stop-opacity="0.9"/><stop offset="80%" stop-color="#2C5F2D" stop-opacity="0.85"/><stop offset="100%" stop-color="#1A3F1A" stop-opacity="0.7"/></radialGradient>
      <radialGradient id="wcLeafPumpkin" cx="50%" cy="20%"><stop offset="0%" stop-color="#9BCB7A" stop-opacity="0.9"/><stop offset="60%" stop-color="#5D8F3D" stop-opacity="0.7"/><stop offset="100%" stop-color="#2C5F2D" stop-opacity="0.5"/></radialGradient>
      <filter id="wcRoughPumpkin" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.04" numOctaves="3" seed="79"/>
        <feDisplacementMap in="SourceGraphic" scale="4"/>
      </filter>
      <filter id="wcBlurPumpkin"><feGaussianBlur stdDeviation="1.5"/></filter>
    </defs>
    <g filter="url(#wcBlurPumpkin)" opacity="0.4"><ellipse cx="0" cy="0" rx="120" ry="95" fill="#5D8F3D"/></g>
    
    <g filter="url(#wcRoughPumpkin)"><path d="M -110 0 Q -115 70 0 95 Q 115 70 110 0 Q 100 -75 0 -85 Q -100 -75 -110 0 Z" fill="url(#wcBodyPumpkin)"/></g>
    
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"><path d="M -110 0 Q -115 70 0 95 Q 115 70 110 0 Q 100 -75 0 -85 Q -100 -75 -110 0 Z"/><path d="M -8 -85 L -10 -120 L 10 -118 L 8 -85" opacity="0.85" stroke-width="2.5"/><path d="M -90 -50 Q -85 30 -85 75" opacity="0.65" stroke-width="1.6"/><path d="M -55 -75 Q -50 30 -50 90" opacity="0.65" stroke-width="1.6"/><path d="M -20 -85 Q -15 30 -18 95" opacity="0.65" stroke-width="1.6"/><path d="M 20 -85 Q 15 30 18 95" opacity="0.65" stroke-width="1.6"/><path d="M 55 -75 Q 50 30 50 90" opacity="0.65" stroke-width="1.6"/><path d="M 90 -50 Q 85 30 85 75" opacity="0.65" stroke-width="1.6"/></g>
  </g>

  <!-- NG side (flat) -->
  <g transform="translate(800, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#C62828"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">×</text>
    <path d="M -110 0 Q -115 70 0 95 Q 115 70 110 0 Q 100 -75 0 -85 Q -100 -75 -110 0 Z" fill="#5A7048"/><ellipse cx="-45" cy="30" rx="22" ry="18" fill="#5D4E37" opacity="0.55"/><path d="M -8 -85 L -10 -100" stroke="#5D4E37" stroke-width="2" fill="none" opacity="0.7"/><ellipse cx="40" cy="-20" rx="18" ry="14" fill="#5D4E37" opacity="0.5"/>
  </g>

  <!-- Comparison labels -->
  <g font-size="20" fill="#333">
    <rect x="60" y="495" width="460" height="80" rx="8" fill="#E8F5E9"/>
    <text x="80" y="520" font-weight="bold" fill="#2C5F2D">● 皮が硬く凹凸ある</text>
    <text x="80" y="545" font-weight="bold" fill="#2C5F2D">● ヘタが太くコルク化</text>
    <text x="80" y="568" fill="#666" font-size="17">カット品=オレンジ濃い・種詰まる</text>

    <rect x="560" y="495" width="460" height="80" rx="8" fill="#FFEBEE"/>
    <text x="580" y="520" font-weight="bold" fill="#C62828">× ヘタが青く湿る(若い)</text>
    <text x="580" y="545" font-weight="bold" fill="#C62828">× 皮が柔らかい・打痕</text>
    <text x="580" y="568" fill="#666" font-size="17">カット品=種が空洞=水っぽい</text>
  </g>
</svg>
