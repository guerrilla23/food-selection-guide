<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="Noto Sans CJK JP, sans-serif">
  <rect width="1080" height="600" fill="#FFFFFF" rx="20"/>

  <!-- Header -->
  <text x="60" y="60" font-size="44" font-weight="900" fill="#7AAB45">レタス</text>
  <line x1="60" y1="75" x2="220" y2="75" stroke="#7AAB45" stroke-width="4"/>
  <text x="240" y="68" font-size="22" fill="#666">旬:春・秋</text>

  <line x1="540" y1="100" x2="540" y2="540" stroke="#DDD" stroke-width="2" stroke-dasharray="6,6"/>

  <!-- OK side -->
  <g transform="translate(280, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#2C5F2D"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">○</text>

    <defs>
      <radialGradient id="wcBodyLettuce" cx="35%" cy="25%">
        <stop offset="0%" stop-color="#F2FAD8" stop-opacity="0.95"/>
        <stop offset="50%" stop-color="#BCDB7A" stop-opacity="0.85"/>
        <stop offset="100%" stop-color="#7AAB3D" stop-opacity="0.7"/>
      </radialGradient>
      <radialGradient id="wcLeafLettuce" cx="50%" cy="40%">
        <stop offset="0%" stop-color="#C8E18A" stop-opacity="0.9"/>
        <stop offset="100%" stop-color="#5D8F3D" stop-opacity="0.7"/>
      </radialGradient>
      <filter id="wcRoughLettuce" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.05" numOctaves="3" seed="11"/>
        <feDisplacementMap in="SourceGraphic" scale="5"/>
      </filter>
      <filter id="wcBlurLettuce">
        <feGaussianBlur stdDeviation="1.5"/>
      </filter>
    </defs>

    <!-- Watercolor bleeds -->
    <g filter="url(#wcBlurLettuce)" opacity="0.4">
      <ellipse cx="0" cy="0" rx="160" ry="155" fill="#BCDB7A"/>
      <ellipse cx="-80" cy="-30" rx="55" ry="80" fill="#7AAB45"/>
      <ellipse cx="80" cy="-30" rx="55" ry="80" fill="#7AAB45"/>
    </g>

    <!-- 上部の葉(ふんわり広がる) -->
    <g filter="url(#wcRoughLettuce)" opacity="0.85">
      <path d="M 0 -90 Q -45 -75 -70 -45 Q -75 -85 -45 -110 Q 0 -130 45 -110 Q 75 -85 70 -45 Q 45 -75 0 -90 Z" fill="url(#wcLeafLettuce)"/>
    </g>

    <!-- 外葉(左、フリル状) -->
    <g filter="url(#wcRoughLettuce)" opacity="0.85">
      <path d="M -120 30 Q -150 0 -150 -40 Q -130 -85 -85 -90 Q -65 -50 -75 0 Q -85 50 -110 80 Q -135 75 -120 30 Z" fill="url(#wcLeafLettuce)"/>
    </g>

    <!-- 外葉(右、フリル状) -->
    <g filter="url(#wcRoughLettuce)" opacity="0.85">
      <path d="M 120 30 Q 150 0 150 -40 Q 130 -85 85 -90 Q 65 -50 75 0 Q 85 50 110 80 Q 135 75 120 30 Z" fill="url(#wcLeafLettuce)"/>
    </g>

    <!-- 本体球(中心、ふんわり) -->
    <g filter="url(#wcRoughLettuce)">
      <ellipse cx="0" cy="5" rx="105" ry="100" fill="url(#wcBodyLettuce)"/>
    </g>

    <!-- Strong ink lines -->
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
      <!-- 本体 -->
      <ellipse cx="0" cy="5" rx="105" ry="100"/>
      <!-- 上部の葉 -->
      <path d="M 0 -90 Q -45 -75 -70 -45 Q -75 -85 -45 -110 Q 0 -130 45 -110 Q 75 -85 70 -45 Q 45 -75 0 -90 Z"/>
      <!-- 上部の葉先のフリル波 -->
      <path d="M -55 -110 Q -45 -118 -35 -110 Q -25 -118 -15 -110 Q -5 -118 5 -110 Q 15 -118 25 -110 Q 35 -118 45 -110 Q 55 -118 60 -110" stroke-width="2" opacity="0.7"/>
      <!-- 外葉(左) -->
      <path d="M -120 30 Q -150 0 -150 -40 Q -130 -85 -85 -90 Q -65 -50 -75 0 Q -85 50 -110 80 Q -135 75 -120 30 Z"/>
      <path d="M -148 -50 Q -140 -60 -130 -50 Q -120 -60 -110 -50" stroke-width="2" opacity="0.7"/>
      <path d="M -120 80 Q -110 70 -100 80" stroke-width="2" opacity="0.7"/>
      <!-- 外葉(右) -->
      <path d="M 120 30 Q 150 0 150 -40 Q 130 -85 85 -90 Q 65 -50 75 0 Q 85 50 110 80 Q 135 75 120 30 Z"/>
      <path d="M 148 -50 Q 140 -60 130 -50 Q 120 -60 110 -50" stroke-width="2" opacity="0.7"/>
      <path d="M 120 80 Q 110 70 100 80" stroke-width="2" opacity="0.7"/>
      <!-- 重なり -->
      <path d="M 0 -85 Q -25 -55 -40 0 Q -45 55 -25 95" opacity="0.7"/>
      <path d="M 0 -85 Q 25 -55 40 0 Q 45 55 25 95" opacity="0.7"/>
    </g>

    <!-- 葉脈の白い光 -->
    <g stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.65">
      <path d="M 0 -85 Q -22 -55 -38 0 Q -42 55 -22 92"/>
      <path d="M 0 -85 Q 22 -55 38 0 Q 42 55 22 92"/>
    </g>
  </g>

  <!-- NG side -->
  <g transform="translate(800, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#C62828"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">×</text>

    <!-- 上部の葉(変色) -->
    <path d="M 0 -85 Q -45 -70 -70 -40 Q -75 -80 -45 -105 Q 0 -125 45 -105 Q 75 -80 70 -40 Q 45 -70 0 -85 Z" fill="#A8A058"/>
    <!-- 葉先の赤茶 -->
    <path d="M -45 -108 Q -35 -118 -25 -110" stroke="#A85530" stroke-width="3" fill="none" opacity="0.7"/>
    <path d="M 25 -110 Q 35 -118 45 -108" stroke="#A85530" stroke-width="3" fill="none" opacity="0.7"/>

    <!-- 外葉(左) -->
    <path d="M -120 35 Q -150 5 -150 -35 Q -128 -80 -82 -85 Q -62 -45 -72 5 Q -82 55 -108 85 Q -135 78 -120 35 Z" fill="#A8A058"/>
    <!-- 葉先の赤茶 -->
    <path d="M -150 -10 Q -135 -22 -118 -15 Q -125 0 -140 5 Z" fill="#A85530" opacity="0.7"/>

    <!-- 外葉(右) -->
    <path d="M 120 35 Q 150 5 150 -35 Q 128 -80 82 -85 Q 62 -45 72 5 Q 82 55 108 85 Q 135 78 120 35 Z" fill="#A8A058"/>
    <path d="M 150 -10 Q 135 -22 118 -15 Q 125 0 140 5 Z" fill="#A85530" opacity="0.7"/>

    <!-- 本体(くすむ) -->
    <ellipse cx="0" cy="5" rx="103" ry="98" fill="#BFBF82"/>

    <!-- 茶色のシミ -->
    <ellipse cx="-30" cy="-15" rx="15" ry="10" fill="#8A4520" opacity="0.5"/>
    <ellipse cx="40" cy="35" rx="13" ry="9" fill="#8A4520" opacity="0.5"/>
    <ellipse cx="0" cy="80" rx="18" ry="9" fill="#8A4520" opacity="0.5"/>

    <!-- 重なり線 -->
    <path d="M 0 -85 Q -25 -55 -40 0 Q -45 55 -25 95" stroke="#5D4E37" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M 0 -85 Q 25 -55 40 0 Q 45 55 25 95" stroke="#5D4E37" stroke-width="1.5" fill="none" opacity="0.6"/>

    <!-- 輪郭 -->
    <ellipse cx="0" cy="5" rx="103" ry="98" stroke="#3D2817" stroke-width="3" fill="none"/>
    <path d="M -120 35 Q -150 5 -150 -35 Q -128 -80 -82 -85 Q -62 -45 -72 5 Q -82 55 -108 85 Q -135 78 -120 35 Z" stroke="#3D2817" stroke-width="3" fill="none"/>
    <path d="M 120 35 Q 150 5 150 -35 Q 128 -80 82 -85 Q 62 -45 72 5 Q 82 55 108 85 Q 135 78 120 35 Z" stroke="#3D2817" stroke-width="3" fill="none"/>
  </g>

  <!-- Comparison labels -->
  <g font-size="20" fill="#333">
    <rect x="60" y="495" width="460" height="80" rx="8" fill="#E8F5E9"/>
    <text x="80" y="520" font-weight="bold" fill="#2C5F2D">● 葉先までピンと張ってフリル感</text>
    <text x="80" y="545" font-weight="bold" fill="#2C5F2D">● 鮮やかな黄緑、軽くてふんわり</text>
    <text x="80" y="568" fill="#666" font-size="17">芯の切り口が白い=収穫から日が浅い</text>

    <rect x="560" y="495" width="460" height="80" rx="8" fill="#FFEBEE"/>
    <text x="580" y="520" font-weight="bold" fill="#C62828">× 葉先が赤茶色に変色している</text>
    <text x="580" y="545" font-weight="bold" fill="#C62828">× 葉がしんなり、芯の切り口が赤い</text>
    <text x="580" y="568" fill="#666" font-size="17">芯が赤い=酸化が進み苦味が出やすい</text>
  </g>
</svg>
