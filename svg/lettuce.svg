<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="Noto Sans CJK JP, sans-serif">
  <rect width="1080" height="600" fill="#FFFFFF" rx="20"/>

  <!-- Header -->
  <text x="60" y="60" font-size="44" font-weight="900" fill="#7BAB46">レタス</text>
  <line x1="60" y1="75" x2="150" y2="75" stroke="#7BAB46" stroke-width="4"/>
  <text x="170" y="68" font-size="22" fill="#666">旬:4〜10月</text>

  <line x1="540" y1="100" x2="540" y2="540" stroke="#DDD" stroke-width="2" stroke-dasharray="6,6"/>

  <!-- OK side (watercolor Pattern A) -->
  <g transform="translate(280, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#2C5F2D"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">○</text>
    <defs>
      <radialGradient id="wcBodyLettuce" cx="35%" cy="25%"><stop offset="0%" stop-color="#E0F0CC" stop-opacity="0.95"/><stop offset="40%" stop-color="#B5DCA0" stop-opacity="0.9"/><stop offset="80%" stop-color="#7BAB46" stop-opacity="0.85"/><stop offset="100%" stop-color="#4A7C2E" stop-opacity="0.6"/></radialGradient>
      <radialGradient id="wcLeafLettuce" cx="50%" cy="20%"><stop offset="0%" stop-color="#9BCB7A" stop-opacity="0.9"/><stop offset="60%" stop-color="#5D8F3D" stop-opacity="0.7"/><stop offset="100%" stop-color="#2C5F2D" stop-opacity="0.5"/></radialGradient>
      <filter id="wcRoughLettuce" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.04" numOctaves="3" seed="53"/>
        <feDisplacementMap in="SourceGraphic" scale="4"/>
      </filter>
      <filter id="wcBlurLettuce"><feGaussianBlur stdDeviation="1.5"/></filter>
    </defs>
    <g filter="url(#wcBlurLettuce)" opacity="0.4"><ellipse cx="0" cy="0" rx="130" ry="110" fill="#9BCB7A"/></g>
    
    <g filter="url(#wcRoughLettuce)"><path d="M 0 -110 Q -120 -100 -120 -10 Q -125 90 0 110 Q 125 90 120 -10 Q 120 -100 0 -110 Z" fill="url(#wcBodyLettuce)"/></g>
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"><path d="M 0 -110 Q -120 -100 -120 -10 Q -125 90 0 110 Q 125 90 120 -10 Q 120 -100 0 -110 Z"/><path d="M -100 -50 Q -85 -65 -70 -45" opacity="0.7" stroke-width="1.6"/><path d="M -65 -90 Q -45 -100 -25 -85" opacity="0.7" stroke-width="1.6"/><path d="M 5 -100 Q 25 -110 50 -95" opacity="0.7" stroke-width="1.6"/><path d="M 70 -75 Q 90 -85 105 -55" opacity="0.7" stroke-width="1.6"/><path d="M -85 0 Q -60 10 -35 -5" opacity="0.5" stroke-width="1.4"/><path d="M -25 30 Q 0 40 30 25" opacity="0.5" stroke-width="1.4"/><path d="M 40 50 Q 65 65 90 50" opacity="0.5" stroke-width="1.4"/><path d="M 0 -110 L 0 50" opacity="0.4" stroke-width="1.2"/></g>
  </g>

  <!-- NG side (flat) -->
  <g transform="translate(800, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#C62828"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">×</text>
    <path d="M 0 -110 Q -120 -100 -120 -10 Q -125 90 0 110 Q 125 90 120 -10 Q 120 -100 0 -110 Z" fill="#A0A858"/><path d="M -120 -10 Q -135 0 -130 20 Q -100 5 -110 0" stroke="#A0A040" stroke-width="2" fill="none" opacity="0.7"/><ellipse cx="-30" cy="50" rx="15" ry="10" fill="#7A5520" opacity="0.5"/><ellipse cx="60" cy="-30" rx="12" ry="8" fill="#7A5520" opacity="0.5"/><path d="M -90 0 Q 0 5 90 0" stroke="#5D4E37" stroke-width="1.5" fill="none" opacity="0.5"/>
  </g>

  <!-- Comparison labels -->
  <g font-size="20" fill="#333">
    <rect x="60" y="495" width="460" height="80" rx="8" fill="#E8F5E9"/>
    <text x="80" y="520" font-weight="bold" fill="#2C5F2D">● 葉先が鮮やかな緑</text>
    <text x="80" y="545" font-weight="bold" fill="#2C5F2D">● 巻きがフワッと軽い</text>
    <text x="80" y="568" fill="#666" font-size="17">芯の切り口が白くて10円玉サイズ</text>

    <rect x="560" y="495" width="460" height="80" rx="8" fill="#FFEBEE"/>
    <text x="580" y="520" font-weight="bold" fill="#C62828">× 葉先が黄ばむ・茶色</text>
    <text x="580" y="545" font-weight="bold" fill="#C62828">× 芯が赤茶色、ベタつく</text>
    <text x="580" y="568" fill="#666" font-size="17">重すぎ=苦み、軽すぎ=巻き弱</text>
  </g>
</svg>
