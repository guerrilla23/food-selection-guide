<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="Noto Sans CJK JP, sans-serif">
  <rect width="1080" height="600" fill="#FFFFFF" rx="20"/>

  <!-- Header -->
  <text x="60" y="60" font-size="44" font-weight="900" fill="#7A8896">アジ</text>
  <line x1="60" y1="75" x2="180" y2="75" stroke="#7A8896" stroke-width="4"/>
  <text x="200" y="68" font-size="22" fill="#666">旬:夏</text>

  <line x1="540" y1="100" x2="540" y2="540" stroke="#DDD" stroke-width="2" stroke-dasharray="6,6"/>

  <!-- OK side -->
  <g transform="translate(280, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#2C5F2D"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">○</text>

    <defs>
      <linearGradient id="wcBodyAji" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#7A8896" stop-opacity="0.92"/>
        <stop offset="40%" stop-color="#A8B5C0" stop-opacity="0.9"/>
        <stop offset="60%" stop-color="#D8DCDC" stop-opacity="0.92"/>
        <stop offset="80%" stop-color="#F0E8C0" stop-opacity="0.9"/>
        <stop offset="100%" stop-color="#D8C880" stop-opacity="0.85"/>
      </linearGradient>
      <filter id="wcRoughAji" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.04" numOctaves="3" seed="29"/>
        <feDisplacementMap in="SourceGraphic" scale="3"/>
      </filter>
      <filter id="wcBlurAji">
        <feGaussianBlur stdDeviation="1.5"/>
      </filter>
    </defs>

    <!-- Watercolor bleeds -->
    <g filter="url(#wcBlurAji)" opacity="0.4">
      <ellipse cx="0" cy="0" rx="180" ry="60" fill="#A8B5C0"/>
    </g>

    <!-- 本体: ずんぐりした楕円形(アジの特徴) -->
    <g filter="url(#wcRoughAji)">
      <path d="M -180 0
               Q -175 -45 -120 -55
               Q -50 -60 30 -55
               Q 100 -50 130 -25
               L 175 -50
               L 168 0
               L 175 50
               L 130 25
               Q 100 50 30 55
               Q -50 60 -120 55
               Q -175 45 -180 0 Z" fill="url(#wcBodyAji)"/>
    </g>

    <!-- Strong ink lines -->
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
      <!-- 本体輪郭 -->
      <path d="M -180 0 Q -175 -45 -120 -55 Q -50 -60 30 -55 Q 100 -50 130 -25 L 175 -50 L 168 0 L 175 50 L 130 25 Q 100 50 30 55 Q -50 60 -120 55 Q -175 45 -180 0 Z"/>
      <!-- 尾びれの内側の線 -->
      <path d="M 130 -25 L 175 -50" opacity="0.6"/>
      <path d="M 130 25 L 175 50" opacity="0.6"/>
      <!-- 尾びれの放射線 -->
      <path d="M 145 -30 L 165 -45" stroke-width="1.5" opacity="0.65"/>
      <path d="M 155 0 L 172 0" stroke-width="1.5" opacity="0.65"/>
      <path d="M 145 30 L 165 45" stroke-width="1.5" opacity="0.65"/>

      <!-- ★ぜいご(尾の手前の硬い鱗ライン、アジ最大の特徴) -->
      <path d="M 30 0 Q 80 -3 130 0" stroke-width="3.5" opacity="0.95"/>
      <path d="M 30 5 Q 80 2 130 5" stroke-width="2.5" opacity="0.75"/>
      <!-- ぜいごのギザギザ -->
      <path d="M 40 -3 L 45 -8 L 50 -3" stroke-width="2"/>
      <path d="M 60 -3 L 65 -8 L 70 -3" stroke-width="2"/>
      <path d="M 80 -3 L 85 -8 L 90 -3" stroke-width="2"/>
      <path d="M 100 -3 L 105 -8 L 110 -3" stroke-width="2"/>
      <path d="M 120 -3 L 125 -8 L 130 -3" stroke-width="2"/>

      <!-- 目 -->
      <circle cx="-145" cy="-15" r="11" fill="#FFFFFF"/>
      <circle cx="-144" cy="-14" r="7" fill="#3D2817"/>
      <circle cx="-142" cy="-17" r="2.5" fill="#FFFFFF"/>

      <!-- エラ -->
      <path d="M -100 -38 Q -100 0 -95 38" stroke-width="2.5"/>
      <!-- エラの内側(赤、新鮮さ) -->
      <path d="M -103 -25 Q -103 0 -98 25" stroke="#C62828" stroke-width="1.5" opacity="0.55"/>

      <!-- 背びれ -->
      <path d="M -65 -55 L -55 -75 L -40 -68 L -35 -58 L -40 -52" stroke-width="2.5"/>
      <!-- 第二背びれ -->
      <path d="M 0 -55 Q 15 -65 30 -55" stroke-width="2"/>
      <path d="M 5 -55 L 15 -62 L 25 -55" stroke-width="1.5"/>

      <!-- 腹びれ -->
      <path d="M -55 55 Q -45 68 -35 55" stroke-width="2.5"/>

      <!-- 側線 -->
      <path d="M -110 -20 Q -50 -15 30 0" stroke-width="1.5" opacity="0.55"/>
    </g>

    <!-- 銀色の腹のハイライト -->
    <ellipse cx="-50" cy="20" rx="60" ry="8" fill="#FFFFFF" opacity="0.5"/>
    <ellipse cx="-60" cy="20" rx="25" ry="3" fill="#FFFFFF" opacity="0.7"/>

    <!-- 影 -->
    <ellipse cx="-30" cy="80" rx="155" ry="6" fill="#3D2817" opacity="0.12"/>
  </g>

  <!-- NG side -->
  <g transform="translate(800, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#C62828"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">×</text>

    <!-- 本体(くすんだ色) -->
    <path d="M -180 0 Q -175 -45 -120 -55 Q -50 -60 30 -55 Q 100 -50 130 -25 L 175 -50 L 168 0 L 175 50 L 130 25 Q 100 50 30 55 Q -50 60 -120 55 Q -175 45 -180 0 Z" fill="#9C9888"/>

    <!-- 茶色く変色したシミ -->
    <ellipse cx="-50" cy="-15" rx="14" ry="9" fill="#7A4A1F" opacity="0.5"/>
    <ellipse cx="0" cy="20" rx="16" ry="8" fill="#7A4A1F" opacity="0.5"/>
    <ellipse cx="60" cy="-20" rx="11" ry="7" fill="#7A4A1F" opacity="0.45"/>

    <!-- ぜいご(劣化、控えめ) -->
    <g stroke="#3D2817" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.55">
      <path d="M 30 0 Q 80 0 130 0"/>
      <path d="M 50 -3 L 55 -7 L 60 -3"/>
      <path d="M 90 -3 L 95 -7 L 100 -3"/>
    </g>

    <!-- 目(濁って白っぽい) -->
    <circle cx="-145" cy="-15" r="11" fill="#D8D0B8" stroke="#3D2817" stroke-width="2.5"/>
    <circle cx="-144" cy="-14" r="7" fill="#7A7060" opacity="0.7"/>

    <!-- 輪郭 -->
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M -180 0 Q -175 -45 -120 -55 Q -50 -60 30 -55 Q 100 -50 130 -25 L 175 -50 L 168 0 L 175 50 L 130 25 Q 100 50 30 55 Q -50 60 -120 55 Q -175 45 -180 0 Z"/>
      <path d="M 130 -25 L 175 -50" opacity="0.6"/>
      <path d="M 130 25 L 175 50" opacity="0.6"/>

      <!-- エラ(黒ずむ) -->
      <path d="M -100 -38 Q -100 0 -95 38" stroke-width="2.5"/>
      <path d="M -103 -25 Q -103 0 -98 25" stroke="#5A3215" stroke-width="1.5" opacity="0.6"/>

      <!-- 背びれ -->
      <path d="M -65 -55 L -55 -75 L -40 -68 L -35 -58 L -40 -52" stroke-width="2.5"/>
      <path d="M 0 -55 Q 15 -65 30 -55" stroke-width="2"/>
      <!-- 腹びれ -->
      <path d="M -55 55 Q -45 68 -35 55" stroke-width="2.5"/>
    </g>

    <ellipse cx="-30" cy="80" rx="155" ry="5" fill="#3D2817" opacity="0.1"/>
  </g>

  <!-- Comparison labels -->
  <g font-size="20" fill="#333">
    <rect x="60" y="495" width="460" height="80" rx="8" fill="#E8F5E9"/>
    <text x="80" y="520" font-weight="bold" fill="#2C5F2D">● 目が澄んで黒目クッキリ、エラが鮮赤</text>
    <text x="80" y="545" font-weight="bold" fill="#2C5F2D">● ぜいご(尾元の硬い鱗)がしっかり立つ</text>
    <text x="80" y="568" fill="#666" font-size="17">体がふっくらずんぐり=脂のった状態</text>

    <rect x="560" y="495" width="460" height="80" rx="8" fill="#FFEBEE"/>
    <text x="580" y="520" font-weight="bold" fill="#C62828">× 目が白く濁る、エラが黒ずむ</text>
    <text x="580" y="545" font-weight="bold" fill="#C62828">× 体表が乾燥、ぜいごがフラットに</text>
    <text x="580" y="568" fill="#666" font-size="17">腹がブヨブヨ=内臓が傷んでいるサイン</text>
  </g>
</svg>
