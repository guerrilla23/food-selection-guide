<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="Noto Sans CJK JP, sans-serif">
  <rect width="1080" height="600" fill="#FFFFFF" rx="20"/>

  <!-- Header -->
  <text x="60" y="60" font-size="44" font-weight="900" fill="#506068">アジ</text>
  <line x1="60" y1="75" x2="120" y2="75" stroke="#506068" stroke-width="4"/>
  <text x="140" y="68" font-size="22" fill="#666">旬:5〜8月</text>

  <line x1="540" y1="100" x2="540" y2="540" stroke="#DDD" stroke-width="2" stroke-dasharray="6,6"/>

  <!-- OK side (watercolor Pattern A) -->
  <g transform="translate(280, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#2C5F2D"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">○</text>
    <defs>
      <radialGradient id="wcBodyAji" cx="35%" cy="25%"><stop offset="0%" stop-color="#F8F8FA" stop-opacity="0.95"/><stop offset="40%" stop-color="#D0D8DC" stop-opacity="0.9"/><stop offset="80%" stop-color="#90A0A8" stop-opacity="0.85"/><stop offset="100%" stop-color="#506068" stop-opacity="0.65"/></radialGradient>
      <radialGradient id="wcLeafAji" cx="50%" cy="20%"><stop offset="0%" stop-color="#9BCB7A" stop-opacity="0.9"/><stop offset="60%" stop-color="#5D8F3D" stop-opacity="0.7"/><stop offset="100%" stop-color="#2C5F2D" stop-opacity="0.5"/></radialGradient>
      <filter id="wcRoughAji" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.04" numOctaves="3" seed="193"/>
        <feDisplacementMap in="SourceGraphic" scale="4"/>
      </filter>
      <filter id="wcBlurAji"><feGaussianBlur stdDeviation="1.5"/></filter>
    </defs>
    <g filter="url(#wcBlurAji)" opacity="0.4"><ellipse cx="0" cy="0" rx="125" ry="55" fill="#90A0A8"/></g>
    
    <g filter="url(#wcRoughAji)"><path d="M -110 0 Q -105 -42 -40 -48 Q 50 -50 95 -28 L 115 -22 Q 128 -10 128 0 Q 128 10 115 22 L 95 28 Q 50 50 -40 48 Q -105 42 -110 0 Z" fill="url(#wcBodyAji)"/><path d="M 115 -22 L 135 -38 L 130 0 L 135 38 L 115 22 Z" fill="url(#wcBodyAji)"/></g>
    
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"><path d="M -110 0 Q -105 -42 -40 -48 Q 50 -50 95 -28 L 115 -22 Q 128 -10 128 0 Q 128 10 115 22 L 95 28 Q 50 50 -40 48 Q -105 42 -110 0 Z"/><path d="M 115 -22 L 135 -38 L 130 0 L 135 38 L 115 22"/><path d="M -90 -15 m -5 0 a 5 5 0 1 0 10 0 a 5 5 0 1 0 -10 0 Z" opacity="0.95" stroke-width="2.2"/><path d="M -110 0 Q -115 5 -105 12" opacity="0.85" stroke-width="1.8"/><path d="M -70 5 Q 0 10 95 8" opacity="0.85" stroke-width="3"/><path d="M -80 -25 Q -75 0 -78 25" opacity="0.6" stroke-width="1.6"/><path d="M -50 -25 Q -20 -20 10 -25" opacity="0.5" stroke-width="1.4"/><path d="M 20 -25 Q 50 -20 80 -25" opacity="0.5" stroke-width="1.4"/></g>
  </g>

  <!-- NG side (flat) -->
  <g transform="translate(800, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#C62828"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">×</text>
    <path d="M -110 0 Q -105 -42 -40 -48 Q 50 -50 95 -28 L 115 -22 Q 128 -10 128 0 Q 128 10 115 22 L 95 28 Q 50 50 -40 48 Q -105 42 -110 0 Z" fill="#787878"/><path d="M 115 -22 L 135 -38 L 130 0 L 135 38 L 115 22 Z" fill="#787878"/><ellipse cx="-90" cy="-15" rx="5" ry="5" fill="#C8C0B0" opacity="0.85"/><ellipse cx="-80" cy="0" rx="8" ry="18" fill="#7A4828" opacity="0.55"/><ellipse cx="30" cy="0" rx="60" ry="25" fill="#5D4E37" opacity="0.3"/>
  </g>

  <!-- Comparison labels -->
  <g font-size="20" fill="#333">
    <rect x="60" y="495" width="460" height="80" rx="8" fill="#E8F5E9"/>
    <text x="80" y="520" font-weight="bold" fill="#2C5F2D">● 目が澄む、エラ赤、銀光る</text>
    <text x="80" y="545" font-weight="bold" fill="#2C5F2D">● ぜいご(尾近の硬鱗)固</text>
    <text x="80" y="568" fill="#666" font-size="17">ハリあり、腹に張りがある</text>

    <rect x="560" y="495" width="460" height="80" rx="8" fill="#FFEBEE"/>
    <text x="580" y="520" font-weight="bold" fill="#C62828">× 目が濁る、エラ茶色</text>
    <text x="580" y="545" font-weight="bold" fill="#C62828">× 体表ヌメ、軟らか</text>
    <text x="580" y="568" fill="#666" font-size="17">お腹が柔→内臓劣化</text>
  </g>
</svg>
