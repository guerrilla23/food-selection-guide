<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="Noto Sans CJK JP, sans-serif">
  <rect width="1080" height="600" fill="#FFFFFF" rx="20"/>
  
  <!-- Header -->
  <text x="60" y="60" font-size="44" font-weight="900" fill="#FF8C42">人参</text>
  <line x1="60" y1="75" x2="200" y2="75" stroke="#FF8C42" stroke-width="4"/>
  <text x="220" y="68" font-size="22" fill="#666">旬:秋〜冬・春</text>
  
  <line x1="540" y1="100" x2="540" y2="540" stroke="#DDD" stroke-width="2" stroke-dasharray="6,6"/>
  
  <!-- OK side (Pattern A: watercolor with strong ink lines) -->
  <g transform="translate(280, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#2C5F2D"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">○</text>

    <!-- Watercolor defs (carrot-specific) -->
    <defs>
      <radialGradient id="wcBodyCarrot" cx="35%" cy="25%">
        <stop offset="0%" stop-color="#FFD9B0" stop-opacity="0.95"/>
        <stop offset="40%" stop-color="#FFB07A" stop-opacity="0.9"/>
        <stop offset="80%" stop-color="#FF8C42" stop-opacity="0.85"/>
        <stop offset="100%" stop-color="#D45F1A" stop-opacity="0.7"/>
      </radialGradient>
      <radialGradient id="wcLeafCarrot" cx="50%" cy="20%">
        <stop offset="0%" stop-color="#9BCB7A" stop-opacity="0.9"/>
        <stop offset="60%" stop-color="#5D8F3D" stop-opacity="0.7"/>
        <stop offset="100%" stop-color="#2C5F2D" stop-opacity="0.5"/>
      </radialGradient>
      <filter id="wcRoughCarrot" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence baseFrequency="0.04" numOctaves="3" seed="3"/>
        <feDisplacementMap in="SourceGraphic" scale="4"/>
      </filter>
      <filter id="wcBlurCarrot">
        <feGaussianBlur stdDeviation="1.5"/>
      </filter>
    </defs>

    <!-- Watercolor bleeds (背景) -->
    <g filter="url(#wcBlurCarrot)" opacity="0.4">
      <ellipse cx="0" cy="-180" rx="40" ry="30" fill="#9BCB7A"/>
      <ellipse cx="-5" cy="-30" rx="65" ry="100" fill="#FFB07A"/>
      <ellipse cx="5" cy="130" rx="40" ry="40" fill="#E07020"/>
    </g>

    <!-- Watercolor leaves (small ferny tuft) -->
    <g filter="url(#wcRoughCarrot)" opacity="0.8">
      <path d="M -22 -150 Q -28 -198 -10 -212 Q 0 -190 -5 -148" fill="url(#wcLeafCarrot)"/>
      <path d="M -8 -150 Q -5 -204 10 -215 Q 20 -195 14 -148" fill="url(#wcLeafCarrot)"/>
      <path d="M 14 -150 Q 22 -198 32 -195 Q 32 -178 24 -148" fill="url(#wcLeafCarrot)"/>
    </g>

    <!-- Watercolor body (carrot shape) -->
    <g filter="url(#wcRoughCarrot)">
      <path d="M -45 -150 Q -50 -130 -50 -100 L -25 100 Q -10 150 0 170 Q 10 150 25 100 L 50 -100 Q 50 -130 45 -150 Q 0 -160 -45 -150 Z" fill="url(#wcBodyCarrot)"/>
    </g>

    <!-- Strong ink lines (Pattern A: 線はっきり) -->
    <g stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
      <!-- Body outline -->
      <path d="M -45 -150 Q -50 -130 -50 -100 L -25 100 Q -10 150 0 170 Q 10 150 25 100 L 50 -100 Q 50 -130 45 -150 Q 0 -160 -45 -150 Z"/>
      <!-- Top cut (首の切り口を強調) -->
      <path d="M -45 -150 Q 0 -158 45 -150"/>
      <!-- Leaf outlines -->
      <path d="M -22 -150 Q -28 -198 -10 -212"/>
      <path d="M -10 -212 Q 0 -190 -5 -148"/>
      <path d="M -8 -150 Q -5 -204 10 -215"/>
      <path d="M 10 -215 Q 20 -195 14 -148"/>
      <path d="M 14 -150 Q 22 -198 32 -195"/>
      <path d="M 32 -195 Q 32 -178 24 -148"/>
      <!-- Subtle horizontal texture lines -->
      <path d="M -42 -100 Q 0 -95 42 -100" opacity="0.7"/>
      <path d="M -36 -50 Q 0 -45 36 -50" opacity="0.7"/>
      <path d="M -28 0 Q 0 5 28 0" opacity="0.7"/>
      <path d="M -20 50 Q 0 55 20 50" opacity="0.7"/>
    </g>
  </g>
  
  <!-- NG side -->
  <g transform="translate(800, 320)">
    <circle cx="-200" cy="-180" r="22" fill="#C62828"/>
    <text x="-200" y="-172" font-size="26" font-weight="900" fill="white" text-anchor="middle">×</text>
    
    <!-- Large dark cut at top -->
    <g transform="translate(0, -150)">
      <ellipse cx="0" cy="0" rx="22" ry="6" fill="#3D2817"/>
      <ellipse cx="0" cy="-2" rx="20" ry="4" fill="#5D4E37"/>
    </g>
    
    <!-- Carrot body (dull, with imperfections) -->
    <path d="M -45 -150 Q -50 -130 -50 -100 L -25 100 Q -10 150 0 170 Q 10 150 25 100 L 50 -100 Q 50 -130 45 -150 Q 0 -160 -45 -150 Z" fill="#C77A4A"/>
    <!-- Discolored patch -->
    <ellipse cx="20" cy="-30" rx="15" ry="20" fill="#8B5A30" opacity="0.6"/>
    <ellipse cx="-15" cy="50" rx="12" ry="18" fill="#8B5A30" opacity="0.5"/>
    <!-- Wrinkles/cracks -->
    <path d="M -30 -80 Q -10 -70 0 -85" stroke="#5D4E37" stroke-width="1.5" fill="none"/>
    <path d="M 10 0 Q 25 10 30 -5" stroke="#5D4E37" stroke-width="1.5" fill="none"/>
    <path d="M -25 80 Q 0 85 20 75" stroke="#5D4E37" stroke-width="1.5" fill="none"/>
    <!-- Many hair roots (rough) -->
    <line x1="-40" y1="-50" x2="-50" y2="-48" stroke="#5D4E37" stroke-width="1.5"/>
    <line x1="40" y1="-30" x2="50" y2="-25" stroke="#5D4E37" stroke-width="1.5"/>
    <line x1="-35" y1="20" x2="-48" y2="25" stroke="#5D4E37" stroke-width="1.5"/>
    <line x1="35" y1="40" x2="48" y2="48" stroke="#5D4E37" stroke-width="1.5"/>
    <line x1="-30" y1="80" x2="-42" y2="85" stroke="#5D4E37" stroke-width="1.5"/>
    <line x1="0" y1="170" x2="-5" y2="183" stroke="#5D4E37" stroke-width="1.5"/>
    <line x1="0" y1="170" x2="5" y2="183" stroke="#5D4E37" stroke-width="1.5"/>
  </g>
  
  <!-- Comparison labels -->
  <g font-size="20" fill="#333">
    <rect x="60" y="495" width="460" height="80" rx="8" fill="#E8F5E9"/>
    <text x="80" y="520" font-weight="bold" fill="#2C5F2D">● 鮮やかなオレンジ、表面が滑らか</text>
    <text x="80" y="545" font-weight="bold" fill="#2C5F2D">● 首の切り口が小さく、ひげ根少なめ</text>
    <text x="80" y="568" fill="#666" font-size="17">皮の近くが栄養豊富。皮ごと使うのが◎</text>
    
    <rect x="560" y="495" width="460" height="80" rx="8" fill="#FFEBEE"/>
    <text x="580" y="520" font-weight="bold" fill="#C62828">× 色がくすむ、シワや黒ずみがある</text>
    <text x="580" y="545" font-weight="bold" fill="#C62828">× 切り口が大きく黒い、ひげ根が多い</text>
    <text x="580" y="568" fill="#666" font-size="17">切り口の大きさ=葉が太かった証=硬い</text>
  </g>
</svg>
